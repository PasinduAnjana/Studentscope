
  <!-- Import Web Component -->
  <script src="js/components/ToggleSelect.js"></script>
  <script src="../../js/dropdown.js"></script>

  <h2 class="heading">
    <i class="fas fa-trophy"></i>
    <span data="achievements.title">Achievement Management</span>
  </h2>
  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <div class="icon-title">
        <i class="fas fa-trophy icon"></i>
        <p class="tile-label" data="achievements.achievements">Achievements</p>
      </div>
      <button class="btn btn-primary" onclick="openModal()">
        <i class="fas fa-plus"></i> <span data="achievements.addAchievement">Add Achievement</span>
      </button>
    </div>
    <data-table id="achievements-table">
        <div slot="filters" style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
            <div class="input-group" style="min-width: 150px; margin-bottom: 0;">
                <select id="categoryFilter">
                    <option value="" data="achievements.filter.allCategories">All Categories</option>
                    <option value="academic" data="achievements.filter.academic">Academic</option>
                    <option value="sports" data="achievements.filter.sports">Sports</option>
                    <option value="arts" data="achievements.filter.arts">Arts</option>
                </select>
            </div>

            <div class="input-group" style="min-width: 150px; margin-bottom: 0;">
                 <input type="date" id="dateFilter" data-placeholder="achievements.filter.byDate" placeholder="Filter by Date" style="margin-bottom: 0;">
            </div>
        </div>
    </data-table>
  </div>

  <!-- Modal using shared styles (from announcements.css) -->
  <modal-dialog id="achievementModal" data-title="achievements.addAchievement" title="Add Achievement">
      <div style="display: flex; flex-direction: column; gap: 15px;">
        <form id="achievementForm" onsubmit="handleSave(event)">
          <input type="hidden" id="achievementId" />
          
          <div class="form-group">
            <label for="studentSelect" data="achievements.studentLabel">Student</label>
            <select id="studentSelect" required>
              <option value="" data="achievements.selectStudent">Select Student...</option>
            </select>
          </div>

          <div class="form-group">
            <label for="titleInput" data="achievements.titleLabel">Title</label>
            <input type="text" id="titleInput" required data-placeholder="achievements.placeholderTitle" placeholder="e.g. Mathematics Competition Winner" style="width: 100%; padding: 8px; border: 1px solid var(--color-border); border-radius: 4px; background: var(--color-bg); color: var(--color-text);" />
          </div>

          <div class="form-group">
            <label for="descInput" data="achievements.descriptionLabel">Description</label>
            <textarea id="descInput" rows="3" required data-placeholder="achievements.placeholderDescription"placeholder="Details about the achievement..." style="width: 100%; padding: 8px; border: 1px solid var(--color-border); border-radius: 4px; background: var(--color-bg); color: var(--color-text);"></textarea>
          </div>

          <div class="form-group">
            <label data="achievements.categoryLabel">Category</label>
            <toggle-select id="categoryToggle" onclick="syncCategory()">
                <toggle-option value="academic" icon="fas fa-microscope" data="achievements.filter.academic">Academic</toggle-option>
                <toggle-option value="sports" icon="fas fa-trophy" data="achievements.filter.sports">Sports</toggle-option>
                <toggle-option value="arts" icon="fas fa-palette" data="achievements.filter.arts">Arts</toggle-option>
                <toggle-option value="other" icon="fas fa-star" data="achievements.filter.other">Other</toggle-option>
            </toggle-select>
            <input type="hidden" id="categorySelect" required />
          </div>

          <div class="form-group">
            <label for="dateInput" data="achievements.dateLabel">Date</label>
            <input type="date" id="dateInput" required style="width: 100%; padding: 8px; border: 1px solid var(--color-border); border-radius: 4px; background: var(--color-bg); color: var(--color-text);" />
          </div>
        </form>
      </div>
      <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
        <button type="button" class="btn btn-secondary" onclick="closeModal()" data="achievements.cancel">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="document.getElementById('achievementForm').dispatchEvent(new Event('submit'))" data="achievements.save">Save</button>
      </div>
  </modal-dialog>

  <script>
    let students = [];
    let isEditing = false;
    let searchableStudentSelect;

    // Sync Web Component value with hidden input for form submission
    function syncCategory() {
        const toggle = document.querySelector('toggle-select');
        document.getElementById('categorySelect').value = toggle.value;
    }

    async function init() {
      await loadStudents();
      initTable();
      loadAchievements();
    }

    async function loadStudents() {
      try {
        const res = await api.clerk.students.getAll();
        if (res.ok) {
          students = await res.json();
          const select = document.getElementById("studentSelect");
          if(select) {
              select.innerHTML = `<option value="">${t("achievements.selectStudent")}</option>`;
              students.forEach(s => {
                const option = document.createElement("option");
                option.value = s.user_id;
                option.textContent = `${s.full_name} (${s.username || t("achievements.noStudentId")})`;
                select.appendChild(option);
              });
              if (typeof makeSearchableDropdown === "function") {
                searchableStudentSelect = makeSearchableDropdown("studentSelect");
              }
          }
        }
      } catch (err) {
        console.error("Failed to load students", err);
        toast(t("common.error"), "fa-solid fa-circle-exclamation");
      }
    }

  function initTable() {
    const table = document.getElementById("achievements-table");
    table.setColumns([
        { key: "student_name", header: t("achievements.studentLabel"), searchable: true, render: (row) => row.student_name || t("achievements.emptyStudent") },
        { 
            key: "title", 
            header: t("achievements.titleLabel") + " / " + t("achievements.descriptionLabel"), 
            searchable: true,
            render: (row) => `<div>${row.title}</div><div class="text-sm">${row.description}</div>`
        },
        { 
            key: "category", 
            header: t("achievements.categoryLabel"), 
            render: (row) => {
                const icon = getCategoryIcon(row.category);
                const label = t("achievements.filter." + row.category) || row.category;
                return `<span><i class="fas ${icon}"></i> ${label}</span>`;
            }
        },
        { 
            key: "achieved_at", 
            header: t("achievements.dateLabel"), 
            render: (row) => new Date(row.achieved_at).toLocaleDateString()
        },
        {
            key: "actions",
            header: t("common.actions"),
            render: (row) => {
                const div = document.createElement("div");
                div.className = "action-buttons flex-center";
                
                const btnEdit = document.createElement("button");
                btnEdit.className = "btn-icon btn-edit";
                btnEdit.title = t("common.edit");
                btnEdit.innerHTML = '<i class="fas fa-edit"></i>';
                btnEdit.onclick = () => openEditModal(row);

                const btnDelete = document.createElement("button");
                btnDelete.className = "btn-icon btn-delete";
                btnDelete.title = t("common.delete");
                btnDelete.innerHTML = '<i class="fas fa-trash"></i>';
                btnDelete.onclick = () => handleDelete(row.id);
                
                div.appendChild(btnEdit);
                div.appendChild(btnDelete);
                return div;
            }
        }
    ]);
    table.setEmptyState(t("achievements.noAchievementsFound"), "fas fa-trophy");

    // Filters
    // const studentFilter = document.getElementById("studentFilter");
    const categoryFilter = document.getElementById("categoryFilter");
    const dateFilter = document.getElementById("dateFilter");

    // Make category filter searchable
    if (typeof makeSearchableDropdown === 'function' && categoryFilter) {
        makeSearchableDropdown('categoryFilter', (val) => {
             // Dispatch change event manually or call method
             // makeSearchableDropdown usually updates value but we need to trigger logic
             // But here we can just add filter directly in the callback or rely on the fact that value changes.
             // The callback (val) => ... is usually for selection handling.
             
             // Simplest way: update table filter immediately
             table.addFilter("category", (row) => {
                return val === "" || row.category === val;
            });
        });
    } else if (categoryFilter) {
        // Fallback standard listener
        categoryFilter.addEventListener("change", () => {
            const val = categoryFilter.value;
            table.addFilter("category", (row) => {
                return val === "" || row.category === val;
            });
        });
    }

    if (dateFilter) {
        dateFilter.addEventListener("change", () => {
            const val = dateFilter.value;
            table.addFilter("date", (row) => {
                if(!val) return true;
                return row.achieved_at.startsWith(val);
            });
        });
    }
  }

  async function loadAchievements() {
      try {
        const res = await api.clerk.achievements.getAll();
        if (!res.ok) throw new Error("Failed");
        const data = await res.json();
        document.getElementById("achievements-table").setData(data);
      } catch (err) {
        console.error(err);
        document.getElementById("achievements-table").setData([]);
        document.getElementById("achievements-table").setEmptyState(t("achievements.errorLoading"), "fas fa-exclamation-triangle");
      }
    }

    function getCategoryIcon(cat) {
      switch(cat) {
        case 'academic': return 'fa-microscope';
        case 'sports': return 'fa-trophy';
        case 'arts': return 'fa-palette';
        default: return 'fa-star';
      }
    }

    function openModal() {
      isEditing = false;
      const modal = document.getElementById("achievementModal");
      if(modal) {
        modal.setTitle(t("achievements.addAchievement"));
        document.getElementById("achievementForm").reset();
        document.getElementById("achievementId").value = "";
        document.getElementById("dateInput").valueAsDate = new Date();
        
        const toggle = document.querySelector('toggle-select');
        if(toggle) toggle.value = ""; 
        document.getElementById('categorySelect').value = "";

        modal.open();
      }
    }

    function openEditModal(item) {
      isEditing = true;
      const modal = document.getElementById("achievementModal");
      if(modal) {
          modal.setTitle(t("achievements.editAchievement"));
          document.getElementById("achievementId").value = item.id;
          document.getElementById("studentSelect").value = item.student_id; 
          document.getElementById("titleInput").value = item.title;
          document.getElementById("descInput").value = item.description;
          document.getElementById("categorySelect").value = item.category;
          document.getElementById("dateInput").value = item.achieved_at.split('T')[0];
          
          const toggle = document.querySelector('toggle-select');
          if(toggle) toggle.value = item.category;
          
          modal.open();
      }
    }

    function closeModal() {
      const modal = document.getElementById("achievementModal");
      if(modal) modal.close();
    }

    async function handleSave(e) {
      e.preventDefault();
      
      const id = document.getElementById("achievementId").value;
      const data = {
        student_id: document.getElementById("studentSelect").value,
        title: document.getElementById("titleInput").value,
        description: document.getElementById("descInput").value,
        category: document.getElementById("categorySelect").value,
        achieved_at: document.getElementById("dateInput").value
      };

      if (!data.student_id || !data.title || !data.category || !data.achieved_at) {
         toast(t("achievements.validation.allFields"), "fa-solid fa-circle-exclamation");
         return;
      }

      try {
        let res;
        if (isEditing) {
          res = await api.clerk.achievements.update(id, data);
        } else {
          res = await api.clerk.achievements.create(data);
        }

        if (res.ok) {
          toast(isEditing ? t("achievements.toast.updated") : t("achievements.toast.created"), "fa-solid fa-check-circle");
          closeModal();
          loadAchievements();
        } else {
          toast(t("achievements.toast.errorSave"), "fa-solid fa-circle-exclamation");
        }
      } catch (err) {
        console.error(err);
        toast(t("achievements.toast.errorSave"), "fa-solid fa-circle-exclamation");
      }
    }

    async function handleDelete(id) {
       toast(t("achievements.confirmDelete"), "fa-solid fa-trash", {
         confirm: true,
         confirmText: t("common.delete"),
         cancelText: t("common.cancel"),
         onConfirm: async () => {
             try {
                const res = await api.clerk.achievements.delete(id);
                if (res.ok) {
                  loadAchievements();
                  toast(t("achievements.toast.deleted"), "fa-solid fa-check-circle");
                } else {
                  toast(t("achievements.toast.errorDelete"), "fa-solid fa-circle-exclamation");
                }
            } catch (err) {
                console.error(err);
                toast(t("achievements.toast.errorDelete"), "fa-solid fa-circle-exclamation");
            }
         }
       });
    }

    // Initialize
    init();

    // Language change handler
    window.addEventListener("languageChanged", () => {
      loadAchievements();
    });
  </script>
</section>
