<h2 class="heading">
  <i class="fas fa-calendar-day"></i>
  <span data="clerk.timetable.title">Timetable Assignment</span>
</h2>

<div
  class="flex mb-2"
  style="gap: 16px; align-items: baseline; flex-wrap: wrap"
>
  <div class="input-group">
    <label for="class-select" data="clerk.timetable.selectClass">Select Class:</label>
    <select id="class-select">
      <option value="" data="clerk.timetable.selectClass">Select Class</option>
    </select>
  </div>
</div>

<div class="timetable" id="timetable">
  <!-- Header row -->
  <div class="timetable-row header-row" id="timetable-header-row">
    <div class="timetable-cell header-cell" data="clerk.timetable.days.time">Time</div>
    <div class="timetable-cell header-cell" data="clerk.timetable.days.monday">Monday</div>
    <div class="timetable-cell header-cell" data="clerk.timetable.days.tuesday">Tuesday</div>
    <div class="timetable-cell header-cell" data="clerk.timetable.days.wednesday">Wednesday</div>
    <div class="timetable-cell header-cell" data="clerk.timetable.days.thursday">Thursday</div>
    <div class="timetable-cell header-cell" data="clerk.timetable.days.friday">Friday</div>
  </div>
</div>

<!-- Assignment Modal -->
<!-- Assignment Modal -->
<modal-dialog id="assignment-modal" data-title="clerk.timetable.modal.assignToSlot" title="Assign to Slot">
    <div style="display: flex; flex-direction: column; gap: 20px;">
        
        <div class="form-group mb-0">
          <label for="assign-subject" data="clerk.timetable.modal.subject" style="display: block; font-weight: 600; font-size: 14px; color: var(--color-text); margin-bottom: 8px;">Subject</label>
          <div style="position: relative;">
            <select id="assign-subject" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--color-border); background-color: var(--color-bg); font-size: 15px; appearance: none; -webkit-appearance: none;">
              <option value="" data="clerk.timetable.modal.selectSubject">Select Subject</option>
            </select>
            <i class="fas fa-book-open" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--color-subtext); pointer-events: none;"></i>
          </div>
        </div>

        <div class="form-group mb-0">
          <label for="assign-teacher" data="clerk.timetable.modal.teacher" style="display: block; font-weight: 600; font-size: 14px; color: var(--color-text); margin-bottom: 8px;">Teacher</label>
           <div style="position: relative;">
            <select id="assign-teacher" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--color-border); background-color: var(--color-bg); font-size: 15px; appearance: none; -webkit-appearance: none;">
              <option value="" data="clerk.timetable.modal.selectTeacher">Select Teacher</option>
            </select>
            <i class="fas fa-chalkboard-teacher" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--color-subtext); pointer-events: none;"></i>
          </div>
        </div>

    </div>

    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
      <button onclick="closeModal()" class="btn" data="clerk.timetable.modal.cancel" style="background: transparent; color: var(--color-subtext); padding: 10px 20px;">Cancel</button>
      <button id="modal-save" class="btn btn-primary" data="clerk.timetable.modal.assign" style="padding: 10px 24px; border-radius: 12px; font-weight: 600;">Assign</button>
    </div>
</modal-dialog>

<script>
  let currentClass = null;
  let currentSlot = null;
  let timetableLookup = {};
  let searchableClassSelect = null;
  let searchableSubjectSelect = null;
  let searchableTeacherSelect = null;

  function updateSearchableDisplay(selectId) {
    const select = document.getElementById(selectId);
    if (!select) return;
    const wrapper = select.previousElementSibling;
    if (wrapper && wrapper.classList.contains("searchable-select")) {
      const displaySpan = wrapper.querySelector(".dropdown-display span");
      const opt =
        select.options[select.selectedIndex] ||
        Array.from(select.options).find((o) => o.value);
      if (displaySpan) displaySpan.textContent = opt ? opt.text : "";
    }
  }

  async function loadClasses() {
    try {
      const res = await api.clerk.classes.getAll();
      if (!res.ok) throw new Error("Failed to fetch classes");
      const classes = await res.json();
      const select = document.getElementById("class-select");
      select.innerHTML = `<option value="">${t("clerk.timetable.selectClass")}</option>`;
      classes.forEach((cls) => {
        const opt = document.createElement("option");
        opt.value = cls.id;
        opt.textContent = t("clerk.timetable.classDisplay", { grade: cls.grade, className: cls.class_name });
        select.appendChild(opt);
      });
      if (typeof makeSearchableDropdown === "function") {
        if (
          searchableClassSelect &&
          typeof searchableClassSelect.destroy === "function"
        ) {
          searchableClassSelect.destroy();
        }
        searchableClassSelect = makeSearchableDropdown(
          "class-select",
          (val, text) => {
            currentClass = val;
            if (val) {
              loadTimetable();
            } else {
              const timetableContainer = document.getElementById("timetable");
              timetableContainer.innerHTML =
                `<empty-state-message message="${t("clerk.timetable.empty.selectClass")}" icon="fas fa-chalkboard"></empty-state-message>`;
            }
          }
        );
      }
    } catch (err) {
      console.error(err);
    }
  }

  async function loadSubjects() {
    try {
      const res = await api.clerk.subjects.getAll();
      if (!res.ok) throw new Error("Failed to fetch subjects");
      const subjects = await res.json();
      const select = document.getElementById("assign-subject");
      select.innerHTML = `<option value="">${t("clerk.timetable.modal.selectSubject")}</option>`;
      subjects.forEach((sub) => {
        const opt = document.createElement("option");
        opt.value = sub.subject_id;
        opt.textContent = sub.subject_name;
        select.appendChild(opt);
      });
      if (typeof makeSearchableDropdown === "function") {
        if (
          searchableSubjectSelect &&
          typeof searchableSubjectSelect.destroy === "function"
        ) {
          searchableSubjectSelect.destroy();
        }
        searchableSubjectSelect = makeSearchableDropdown("assign-subject");
      }
    } catch (err) {
      console.error(err);
    }
  }

  async function loadTeachers() {
    try {
      const res = await api.clerk.teachers.getAll();
      if (!res.ok) throw new Error("Failed to fetch teachers");
      const teachers = await res.json();
      const select = document.getElementById("assign-teacher");
      select.innerHTML = `<option value="">${t("clerk.timetable.modal.selectTeacher")}</option>`;
      teachers.forEach((teacher) => {
        const opt = document.createElement("option");
        opt.value = teacher.teacher_id;
        opt.textContent = teacher.full_name;
        select.appendChild(opt);
      });
      if (typeof makeSearchableDropdown === "function") {
        if (
          searchableTeacherSelect &&
          typeof searchableTeacherSelect.destroy === "function"
        ) {
          searchableTeacherSelect.destroy();
        }
        searchableTeacherSelect = makeSearchableDropdown("assign-teacher");
      }
    } catch (err) {
      console.error(err);
    }
  }

  async function loadTimetable() {
    if (!currentClass) {
      const timetableContainer = document.getElementById("timetable");
      timetableContainer.innerHTML =
        `<empty-state-message message="${t("clerk.timetable.empty.selectClass")}" icon="fas fa-chalkboard"></empty-state-message>`;
      return;
    }

    try {
      const [timeData, timetableData] = await Promise.all([
        fetch("../../data/time.json").then((res) => res.json()),
        api.clerk.timetable.getByClass(currentClass).then((res) =>
          res.json()
        ),
      ]);

      timetableLookup = {};
      if (Array.isArray(timetableData)) {
        timetableData.forEach((entry) => {
          if (!timetableLookup[entry.day_of_week])
            timetableLookup[entry.day_of_week] = {};
          timetableLookup[entry.day_of_week][entry.period_number] = entry;
        });
      }

      const timetableContainer = document.getElementById("timetable");
      timetableContainer.innerHTML = "";

      const headerRow = document.createElement("div");
      headerRow.classList.add("timetable-row", "header-row");
      const headers = [
        t("clerk.timetable.days.time"),
        t("clerk.timetable.days.monday"),
        t("clerk.timetable.days.tuesday"),
        t("clerk.timetable.days.wednesday"),
        t("clerk.timetable.days.thursday"),
        t("clerk.timetable.days.friday"),
      ];
      headers.forEach((day) => {
        const cell = document.createElement("div");
        cell.classList.add("timetable-cell", "header-cell");
        cell.textContent = day;
        headerRow.appendChild(cell);
      });
      timetableContainer.appendChild(headerRow);

      timeData.forEach((slot, index) => {
        const row = document.createElement("div");
        row.classList.add("timetable-row");

        const timeCell = document.createElement("div");
        timeCell.classList.add("timetable-cell", "time-cell");
        timeCell.textContent = `${slot.start}`;
        row.appendChild(timeCell);

        for (let day = 1; day <= 5; day++) {
          const cell = document.createElement("div");
          cell.classList.add("timetable-cell");

          const card = document.createElement("div");
          card.classList.add("card", "slot-card");
          card.style.cursor = "pointer";
          card.onclick = () => openAssignmentModal(day, slot.slot);

          const entry = timetableLookup[day] && timetableLookup[day][slot.slot];

          if (entry) {
            const subjectDiv = document.createElement("div");
            subjectDiv.classList.add("subject");
            subjectDiv.textContent = entry.subject;

            const teacherDiv = document.createElement("div");
            teacherDiv.classList.add("class-name");
            teacherDiv.textContent = entry.teacher_name || t("clerk.timetable.slot.assigned");

            card.appendChild(subjectDiv);
            card.appendChild(teacherDiv);
          } else {
            const emptyDiv = document.createElement("div");
            emptyDiv.classList.add("empty-slot");
            emptyDiv.textContent = t("clerk.timetable.slot.clickToAssign");
            card.appendChild(emptyDiv);
          }

          cell.appendChild(card);
          row.appendChild(cell);
        }

        timetableContainer.appendChild(row);

        if (slot.slot === 4) {
          const breakRow = document.createElement("div");
          breakRow.classList.add("timetable-row", "interval-row");

          const breakCell = document.createElement("h3");
          breakCell.classList.add("timetable-cell", "interval-cell");
          breakCell.style.color = "var(--color-primary)";
          breakCell.textContent = t("clerk.timetable.break.interval");
          breakCell.style.gridColumn = "1 / span 6";

          breakRow.appendChild(breakCell);
          timetableContainer.appendChild(breakRow);
        }
      });
    } catch (err) {
      console.error(err);
      const timetableContainer = document.getElementById("timetable");
      timetableContainer.innerHTML =
        `<empty-state-message message="${t("clerk.timetable.error.loadFailed")}" icon="fas fa-exclamation-triangle"></empty-state-message>`;
    }
  }

  function openAssignmentModal(day, period) {
    currentSlot = { day, period };
    const days = [
      t("clerk.timetable.days.monday"),
      t("clerk.timetable.days.tuesday"),
      t("clerk.timetable.days.wednesday"),
      t("clerk.timetable.days.thursday"),
      t("clerk.timetable.days.friday")
    ];
    const dayName = days[day - 1];
    const modal = document.getElementById("assignment-modal");
    
    const entry = timetableLookup[day] && timetableLookup[day][period];

    const subjectSelect = document.getElementById("assign-subject");
    subjectSelect.value = entry ? String(entry.subject_id) : "";
    updateSearchableDisplay("assign-subject");

    const teacherSelect = document.getElementById("assign-teacher");
    teacherSelect.value = entry ? String(entry.teacher_id) : "";
    updateSearchableDisplay("assign-teacher");

    const subtitle = document.createElement("p");
    subtitle.style.cssText = "color: var(--color-subtext); font-size: 14px; margin-top: 4px; margin-bottom: 0;";
    subtitle.textContent = entry
      ? `${dayName} • ${entry.subject} — ${entry.teacher_name}`
      : `${dayName} • ${t("clerk.timetable.modal.selectSubject")} & ${t("clerk.timetable.modal.selectTeacher")}`;
    
    const slot = modal.querySelector("#modal-subtitle-slot");
    if(slot) {
        slot.innerHTML = '';
        slot.appendChild(subtitle);
    }
    
    modal.open();
  }

  function closeModal() {
    const modal = document.getElementById("assignment-modal");
    modal.close();
    currentSlot = null;
  }

  async function saveAssignment() {
    const subject = document.getElementById("assign-subject").value;
    const teacher = document.getElementById("assign-teacher").value;

    if (!subject || !teacher) {
      toast(
        t("clerk.timetable.toast.selectSubjectTeacher"),
        "fa-solid fa-circle-exclamation"
      );
      return;
    }

    try {
      const res = await api.clerk.timetable.assign({
        class_id: currentClass,
        day_of_week: currentSlot.day,
        period_number: currentSlot.period,
        subject_id: subject,
        teacher_id: teacher,
      });
      if (!res.ok) throw new Error("Failed to assign");
      toast(t("clerk.timetable.toast.saved"), "fa-solid fa-check-circle");
      closeModal();
      loadTimetable();
    } catch (err) {
      console.error(err);
      toast(t("clerk.timetable.toast.error"), "fa-solid fa-circle-exclamation");
    }
  }

  // Initialize
  loadClasses();
  loadSubjects();
  loadTeachers();
  loadTimetable();

  // Language change handler
  window.addEventListener("languageChanged", () => {
    loadTimetable();
  });

  // Modal event listeners
  // document
  //   .querySelector("#assignment-modal .modal-close")
  //   .addEventListener("click", closeModal);
  // document.getElementById("modal-cancel").addEventListener("click", closeModal);
  document
    .getElementById("modal-save")
    .addEventListener("click", saveAssignment);
  // document.getElementById("assignment-modal").addEventListener("click", (e) => {
  //   if (e.target === document.getElementById("assignment-modal")) closeModal();
  // });
</script>
