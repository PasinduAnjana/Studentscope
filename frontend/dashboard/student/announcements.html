<section class="section">
  <h2 class="heading">
    <i class="fas fa-bullhorn"></i>
    <span data="sidebar.announcements"></span>
  </h2>
  <style>
    .checkbox-item {
      margin-bottom: 8px;
    }
    .checkbox-item label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: background-color 0.2s;
    }
    .checkbox-item label:hover {
      background-color: var(--color-hover);
    }
  </style>
  <div class="card-grid">
    <!-- Announcements Card -->
    <div class="card h-2">
      <div class="icon-title">
        <i class="fas fa-inbox icon"></i>
        <p class="tile-label" data="student.announcementsPage.title">My Announcements</p>
      </div>
      <div class="announcements-container" id="announcements-container">
        <!-- Announcements will be loaded here dynamically -->
      </div>
    </div>
  </div>
</section>

<script>
  let announcements = [];

  function renderAnnouncements(announcements, containerId) {
    const container = document.querySelector(`#${containerId}`);
    container.innerHTML = "";
    if (!announcements.length) {
      container.innerHTML = `<div class="no-announcements text-center">${t("student.announcementsPage.noAnnouncements")}</div>`;
      return;
    }

    announcements.forEach((announcement) => {
      const card = document.createElement("div");
      card.className = "announcement-card";

      const createdDate = new Date(
        announcement.created_at
      ).toLocaleDateString();

      let audienceDisplay = "";
      const labels = {
        all: t("student.announcementsPage.allStudents"),
        students: t("student.announcementsPage.class") + " " + (announcement.class_name || t("student.announcementsPage.assigned")),
      };

      switch (announcement.audience_type) {
        case "all":
          audienceDisplay = labels.all;
          break;
        case "students":
          audienceDisplay = labels.students;
          break;
      }

      card.innerHTML = `
        <div class="announcement-title">
          <span>${announcement.title}</span>
        </div>
        <div class="announcement-description-container">
          <div class="announcement-description collapsed" id="desc-${containerId}-${announcement.id}">${announcement.description}</div>
          <button class="expand-btn" id="expand-${containerId}-${announcement.id}" style="display: none;" onclick="toggleDescription('${containerId}', ${announcement.id})">
            <span>${t("student.announcementsPage.showMore")}</span>
            <i class="fas fa-chevron-down"></i>
          </button>
        </div>
        <div class="announcement-meta flex-between">
          <span class="text-sm"><i class="fas fa-users" style="margin-right:4px;"></i>${audienceDisplay}</span>
          <span class="text-sm"><i class="fas fa-calendar" style="margin-right:4px;"></i>${createdDate}${announcement.posted_by_name ? ` <i class="fas fa-user" style="margin-right:4px;"></i>${announcement.posted_by_name}` : ""}</span>
        </div>
      `;

      container.appendChild(card);

      setTimeout(() => {
        const descElement = card.querySelector(`#desc-${containerId}-${announcement.id}`);
        const expandBtn = card.querySelector(`#expand-${containerId}-${announcement.id}`);

        if (descElement.scrollHeight > descElement.clientHeight) {
          expandBtn.style.display = "inline-flex";
        }
      }, 0);
    });
  }

  function fetchAnnouncements() {
    console.log("Fetching announcements...");
    api.student.announcements.getAll()
      .then((res) => {
        console.log("API response status:", res.status);
        if (!res.ok) throw new Error("Failed to fetch announcements");
        return res.json();
      })
      .then((data) => {
        console.log("Received announcements data:", data);
        announcements = data;
        renderAnnouncements(announcements, "announcements-container");
      })
      .catch((err) => {
        console.error("Error fetching announcements:", err);
        const container = document.querySelector("#announcements-container");
        container.innerHTML = `<div class="no-announcements text-center">${t("student.announcementsPage.errorLoading")}</div>`;
      });
  }

  function toggleDescription(containerId, id) {
    const descElement = document.getElementById(`desc-${containerId}-${id}`);
    const expandBtn = document.getElementById(`expand-${containerId}-${id}`);
    const btnText = expandBtn.querySelector("span");

    if (descElement.classList.contains("collapsed")) {
      descElement.classList.remove("collapsed");
      descElement.classList.add("expanded");
      btnText.textContent = t("student.announcementsPage.showLess");
      expandBtn.classList.add("expanded");
    } else {
      descElement.classList.remove("expanded");
      descElement.classList.add("collapsed");
      btnText.textContent = t("student.announcementsPage.showMore");
      expandBtn.classList.remove("expanded");
    }
  }

  // Initialize
  fetchAnnouncements();

  window.addEventListener("languageChanged", () => {
    fetchAnnouncements();
  });
</script>
