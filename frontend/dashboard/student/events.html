<link rel="stylesheet" href="/css/events.css" />

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<div class="events-header">
  <div>
    <h1 data-en="Events Calendar" data-si="සිදුවීම් දින දර්ශනය" data-ta="நிகழ்வுகள் நாட்காட்டி">Events Calendar</h1>
    <p class="text-sm" style="color: var(--color-subtext); margin-top: 4px;" data-en="Your class events and school events" data-si="ඔබේ පන්තියේ සිදුවීම් සහ පාසල් සිදුවීම්" data-ta="உங்கள் வகுப்பு நிகழ்வுகள் மற்றும் பள்ளி நிகழ்வுகள்">Your class events and school events</p>
  </div>
</div>

<div class="calendar-container">
  <div id="calendar"></div>
</div>

<modal-dialog id="event-details-modal" title="Event Details">
  <div id="event-details-content">
    <div class="event-details-meta">
      <h2 id="detail-title" style="margin: 0 0 12px 0; font-size: 1.4rem; color: var(--color-text);">Title</h2>
      <p><i class="fas fa-calendar-day" style="width: 20px;"></i> <span id="detail-date">Date</span></p>
      <p><i class="fas fa-user-circle" style="width: 20px;"></i> <span id="detail-creator">Creator</span> (<span id="detail-role">Role</span>)</p>
      <p><i class="fas fa-users" style="width: 20px;"></i> <span class="event-badge" id="detail-audience">Audience</span></p>
    </div>
    <div class="event-details-desc" id="detail-desc"></div>
    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
      <button class="btn btn-secondary" onclick="document.getElementById('event-details-modal').close()" data-en="Close">Close</button>
    </div>
  </div>
</modal-dialog>

<script>
  let calendar;
  let allEvents = [];

  async function fetchEvents() {
    try {
      const res = await api.student.events.getAll();
      if (res.ok) {
        allEvents = await res.json();
        renderCalendar();
      }
    } catch (e) {
      console.error(e);
      toast("Error loading events", "fa-solid fa-circle-exclamation");
    }
  }

  function renderCalendar() {
    const calendarEl = document.getElementById('calendar');
    const calendarEvents = allEvents.map(ev => ({
      id: ev.id,
      title: ev.title,
      start: ev.event_date.split('T')[0],
      extendedProps: {
        description: ev.description,
        creator: ev.creator_full_name || ev.creator_name,
        role: ev.creator_role,
        audience: ev.target_audience
      }
    }));

    if (calendar) calendar.destroy();

    calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
      events: calendarEvents,
      eventClick: function(info) { showEventDetails(info.event); },
      height: 'auto',
      eventColor: 'var(--color-primary)',
      displayEventTime: false
    });
    calendar.render();
  }

  function showEventDetails(event) {
    const props = event.extendedProps;
    document.getElementById('detail-title').textContent = event.title;
    document.getElementById('detail-date').textContent = new Date(event.start).toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('detail-creator').textContent = props.creator;
    document.getElementById('detail-role').textContent = props.role;
    
    const audienceLabels = { 'both': 'Everyone', 'students': 'Students', 'my_students': 'My Class' };
    document.getElementById('detail-audience').textContent = audienceLabels[props.audience] || props.audience;
    document.getElementById('detail-desc').textContent = props.description;
    
    document.getElementById('event-details-modal').open();
  }

  function initCalendar() {
    if (typeof FullCalendar === 'undefined') {
      setTimeout(initCalendar, 100);
      return;
    }
    fetchEvents();
  }
  initCalendar();
</script>
