<section class="section">
  <h2 class="heading">
    <i class="fas fa-certificate"></i>
    <span data="sidebar.certificates">Certificates</span>
  </h2>

  <div class="card-grid">
    <!-- Request Form Card -->
    <div class="card w-2">
      <div class="icon-title">
        <i class="fas fa-file-alt icon"></i>
        <p class="tile-label" data-en="Request a Certificate" data-si="සහතලයක් ඉල්ලන්න" data-ta="சாண்று கோர்க்க">Request a Certificate</p>
      </div>
      <form id="certificateForm" style="margin-top: 16px;">
        <div class="input-group">
          <label class="input-label" data-en="Certificate Type" data-si="සහතලයේ වර්ගය" data-ta="சாண்று வகை">Certificate Type</label>
          <select id="certificateType" class="input-field" required>
            <option value="character" data-en="Character Certificate" data-si="සිලිතය සහතලය" data-ta="தக்ளி சாண்று">Character Certificate</option>
            <option value="leaving" data-en="Leaving Certificate" data-si="ඉවත් වීමේ සහතලය" data-ta="பிரிவு சாண்று">Leaving Certificate</option>
            <option value="enrollment" data-en="Enrollment Letter" data-si="ලියාපෑදැම්කාර ලියේටරය" data-ta="சேர்க்கை கடிதம்">Enrollment Letter</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label" data-en="Reason for Request" data-si="ඉල්ලන කාරණය" data-ta="கோர்க்க முகவாய்">Reason for Request</label>
          <textarea id="reason" class="input-field" rows="3" placeholder="Why do you need this certificate?" required></textarea>
        </div>
        <div style="display: flex; gap: 8px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary" style="flex: 1;">
            <i class="fas fa-paper-plane"></i>
            <span data-en="Submit" data-si="ඉල්ලන යොමන්න" data-ta="கோர்க்க">Submit</span>
          </button>
          <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="showPreview()">
            <i class="fas fa-eye"></i>
            <span data-en="Preview" data-si="පෙරලම" data-ta="முன்னோட்ட">Preview</span>
          </button>
        </div>
      </form>
    </div>

    <!-- Your Requests Card -->
    <div class="card w-1">
      <div class="icon-title">
        <i class="fas fa-inbox icon"></i>
        <p class="tile-label" data-en="Your Requests" data-si="ඔබේ ඉල්ලම්" data-ta="உங்கள் கோர்க்கை">Your Requests</p>
      </div>
      <div id="requestsList" style="margin-top: 16px; max-height: 300px; overflow-y: auto;">
        <p class="text-sm text-muted" data-en="No requests yet" data-si="තවම ඉල්ලම් නැත" data-ta=" இன்னும் கோர்க்கவில்">No requests yet</p>
      </div>
    </div>
  </div>

  <!-- Certificate Preview Modal -->
  <modal-dialog id="certPreviewModal" title="Certificate Preview">
    <div class="certificate-preview" id="previewContent"></div>
    <div style="margin-top: 16px; display: flex; justify-content: flex-end;">
      <button class="btn btn-secondary" onclick="document.getElementById('certPreviewModal').close()">
        <span data-en="Close" data-si="වසන්න" data-ta="மூடு">Close</span>
      </button>
    </div>
  </modal-dialog>

  <style>
    .certificate-preview {
      font-family: 'Times New Roman', serif;
      line-height: 1.6;
      background: #fff;
      border: 1px solid #ddd;
      padding: 24px;
      color: #333;
    }
    .cert-school-name {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
      color: #1a1a1a;
    }
    .cert-school-address {
      text-align: center;
      margin-bottom: 20px;
      color: #555;
    }
    .cert-title {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      text-transform: uppercase;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 10px;
      margin-bottom: 20px;
      color: #1a1a1a;
    }
    .cert-intro {
      text-align: center;
      font-style: italic;
      margin-bottom: 20px;
      color: #333;
    }
    .cert-detail {
      margin: 12px 0;
      font-size: 16px;
      color: #333;
    }
    .cert-detail strong {
      display: inline-block;
      width: 180px;
      color: #1a1a1a;
    }
    .cert-achievements {
      margin: 20px 0;
      padding: 15px;
      background: #f5f5f5;
      border-left: 3px solid #0066aa;
    }
    .cert-achievements-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #1a1a1a;
    }
    .cert-achievement-item {
      margin: 8px 0;
      padding-left: 20px;
      position: relative;
      color: #333;
    }
    .cert-achievement-item::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #0066aa;
    }
    .cert-closing {
      text-align: center;
      font-style: italic;
      margin: 20px 0;
      color: #333;
    }
  </style>

  <script>
    function showToast(message, icon) {
      if (typeof toast === "function") {
        toast(message, icon);
      } else {
        alert(message);
      }
    }

    async function loadCertificateRequests() {
      const requestsList = document.getElementById("requestsList");
      try {
        const res = await api.student.certificates.getAll();
        if (!res.ok) throw new Error("Failed to load");
        const data = await res.json();

        if (data.length === 0) {
          requestsList.innerHTML = "";
          const emptyEl = document.createElement("empty-state-message");
          emptyEl.setAttribute("icon", "fas fa-file-alt");
          emptyEl.setAttribute("data-message", "student.certificatesPage.noCertificates");
          requestsList.appendChild(emptyEl);
          return;
        }

        requestsList.innerHTML = data.map(req => `
          <div class="request-item" style="padding: 12px; margin-bottom: 8px; background: var(--color-bg); border-radius: 8px; border-left: 3px solid var(--color-primary);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <strong>${req.type}</strong>
              <span>${req.status}</span>
            </div>
            <p class="text-sm text-muted" style="margin-top: 4px;">${req.reason}</p>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
              <small class="text-sm text-muted">${new Date(req.created_at).toLocaleDateString()}</small>
              ${req.status === 'pending' ? `<button class="btn btn-small btn-secondary" onclick="deleteRequest(${req.id})"><i class="fas fa-trash"></i></button>` : ''}
            </div>
          </div>
        `).join("");
      } catch (err) {
        console.error("Error loading certificates:", err);
        requestsList.innerHTML = "";
        const emptyEl = document.createElement("empty-state-message");
        emptyEl.setAttribute("icon", "fas fa-exclamation-triangle");
        emptyEl.setAttribute("data-message", "student.certificatesPage.errorLoading");
        requestsList.appendChild(emptyEl);
      }
    }

    async function getSchoolDetails() {
      try {
        const res = await api.admin.schoolDetails.get();
        if (!res.ok) return {};
        return await res.json();
      } catch (err) {
        return {};
      }
    }

    async function getStudentAchievements() {
      try {
        const res = await api.student.achievements.getAll();
        if (!res.ok) return [];
        return await res.json();
      } catch (err) {
        return [];
      }
    }

    async function renderPreview(type) {
      const content = document.getElementById("previewContent");
      const school = await getSchoolDetails();
      const studentRes = await api.student.profile.get();
      const studentData = studentRes.ok ? await studentRes.json() : {};
      const achievements = type === "character" ? await getStudentAchievements() : [];

      const schoolName = school.school_name || "ST. MARY'S HIGH SCHOOL";
      const schoolAddress = school.address || "123 Education Street, Academic City";
      const schoolPhone = school.phone || "";

      let achievementsHtml = "";
      if (type === "character" && achievements.length > 0) {
        achievementsHtml = `
          <div class="cert-achievements">
            <div class="cert-achievements-title">Academic & Co-curricular Achievements:</div>
            ${achievements.map(a => `<div class="cert-achievement-item">${a.title} - ${new Date(a.achieved_at).getFullYear()}</div>`).join("")}
          </div>
        `;
      }

      let typeSpecificHtml = "";
      if (type === "character") {
        typeSpecificHtml = `
          <div class="cert-intro">"This is to certify that the student has maintained excellent character and conduct during their tenure at our institution."</div>
        `;
      } else if (type === "leaving") {
        typeSpecificHtml = `
          <div class="cert-intro">"This is to certify that the student was duly enrolled in this institution and has completed their studies satisfactorily."</div>
        `;
      } else if (type === "enrollment") {
        typeSpecificHtml = `
          <div class="cert-intro">"To Whom It May Concern - This letter serves as official confirmation of the current enrollment status."</div>
        `;
      }

      const typeTitle = type === "character" ? "Character Certificate" : 
                    type === "leaving" ? "Leaving Certificate" : "Enrollment Letter";

      content.innerHTML = `
        <div>
          <div class="cert-school-name">${schoolName}</div>
          <div class="cert-school-address">${schoolAddress}${schoolPhone ? ' | ' + schoolPhone : ''}</div>
          <div class="cert-title">${typeTitle}</div>

          ${typeSpecificHtml}

          <div class="cert-detail"><strong>Student Name:</strong> ${studentData.full_name || "N/A"}</div>
          <div class="cert-detail"><strong>Grade:</strong> ${studentData.class_grade ? "Grade " + studentData.class_grade : "N/A"}</div>
          <div class="cert-detail"><strong>Class:</strong> ${studentData.class_name || "N/A"}</div>
          <div class="cert-detail"><strong>Admission No:</strong> ${studentData.username || "N/A"}</div>

          ${achievementsHtml}

          <div class="cert-closing">"We wish this student success in all future endeavors."</div>
        </div>
      `;
    }

    function showPreview() {
      const type = document.getElementById("certificateType").value;
      renderPreview(type);
      document.getElementById("certPreviewModal").open();
    }

    function handleTypeChange() {
      // Just update internally when type changes, user can click preview to see
    }

    async function deleteRequest(id) {
      if (!confirm("Are you sure you want to delete this request?")) return;
      try {
        const res = await api.student.certificates.delete(id);
        if (!res.ok) throw new Error("Failed to delete");
        showToast("Request deleted", "fa-solid fa-check");
        loadCertificateRequests();
      } catch (err) {
        console.error("Error deleting certificate:", err);
        showToast("Failed to delete request", "fa-solid fa-circle-exclamation");
      }
    }

    async function submitCertificateRequest(e) {
      e.preventDefault();
      const type = document.getElementById("certificateType").value;
      const reason = document.getElementById("reason").value;

      try {
        const res = await api.student.certificates.create({ type, reason });
        if (!res.ok) throw new Error("Failed to submit");

        showToast("Certificate request submitted!", "fa-solid fa-check");
        document.getElementById("reason").value = "";
        loadCertificateRequests();
      } catch (err) {
        console.error("Error submitting certificate:", err);
        showToast("Failed to submit request", "fa-solid fa-circle-exclamation");
      }
    }

    document.getElementById("certificateForm").addEventListener("submit", submitCertificateRequest);
    document.getElementById("certificateType").addEventListener("change", handleTypeChange);

    // Initialize on page load
    loadCertificateRequests();
    if (typeof makeSearchableDropdown === "function") {
      makeSearchableDropdown("certificateType", function(value) {
        handleTypeChange();
      });
    }
  </script>
</section>
