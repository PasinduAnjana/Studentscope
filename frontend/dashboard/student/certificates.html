<section class="section">
  <h2 class="heading">
    <i class="fas fa-certificate"></i>
    <span data="sidebar.certificates">Certificates</span>
  </h2>

  <div class="card-grid">
    <!-- Request Form Card -->
    <div class="card w-2">
      <h3 class="tile-label" data-en="Request a Certificate" data-si="සහතලයක් ඉල්ලන්න" data-ta="சான்று கோர்க்க">Request a Certificate</h3>
      <form id="certificateForm" style="margin-top: 16px;">
        <div class="input-group">
          <label class="input-label" data-en="Certificate Type" data-si="සහතලයේ වර්ගය" data-ta="சான்று வகை">Certificate Type</label>
          <select id="certificateType" class="input-field" required>
            <option value="character" data-en="Character Certificate" data-si="සිලිතය සහතලය" data-ta="தக்ளி சான்று">Character Certificate</option>
            <option value="leaving" data-en="Leaving Certificate" data-si="ඉවත් වීමේ සහතලය" data-ta="பிரிவு சான்று">Leaving Certificate</option>
            <option value="enrollment" data-en="Enrollment Letter" data-si="ලියාපෑදැම්කාර ලියේටරය" data-ta="சேர்க்கை கடிதம்">Enrollment Letter</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label" data-en="Reason for Request" data-si="ඉල්ලන කාරණය" data-ta="கோர்க்க முகவாய்">Reason for Request</label>
          <textarea id="reason" class="input-field" rows="3" placeholder="Why do you need this certificate?" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
          <i class="fas fa-paper-plane"></i>
          <span data-en="Submit Request" data-si="ඉල්ලන යොමන්න" data-ta="கோர்க்க">Submit Request</span>
        </button>
      </form>
    </div>

    <!-- Your Requests Card -->
    <div class="card w-1">
      <h3 class="tile-label" data-en="Your Requests" data-si="ඔබේ ඉල්ලම්" data-ta="உங்கள் கோர்க்கை">Your Requests</h3>
      <div id="requestsList" style="margin-top: 16px;">
        <p class="text-sm text-muted" data-en="No requests yet" data-si="තවම ඉල්ලම් නැත" data-ta=" இன்னும் கோர்க்கவில்">No requests yet</p>
      </div>
    </div>
  </div>

  <!-- Certificate Preview -->
  <div id="certificatePreview" class="card" style="margin-top: 24px; display: none;">
    <h3 class="tile-label" data-en="Preview" data-si="පෙරලම" data-ta="முன்னோட்ட">Preview</h3>
    <div class="certificate-preview" style="margin-top: 16px; padding: 24px; border: 2px dashed var(--color-border); border-radius: 12px; background: var(--color-card);">
      <div style="text-align: center; margin-bottom: 20px;">
        <h4 style="color: var(--color-primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;">ST. MARY'S HIGH SCHOOL</h4>
        <p class="text-sm text-muted">123 Education Street, Academic City</p>
      </div>
      <div id="previewContent"></div>
    </div>
  </div>

  <script>
    function showToast(message, icon) {
      if (typeof toast === "function") {
        toast(message, icon);
      } else {
        alert(message);
      }
    }

    async function loadCertificateRequests() {
      const requestsList = document.getElementById("requestsList");
      try {
        const res = await api.student.certificates.getAll();
        if (!res.ok) throw new Error("Failed to load");
        const data = await res.json();

        if (data.length === 0) {
          requestsList.innerHTML = '<p class="text-sm text-muted">No requests yet</p>';
          return;
        }

        requestsList.innerHTML = data.map(req => `
          <div class="request-item" style="padding: 12px; margin-bottom: 8px; background: var(--color-bg); border-radius: 8px; border-left: 3px solid var(--color-primary);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <strong>${req.type}</strong>
              <span class="status-${req.status}">${req.status}</span>
            </div>
            <p class="text-sm text-muted" style="margin-top: 4px;">${req.reason}</p>
            <small class="text-sm text-muted">${new Date(req.created_at).toLocaleDateString()}</small>
          </div>
        `).join("");
      } catch (err) {
        console.error("Error loading certificates:", err);
        requestsList.innerHTML = '<p class="text-error">Error loading requests</p>';
      }
    }

    function updatePreview() {
      const type = document.getElementById("certificateType").value;
      const preview = document.getElementById("certificatePreview");
      const content = document.getElementById("previewContent");

      const templates = {
        character: `
          <div style="text-align: center; margin-bottom: 20px; font-style: italic;">"This is to certify that the student has maintained excellent character and conduct."</div>
          <div style="margin-bottom: 16px;">
            <strong>Student:</strong> <span id="studentName">Loading...</span><br>
            <strong>Grade:</strong> <span id="studentGrade">-</span><br>
            <strong>Class:</strong> <span id="studentClass">-</span>
          </div>
        `,
        leaving: `
          <div style="text-align: center; margin-bottom: 20px; font-style: italic;">"This is to certify that the student was duly enrolled and has completed studies satisfactorily."</div>
          <div style="margin-bottom: 16px;">
            <strong>Student:</strong> <span id="studentName">Loading...</span><br>
            <strong>Grade:</strong> <span id="studentGrade">-</span><br>
            <strong>Date of Enrollment:</strong> <span id="enrollmentDate">-</span>
          </div>
        `,
        enrollment: `
          <div style="text-align: center; margin-bottom: 20px; font-style: italic;">"This letter confirms current enrollment status."</div>
          <div style="margin-bottom: 16px;">
            <strong>Student:</strong> <span id="studentName">Loading...</span><br>
            <strong>Grade:</strong> <span id="studentGrade">-</span><br>
            <strong>Academic Year:</strong> <span id="academicYear">-</span>
          </div>
        `
      };

      content.innerHTML = templates[type] || "";
      preview.style.display = "block";
    }

    async function loadStudentData() {
      try {
        const res = await api.student.profile.get();
        const data = await res.json();

        const preview = document.getElementById("previewContent");
        if (!preview) return;

        const studentNameEl = preview.querySelector("#studentName");
        const studentGradeEl = preview.querySelector("#studentGrade");
        const studentClassEl = preview.querySelector("#studentClass");
        const enrollmentDateEl = preview.querySelector("#enrollmentDate");
        const academicYearEl = preview.querySelector("#academicYear");

        if (studentNameEl) studentNameEl.textContent = data.full_name || "N/A";
        if (studentGradeEl) studentGradeEl.textContent = data.class_grade ? "Grade " + data.class_grade : "N/A";
        if (studentClassEl) studentClassEl.textContent = data.class_name || "N/A";
        if (enrollmentDateEl) enrollmentDateEl.textContent = data.enrolled_at || "N/A";
        if (academicYearEl) academicYearEl.textContent = new Date().getFullYear();
      } catch (err) {
        console.error("Error loading student data:", err);
      }
    }

    async function submitCertificateRequest(e) {
      e.preventDefault();
      const type = document.getElementById("certificateType").value;
      const reason = document.getElementById("reason").value;

      try {
        const res = await api.student.certificates.create({ type, reason });
        if (!res.ok) throw new Error("Failed to submit");

        showToast("Certificate request submitted!", "fa-solid fa-check");
        document.getElementById("reason").value = "";
        loadCertificateRequests();
      } catch (err) {
        console.error("Error submitting certificate:", err);
        showToast("Failed to submit request", "fa-solid fa-circle-exclamation");
      }
    }

    function handleTypeChange() {
      updatePreview();
      setTimeout(loadStudentData, 0);
    }

    document.getElementById("certificateForm").addEventListener("submit", submitCertificateRequest);
    document.getElementById("certificateType").addEventListener("change", handleTypeChange);

    // Initialize on page load
    updatePreview();
    setTimeout(loadStudentData, 0);
    loadCertificateRequests();
  </script>
</section>
