<section class="section">
  <h2 class="heading">
    <i class="fas fa-certificate"></i>
    <span data="sidebar.certificateApproval">Certificate Approvals</span>
  </h2>

  <!-- Summary Tiles -->
  <div class="card-grid" style="margin-bottom: 24px;">
    <div class="card">
      <div class="icon-title">
        <i class="fas fa-clock icon"></i>
        <p class="tile-label" data="admin.certificates.pending">Pending</p>
      </div>
      <p class="tile-value" id="pendingCount">-</p>
    </div>
    <div class="card">
      <div class="icon-title">
        <i class="fas fa-check-circle icon"></i>
        <p class="tile-label" data="admin.certificates.approved">Approved</p>
      </div>
      <p class="tile-value" id="approvedCount">-</p>
    </div>
    <div class="card">
      <div class="icon-title">
        <i class="fas fa-times-circle icon"></i>
        <p class="tile-label" data="admin.certificates.rejected">Rejected</p>
      </div>
      <p class="tile-value" id="rejectedCount">-</p>
    </div>
    <div class="card">
      <div class="icon-title">
        <i class="fas fa-file-alt icon"></i>
        <p class="tile-label" data="admin.certificates.total">Total</p>
      </div>
      <p class="tile-value" id="totalCount">-</p>
    </div>
  </div>

  <!-- Certificate Requests Table -->
  <div class="card">
    <div class="icon-title">
      <i class="fas fa-table icon"></i>
      <p class="tile-label" data="admin.certificates.certificateRequests">Certificate Requests</p>
    </div>

    <data-table id="certificates-table">
      <div slot="filters">
        <div class="filter-group">
          <div>
            <select id="statusFilter" class="dropdown-select">
              <option value="all" data="admin.certificates.allStatus">All Status</option>
              <option value="pending" data="admin.certificates.pending">Pending</option>
              <option value="approved" data="admin.certificates.approved">Approved</option>
              <option value="rejected" data="admin.certificates.rejected">Rejected</option>
            </select>
          </div>
          <div>
            <select id="typeFilter" class="dropdown-select">
              <option value="all" data="admin.certificates.allTypes">All Types</option>
              <option value="character" data="admin.certificates.characterCertificate">Character Certificate</option>
              <option value="leaving" data="admin.certificates.leavingCertificate">Leaving Certificate</option>
              <option value="enrollment" data="admin.certificates.enrollmentLetter">Enrollment Letter</option>
            </select>
          </div>
        </div>
      </div>
    </data-table>
  </div>
</section>

<link rel="stylesheet" href="../../css/dropdown.css" />

<!-- Modal for Preview using ModalDialog component -->
<modal-dialog id="certModal" title="admin.certificates.certificatePreview">
  <div id="certPreview" class="certificate-preview">
    <!-- Certificate content will be rendered here -->
  </div>
  <div class="modal-actions" style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--color-border);">
    <button class="btn btn-primary" id="approveBtn" onclick="approveCertificate()">
      <i class="fas fa-check"></i> <span data="admin.certificates.approve">Approve</span>
    </button>
    <button class="btn btn-danger" id="rejectBtn" onclick="rejectCertificate()">
      <i class="fas fa-times"></i> <span data="admin.certificates.reject">Reject</span>
    </button>
    <button class="btn btn-secondary" onclick="printCertificate()">
      <i class="fas fa-print"></i> <span data="admin.certificates.print">Print</span>
    </button>
  </div>
</modal-dialog>

<script src="../../js/dropdown.js"></script>
<style>
  .modal-actions { margin-top: 16px; display: flex; gap: 12px; justify-content: flex-end; }
  .filter-group {
    display: flex;
    flex-direction: row;
    gap: 12px;
    margin: 16px 0;
    align-items: flex-end;
  }
  .filter-group > div {
    flex: 0 0 auto;
    min-width: 180px;
  }
  .action-buttons {
    display: flex;
    gap: 6px;
  }
  .badge {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
    text-transform: capitalize;
  }
  .badge-pending {
    background: #fff3cd;
    color: #856404;
  }
  .badge-approved {
    background: #d4edda;
    color: #155724;
  }
  .badge-rejected {
    background: #f8d7da;
    color: #721c24;
  }
  .certificate-preview {
    font-family: 'Times New Roman', serif; line-height: 1.6;
    background: #fff;
    border: 1px solid #ddd;
    padding: 20px;
    margin: 0;
    color: #333;
  }
  .cert-school-name {
    font-size: 24px; font-weight: bold; text-align: center;
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;
    color: #1a1a1a;
  }
  .cert-school-address {
    text-align: center; margin-bottom: 20px; color: #555;
  }
  .cert-title {
    font-size: 20px; font-weight: bold; text-align: center;
    text-transform: uppercase;
    border-bottom: 2px solid #1a1a1a;
    padding-bottom: 10px; margin-bottom: 20px;
    color: #1a1a1a;
  }
  .cert-intro {
    text-align: center; font-style: italic; margin-bottom: 20px;
    color: #333;
  }
  .cert-detail {
    margin: 12px 0; font-size: 16px;
    color: #333;
  }
  .cert-detail strong { display: inline-block; width: 180px; color: #1a1a1a; }
  .cert-achievements {
    margin: 20px 0; padding: 15px; background: #f5f5f5; border-left: 3px solid #0066aa;
  }
  .cert-achievements-title {
    font-weight: bold; margin-bottom: 10px;
    color: #1a1a1a;
  }
  .cert-achievement-item {
    margin: 8px 0; padding-left: 20px; position: relative;
    color: #333;
  }
  .cert-achievement-item::before {
    content: "•"; position: absolute; left: 0; color: #0066aa;
  }
  .cert-closing {
    text-align: center; font-style: italic; margin: 20px 0;
    color: #333;
  }
  .cert-signature {
    margin-top: 40px; display: flex; justify-content: space-between;
  }
  .cert-signature-box {
    text-align: center; width: 200px;
  }
  .cert-signature-line {
    border-bottom: 2px solid #1a1a1a; margin-bottom: 8px; height: 50px;
    color: #1a1a1a;
  }
  @media print {
    body * { visibility: hidden; }
    #certPreview, #certPreview * { visibility: visible; }
    #certPreview {
      position: absolute; left: 0; top: 0; width: 100%;
      border: none; margin: 0; padding: 0;
    }
    .no-print { display: none !important; }
  }
</style>

<script>
  let currentCertId = null;
  let currentCertData = null;

  function showToast(message, icon) {
    if (typeof toast === "function") {
      toast(message, icon);
    } else {
      alert(message);
    }
  }

  function getStatusLabel(status) {
    const labels = {
      pending: t("admin.certificates.pending"),
      approved: t("admin.certificates.approved"),
      rejected: t("admin.certificates.rejected")
    };
    return labels[status] || status;
  }

  function initTable() {
    const table = document.getElementById("certificates-table");
    
    table.setColumns([
      { key: "student_name", header: t("admin.certificates.student"), searchable: true },
      { key: "class_display", header: t("admin.certificates.class"), searchable: true },
      { key: "type", header: t("admin.certificates.type"), searchable: true },
      { 
        key: "created_at", 
        header: t("admin.certificates.date"),
        render: (row) => new Date(row.created_at).toLocaleDateString()
      },
      { 
        key: "status", 
        header: t("admin.certificates.status"),
        render: (row) => `<span class="badge badge-${row.status}">${getStatusLabel(row.status)}</span>`
      },
      {
        key: "actions",
        header: t("admin.certificates.actions"),
        render: (row) => {
          const div = document.createElement("div");
          div.className = "action-buttons";
          div.innerHTML = `
            <button class="btn btn-small btn-secondary" onclick="viewCertificate(${row.id})">
              <i class="fas fa-eye"></i>
            </button>
            ${row.status === "pending" ? `
            <button class="btn btn-small btn-primary" onclick="quickApprove(${row.id})">
              <i class="fas fa-check"></i>
            </button>
            <button class="btn btn-small btn-danger" onclick="quickReject(${row.id})">
              <i class="fas fa-times"></i>
            </button>
            ` : ""}
          `;
          return div;
        }
      }
    ]);
    
    table.setEmptyState(t("admin.certificates.noCertificatesFound"), "fas fa-certificate");
  }

  // Reinitialize table on language change
  window.addEventListener("languageChanged", () => {
    const table = document.getElementById("certificates-table");
    if (table) {
      initTable();
      // Re-render certificate preview if open
      if (currentCertData) {
        renderCertificatePreview(currentCertData);
      }
    }
  });

  function setupFilters() {
    const table = document.getElementById("certificates-table");
    const statusFilter = document.getElementById("statusFilter");
    const typeFilter = document.getElementById("typeFilter");

    if (typeof makeSearchableDropdown === "function") {
      makeSearchableDropdown("statusFilter", () => {
        const val = statusFilter.value;
        table.addFilter("status", (row) => val === "all" || row.status === val);
        table.filterData();
        updateSummaryTiles();
      });

      makeSearchableDropdown("typeFilter", () => {
        const val = typeFilter.value;
        table.addFilter("type", (row) => val === "all" || row.type === val);
        table.filterData();
        updateSummaryTiles();
      });
    }
  }

  function updateSummaryTiles() {
    const table = document.getElementById("certificates-table");
    const data = table.filteredData || [];
    
    const pending = data.filter(c => c.status === "pending").length;
    const approved = data.filter(c => c.status === "approved").length;
    const rejected = data.filter(c => c.status === "rejected").length;
    const total = data.length;
    
    document.getElementById("pendingCount").textContent = pending;
    document.getElementById("approvedCount").textContent = approved;
    document.getElementById("rejectedCount").textContent = rejected;
    document.getElementById("totalCount").textContent = total;
  }

  async function loadCertificates() {
    try {
      const res = await api.admin.certificates.getAll();
      if (!res.ok) throw new Error("Failed to load");
      const data = await res.json();
      
      const table = document.getElementById("certificates-table");
      table.setData(data);
      updateSummaryTiles();
    } catch (err) {
      console.error("Error loading certificates:", err);
    }
  }

  async function viewCertificate(id) {
    currentCertId = id;
    try {
      const res = await api.admin.certificates.getById(id);
      if (!res.ok) throw new Error("Failed to load");
      currentCertData = await res.json();
      
      renderCertificatePreview(currentCertData);
      
      // Show/hide buttons based on status
      const approveBtn = document.getElementById("approveBtn");
      const rejectBtn = document.getElementById("rejectBtn");
      if (currentCertData.status === "pending") {
        approveBtn.style.display = "inline-block";
        rejectBtn.style.display = "inline-block";
      } else {
        approveBtn.style.display = "none";
        rejectBtn.style.display = "none";
      }
      
      // Use ModalDialog component's open() method
      document.getElementById("certModal").open();
    } catch (err) {
      console.error("Error loading certificate:", err);
      showToast(t("admin.certificates.certLoadError"), "fa-solid fa-circle-exclamation");
    }
  }

function closeModal() {
    document.getElementById("certModal").close();
    currentCertId = null;
    currentCertData = null;
  }

  async function getSchoolDetails() {
    try {
      const res = await api.admin.schoolDetails.get();
      if (!res.ok) return {};
      return await res.json();
    } catch (err) {
      return {};
    }
  }

  async function renderCertificatePreview(cert) {
    const school = await getSchoolDetails();
    const schoolName = school.school_name || "SCHOOL NAME";
    const schoolAddress = school.address || "Address";
    const schoolPhone = school.phone || "Phone";
    const principalName = school.principal_name || "Principal";
    
    let achievementsHtml = "";
    if (cert.type === "character" && cert.achievements && cert.achievements.length > 0) {
      achievementsHtml = `
        <div class="cert-achievements">
          <div class="cert-achievements-title">${t("admin.certificates.academicAchievements")}</div>
          ${cert.achievements.map(a => `<div class="cert-achievement-item">${a.title} - ${new Date(a.achieved_at).getFullYear()}</div>`).join("")}
        </div>
      `;
    }
    
    let typeSpecificHtml = "";
    if (cert.type === "character") {
      typeSpecificHtml = `
        <div class="cert-intro">"${t("admin.certificates.characterIntro")}"</div>
      `;
    } else if (cert.type === "leaving") {
      typeSpecificHtml = `
        <div class="cert-intro">"${t("admin.certificates.leavingIntro")}"</div>
        <div class="cert-detail"><strong>${t("admin.certificates.reasonForLeaving")}</strong> ${cert.reason || t("admin.certificates.notApplicable")}</div>
      `;
    } else if (cert.type === "enrollment") {
      typeSpecificHtml = `
        <div class="cert-intro">"${t("admin.certificates.enrollmentIntro")}"</div>
        <div class="cert-detail"><strong>${t("admin.certificates.enrollmentStatus")}</strong> ${t("admin.certificates.activeFullTime")}</div>
        <div class="cert-detail"><strong>${t("admin.certificates.academicStanding")}</strong> ${t("admin.certificates.goodStanding")}</div>
      `;
    }
    
    const typeTitle = cert.type === "character" ? t("admin.certificates.characterCertificate") : 
                    cert.type === "leaving" ? t("admin.certificates.leavingCertificate") : t("admin.certificates.enrollmentLetter");
    
    document.getElementById("certPreview").innerHTML = `
      <div class="certificate-preview">
        <div class="cert-school-name">${schoolName}</div>
        <div class="cert-school-address">${schoolAddress} | ${schoolPhone}</div>
        <div class="cert-title">${typeTitle}</div>
        
        ${typeSpecificHtml}
        
        <div class="cert-detail"><strong>${t("admin.certificates.studentName")}</strong> ${cert.student_name || cert.index_number}</div>
        <div class="cert-detail"><strong>${t("admin.certificates.grade")}</strong> ${cert.grade || "-"}</div>
        <div class="cert-detail"><strong>${t("admin.certificates.class")}</strong> ${cert.class_name || "-"}</div>
        <div class="cert-detail"><strong>${t("admin.certificates.admissionNo")}</strong> ${cert.index_number}</div>
        
        ${achievementsHtml}
        
        <div class="cert-closing">"${t("admin.certificates.weRecommend")}"</div>
        
        <div class="cert-signature">
          <div class="cert-signature-box">
            <div class="cert-signature-line"></div>
            <div>${t("admin.certificates.classTeacher")}</div>
          </div>
          <div class="cert-signature-box">
            <div class="cert-signature-line"></div>
            <div>${principalName}</div>
            <div>${t("admin.certificates.principal")}</div>
          </div>
        </div>
      </div>
    `;
  }

  async function approveCertificate() {
    if (!currentCertId) return;
    try {
      const res = await api.admin.certificates.approve(currentCertId);
      if (!res.ok) throw new Error("Failed to approve");
      showToast(t("admin.certificates.certApproved"), "fa-solid fa-check");
      closeModal();
      loadCertificates();
    } catch (err) {
      console.error("Error approving certificate:", err);
      showToast(t("admin.certificates.certApproveError"), "fa-solid fa-circle-exclamation");
    }
  }

  async function rejectCertificate() {
    if (!currentCertId) return;
    try {
      const res = await api.admin.certificates.reject(currentCertId);
      if (!res.ok) throw new Error("Failed to reject");
      showToast(t("admin.certificates.certRejected"), "fa-solid fa-check");
      closeModal();
      loadCertificates();
    } catch (err) {
      console.error("Error rejecting certificate:", err);
      showToast(t("admin.certificates.certRejectError"), "fa-solid fa-circle-exclamation");
    }
  }

  async function quickApprove(id) {
    try {
      const res = await api.admin.certificates.approve(id);
      if (!res.ok) throw new Error("Failed to approve");
      showToast(t("admin.certificates.certApproved"), "fa-solid fa-check");
      loadCertificates();
    } catch (err) {
      showToast(t("admin.certificates.certApproveError"), "fa-solid fa-circle-exclamation");
    }
  }

  async function quickReject(id) {
    try {
      const res = await api.admin.certificates.reject(id);
      if (!res.ok) throw new Error("Failed to reject");
      showToast(t("admin.certificates.certRejected"), "fa-solid fa-check");
      loadCertificates();
    } catch (err) {
      showToast(t("admin.certificates.certRejectError"), "fa-solid fa-circle-exclamation");
    }
  }

  async function printCertificate() {
    // Get the print-ready content
    const previewContent = document.getElementById("certPreview").innerHTML;
    
    // Open a new window for printing
    const printWindow = window.open("", "_blank");
    printWindow.document.write(`
      <!DOCTYPE html>
      <html>
      <head>
        <title>Certificate - ${currentCertData?.type || "Certificate"}</title>
        <style>
          * { box-sizing: border-box; }
          body {
            font-family: 'Times New Roman', serif;
            margin: 0; padding: 40px;
            line-height: 1.6;
          }
          .certificate-preview { max-width: 800px; margin: 0 auto; }
          .cert-school-name {
            font-size: 24px; font-weight: bold; text-align: center;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;
          }
          .cert-school-address {
            text-align: center; margin-bottom: 20px; color: #666;
          }
          .cert-title {
            font-size: 20px; font-weight: bold; text-align: center;
            text-transform: uppercase; border-bottom: 2px solid #333;
            padding-bottom: 10px; margin-bottom: 20px;
          }
          .cert-intro {
            text-align: center; font-style: italic; margin-bottom: 20px;
          }
          .cert-detail {
            margin: 12px 0; font-size: 16px;
          }
          .cert-detail strong { display: inline-block; width: 180px; }
          .cert-achievements {
            margin: 20px 0; padding: 15px; background: #f9f9f9; border-left: 3px solid #0086bb;
          }
          .cert-achievements-title { font-weight: bold; margin-bottom: 10px; }
          .cert-achievement-item { margin: 8px 0; padding-left: 20px; position: relative; }
          .cert-achievement-item::before {
            content: "•"; position: absolute; left: 0; color: #0086bb;
          }
          .cert-closing {
            text-align: center; font-style: italic; margin: 20px 0;
          }
          .cert-signature {
            margin-top: 40px; display: flex; justify-content: space-between;
          }
          .cert-signature-box {
            text-align: center; width: 200px;
          }
          .cert-signature-line {
            border-bottom: 2px solid #333; margin-bottom: 8px; height: 50px;
          }
          @media print {
            body { padding: 20px; }
            .no-print { display: none; }
          }
        </style>
      </head>
      <body>
        <div class="certificate-preview">
          ${previewContent}
        </div>
      </body>
      </html>
    `);
    printWindow.document.close();
    printWindow.focus();
    setTimeout(() => {
      printWindow.print();
    }, 500);
  }

  // Click outside modal to close
  document.getElementById("certModal").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
  });

  // Initialize
  initTable();
  setupFilters();
  loadCertificates();
</script>
