<style>
  .profile-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .profile-tabs .btn.active { background: var(--color-primary); color: #fff; }
  .profile-section { display: none; }
  .profile-section.active { display: block; }
  .profile-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .profile-info-grid .info-item { padding: 8px 0; }
  .profile-info-grid .info-label { font-size: 12px; color: var(--color-subtext); text-transform: uppercase; margin-bottom: 4px; }
  .profile-info-grid .info-value { font-size: 15px; font-weight: 500; }
  .profile-info-grid .info-item.full-width { grid-column: span 2; }
  .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: var(--color-background); border-radius: 8px; padding: 12px; text-align: center; }
  .stat-card .stat-value { font-size: 24px; font-weight: 700; color: var(--color-primary); }
  .stat-card .stat-label { font-size: 12px; color: var(--color-subtext); }
  .chart-container { height: 200px; margin-top: 12px; }
  .cert-list { list-style: none; padding: 0; }
  .cert-list li { padding: 8px 12px; background: var(--color-background); border-radius: 6px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .cert-list li i { color: var(--color-primary); }
  @media (max-width: 640px) {
    .profile-info-grid { grid-template-columns: 1fr; }
    .profile-info-grid .info-item.full-width { grid-column: span 1; }
    .stat-cards { grid-template-columns: 1fr; }
  }
</style>

<section class="section">
  <h2 class="heading">
    <i class="fas fa-id-card"></i>
    <span data-en="Student Profiles" data-si="ශිෂ්‍ය ප්‍රොෆයිල" data-ta="மாணவர் சுயவிவரங்கள்">Student Profiles</span>
  </h2>
  <div class="card">
    <h1 class="title" data-en="Students" data-si="ශිෂ්‍යයන්" data-ta="மாணவர்கள்">Students</h1>
    <data-table id="students-table">
      <div slot="filters">
        <div style="display: flex; gap: 12px; align-items: center;">
          <div style="width: 160px;"><select id="class-filter" class="dropdown-select"><option value="">All Classes</option></select></div>
        </div>
      </div>
    </data-table>
  </div>
</section>

<modal-dialog id="profile-modal" title="Student Profile">
  <div id="profile-content"></div>
  <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
    <button id="profile-close" class="btn btn-secondary">Close</button>
  </div>
</modal-dialog>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  let allStudents = [];
  let allClasses = [];
  let currentProfile = null;
  let currentAttendance = null;
  let currentMarks = [];
  let currentBehavior = [];
  let currentGovExams = {};
  let attChart = null;
  let marksChart = null;

  function initTable() {
    const table = document.getElementById("students-table");
    table.setColumns([
      { key: "full_name", header: "Name", searchable: true },
      { key: "username", header: "Index Number", searchable: true },
      {
        key: "class_id",
        header: "Class",
        render: (row) => {
          const cls = allClasses.find((c) => c.id == row.class_id);
          return cls ? `${cls.grade} - ${cls.class_name}` : "";
        }
      },
      {
        key: "birthday",
        header: "Birthday",
        render: (row) => row.birthday ? new Date(row.birthday).toLocaleDateString() : "—"
      },
      {
        key: "gender",
        header: "Gender",
        render: (row) => row.gender === "M" ? "Male" : row.gender === "F" ? "Female" : "—"
      },
      {
        key: "parent",
        header: "Parent",
        render: (row) => row.parent ? row.parent.name : "—"
      },
      {
        key: "actions",
        header: "Actions",
        render: (row) => {
          const div = document.createElement("div");
          div.innerHTML = `<button class="btn btn-secondary" onclick="viewStudentProfile(${row.id})"><i class="fas fa-eye"></i> View Profile</button>`;
          return div;
        }
      }
    ]);

    const classFilter = document.getElementById("class-filter");
    if (classFilter) {
      classFilter.addEventListener("change", () => {
        const val = classFilter.value;
        table.addFilter("class", (row) => !val || row.class_id == val);
      });
    }

    table.setEmptyState("No students found", "fas fa-users-slash");
  }

  function fetchStudents() {
    api.admin.students.getAll()
      .then((res) => {
        if (!res.ok) throw new Error("Failed to fetch students");
        return res.json();
      })
      .then((data) => {
        allStudents = data.data || data;
        document.getElementById("students-table").setData(allStudents);
      })
      .catch((err) => {
        console.error(err);
        document.getElementById("students-table").setData([]);
        toast("Error loading students", "fa-solid fa-circle-exclamation");
      });
  }

  function fetchClasses() {
    api.admin.classes.getAll()
      .then((res) => {
        if (!res.ok) throw new Error("Failed to fetch classes");
        return res.json();
      })
      .then((data) => {
        allClasses = data.data || data;
        populateFilters();
        initTable();
      })
      .catch((err) => {
        console.error(err);
        toast("Error loading classes", "fa-solid fa-circle-exclamation");
      });
  }

  function populateFilters() {
    const classFilter = document.getElementById("class-filter");

    classFilter.innerHTML = '<option value="">All Classes</option>';
    allClasses.forEach(cls => {
      const opt = document.createElement("option");
      opt.value = cls.id;
      opt.textContent = `${cls.grade} - ${cls.class_name}`;
      classFilter.appendChild(opt);
    });

    if (typeof makeSearchableDropdown === "function") {
      makeSearchableDropdown("class-filter", (val, text) => {
        const sel = document.getElementById("class-filter");
        if (sel) sel.value = val;
        sel.dispatchEvent(new Event('change'));
      });
    }
  }

  async function viewStudentProfile(id) {
    const modal = document.getElementById("profile-modal");
    const content = document.getElementById("profile-content");
    content.innerHTML = '<p style="text-align:center;color:var(--color-subtext);padding:40px 0;">Loading profile...</p>';
    modal.open();

    try {
      const [profileRes, attRes, marksRes, behaviorRes, govRes] = await Promise.all([
        api.admin.students.getProfile(id),
        api.admin.students.getAttendance(id, "year"),
        api.admin.students.getMarks(id, null, ""),
        api.admin.students.getBehavior(id),
        api.admin.students.getGovExams(id),
      ]);

      const profileJson = await profileRes.json();
      const attJson = await attRes.json();
      const marksJson = await marksRes.json();
      const behaviorJson = await behaviorRes.json();
      const govJson = await govRes.json();

      currentProfile = profileJson.data || profileJson;
      currentAttendance = attJson.data || attJson;
      currentMarks = marksJson.data || marksJson;
      currentBehavior = behaviorJson.data || behaviorJson;
      currentGovExams = govJson.data || govJson;

      renderProfile();
    } catch (err) {
      console.error("Failed to load profile:", err);
      content.innerHTML = '<p style="text-align:center;color:#e74c3c;padding:40px 0;">Failed to load profile. Please try again.</p>';
    }
  }

  function renderProfile() {
    const p = currentProfile;
    const content = document.getElementById("profile-content");

    const genderLabel = p.gender === "M" ? "Male" : p.gender === "F" ? "Female" : "—";
    const classDisplay = p.grade ? `${p.grade} - ${p.class_name || ""}` : "—";

    content.innerHTML = `
      <div class="profile-tabs">
        <button class="btn active" onclick="switchProfileTab('overview')">Overview</button>
        <button class="btn" onclick="switchProfileTab('attendance')">Attendance</button>
        <button class="btn" onclick="switchProfileTab('academics')">Academics</button>
        <button class="btn" onclick="switchProfileTab('behavior')">Behavior & Certificates</button>
      </div>

      <div id="tab-overview" class="profile-section active">
        <div class="profile-info-grid">
          <div class="info-item"><div class="info-label">Full Name</div><div class="info-value">${p.full_name || "—"}</div></div>
          <div class="info-item"><div class="info-label">Index Number</div><div class="info-value">${p.index || "—"}</div></div>
          <div class="info-item"><div class="info-label">Grade & Class</div><div class="info-value">${classDisplay}</div></div>
          <div class="info-item"><div class="info-label">Gender</div><div class="info-value">${genderLabel}</div></div>
          <div class="info-item"><div class="info-label">Birthday</div><div class="info-value">${p.birthday ? new Date(p.birthday).toLocaleDateString() : "—"}</div></div>
          <div class="info-item"><div class="info-label">Nationality</div><div class="info-value">${p.nationality || "—"}</div></div>
          <div class="info-item"><div class="info-label">Guardian</div><div class="info-value">${p.guardian || "—"}</div></div>
          <div class="info-item"><div class="info-label">Address</div><div class="info-value">${p.address || "—"}</div></div>
          ${p.guardian_address ? `<div class="info-item full-width"><div class="info-label">Guardian Address</div><div class="info-value">${p.guardian_address}</div></div>` : ""}
        </div>
      </div>

      <div id="tab-attendance" class="profile-section">
        <div class="stat-cards">
          <div class="stat-card"><div class="stat-value">${currentAttendance.percent || 0}%</div><div class="stat-label">Attendance</div></div>
          <div class="stat-card"><div class="stat-value">${currentAttendance.present || 0}</div><div class="stat-label">Days Present</div></div>
          <div class="stat-card"><div class="stat-value">${currentAttendance.absent || 0}</div><div class="stat-label">Days Absent</div></div>
        </div>
        <div class="chart-container"><canvas id="attendance-chart"></canvas></div>
      </div>

      <div id="tab-academics" class="profile-section">
        <div class="input-group" style="margin-bottom:12px;">
          <select id="marks-term-select" onchange="renderMarksTable()">
            <option value="">All Terms</option>
            <option value="Term 1">Term 1</option>
            <option value="Term 2">Term 2</option>
            <option value="Term 3">Term 3</option>
          </select>
        </div>
        <div class="table-responsive">
          <table>
            <thead><tr><th>Exam</th><th>Subject</th><th>Marks</th></tr></thead>
            <tbody id="marks-table-body"></tbody>
          </table>
        </div>
        <div class="chart-container"><canvas id="marks-chart"></canvas></div>
        <div id="gov-exams-block" style="margin-top:16px;"></div>
      </div>

      <div id="tab-behavior" class="profile-section">
        <div class="table-responsive">
          <table>
            <thead><tr><th>Date</th><th>Type</th><th>Severity</th><th>Description</th><th>Reported By</th></tr></thead>
            <tbody id="behavior-table-body"></tbody>
          </table>
        </div>
        <h3 style="margin-top:20px;margin-bottom:8px;">Certificates (Auto-generated)</h3>
        <ul class="cert-list">
          <li><i class="fas fa-certificate"></i> Leaving Certificate</li>
          <li><i class="fas fa-certificate"></i> Character Certificate</li>
          <li><i class="fas fa-certificate"></i> Enrollment / Attendance Confirmation</li>
        </ul>
      </div>
    `;

    renderBehaviorTable();
    renderMarksTable();
    renderGovExams();
    renderAttendanceChart();
  }

  function switchProfileTab(tab) {
    document.querySelectorAll(".profile-tabs .btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".profile-section").forEach(s => s.classList.remove("active"));
    event.target.classList.add("active");
    document.getElementById(`tab-${tab}`).classList.add("active");

    if (tab === "attendance") renderAttendanceChart();
    if (tab === "academics") renderMarksChart();
  }

  function renderBehaviorTable() {
    const tbody = document.getElementById("behavior-table-body");
    if (!tbody) return;
    if (!currentBehavior.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--color-subtext);">No behavior records</td></tr>';
      return;
    }
    tbody.innerHTML = currentBehavior.map(b =>
      `<tr><td>${b.date}</td><td>${b.type}</td><td>${b.severity}</td><td>${b.description}</td><td>${b.reportedBy}</td></tr>`
    ).join("");
  }

  function renderMarksTable() {
    const tbody = document.getElementById("marks-table-body");
    const termSelect = document.getElementById("marks-term-select");
    if (!tbody) return;

    const term = termSelect ? termSelect.value : "";
    const filtered = term ? currentMarks.filter(m => m.sub_type === term) : currentMarks;

    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--color-subtext);">No marks data</td></tr>';
    } else {
      tbody.innerHTML = filtered.map(m =>
        `<tr><td>${m.exam || m.sub_type || "—"}</td><td>${m.subject}</td><td>${m.marks}</td></tr>`
      ).join("");
    }
    renderMarksChart();
  }

  function renderMarksChart() {
    const canvas = document.getElementById("marks-chart");
    if (!canvas || !canvas.offsetParent) return;
    if (marksChart) marksChart.destroy();

    const termSelect = document.getElementById("marks-term-select");
    const term = termSelect ? termSelect.value : "";
    const filtered = term ? currentMarks.filter(m => m.sub_type === term) : currentMarks;

    const labels = filtered.map(m => m.subject);
    const values = filtered.map(m => { const n = parseFloat(m.marks); return isNaN(n) ? 0 : n; });

    marksChart = new Chart(canvas.getContext("2d"), {
      type: "bar",
      data: { labels, datasets: [{ label: term || "Marks", data: values, backgroundColor: "#0086bb" }] },
      options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
    });
  }

  function renderGovExams() {
    const block = document.getElementById("gov-exams-block");
    if (!block) return;
    const ge = currentGovExams || {};
    let html = "";

    if (ge.scholarship) {
      html += `<div style="margin-bottom:8px;"><strong>Grade 5 Scholarship (${ge.scholarship.year}):</strong> Score: ${ge.scholarship.score || "—"} (${ge.scholarship.status || "—"})</div>`;
    }
    if (ge.ol) {
      const g = ge.ol.grades || {};
      const total = (g.A||0) + (g.B||0) + (g.C||0) + (g.S||0) + (g.F||0);
      html += `<div style="margin-bottom:8px;"><strong>G.C.E. O/L (${ge.ol.year}):</strong> A:${g.A||0} B:${g.B||0} C:${g.C||0} S:${g.S||0} F:${g.F||0} (Total: ${total})</div>`;
    }
    if (ge.al) {
      const g = ge.al.grades || {};
      html += `<div style="margin-bottom:8px;"><strong>G.C.E. A/L (${ge.al.year}):</strong> ${ge.al.result || "—"} | Z: ${ge.al.zScore || "—"} | District Rank: ${ge.al.districtRank || "—"} | Island Rank: ${ge.al.islandRank || "—"} | A:${g.A||0} B:${g.B||0} C:${g.C||0} S:${g.S||0} F:${g.F||0}</div>`;
    }

    block.innerHTML = html ? `<h3 style="margin-bottom:8px;">Government Exams</h3>${html}` : "";
  }

  function renderAttendanceChart() {
    const canvas = document.getElementById("attendance-chart");
    if (!canvas || !canvas.offsetParent) return;
    if (attChart) attChart.destroy();

    const records = currentAttendance.records || [];
    const labels = records.slice(-30).map(r => {
      const d = new Date(r.date);
      return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" });
    });
    const data = records.slice(-30).map(r => r.present ? 1 : 0);

    attChart = new Chart(canvas.getContext("2d"), {
      type: "line",
      data: {
        labels: labels.length ? labels : ["No data"],
        datasets: [{
          label: "Present (1) / Absent (0)",
          data: data.length ? data : [0],
          borderColor: "#0086bb",
          backgroundColor: "rgba(0, 134, 187, 0.1)",
          fill: true,
          tension: 0.35
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 1, ticks: { stepSize: 1 } } } }
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    const closeBtn = document.getElementById("profile-close");
    if (closeBtn) closeBtn.addEventListener("click", () => {
      document.getElementById("profile-modal").close();
      if (attChart) { attChart.destroy(); attChart = null; }
      if (marksChart) { marksChart.destroy(); marksChart = null; }
    });
  });

  fetchClasses();
  fetchStudents();
</script>
