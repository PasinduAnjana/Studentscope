<div class="card-grid">
  <!-- Greeting Tile -->
  <div class="card greeting-tile w-2">
    <div class="greeting-content">
      <h2 class="greeting-heading" data="student.greeting"></h2>
      <p class="greeting-subtext" data="admin.dashboard.loggedInAs">You are logged in as an Administrator.</p>
    </div>
    <img
      src="/assets/images/admin-clipart.svg"
      alt="Illustration"
      class="greeting-img"
      style="width: 300px"
    />
  </div>

<!-- School Overview -->
  <div class="card dashboard-tile w-1 h-2" id="school-overview">
    <div class="icon-title">
      <i class="fas fa-school icon"></i>
      <p class="tile-label" data="admin.dashboard.schoolOverview">School Overview</p>
    </div>
    <div class="stats-content">
      <div class="stat-item">
        <div class="stat-icon">
          <i class="fas fa-users"></i>
        </div>
        <span class="stat-number" id="total-students">-</span>
        <span class="stat-label" data="admin.dashboard.students">Students</span>
      </div>
      <div class="stat-item">
        <div class="stat-icon">
          <i class="fas fa-chalkboard-teacher"></i>
        </div>
        <span class="stat-number" id="total-teachers">-</span>
        <span class="stat-label" data="admin.dashboard.teachers">Teachers</span>
      </div>
      <div class="stat-item">
        <div class="stat-icon">
          <i class="fas fa-building"></i>
        </div>
        <span class="stat-number" id="total-classes">-</span>
        <span class="stat-label" data="admin.dashboard.classes">Classes</span>
      </div>
    </div>
  </div>

  <!-- Today's Attendance Overview -->
  <div class="card dashboard-tile w-1 h-2" id="attendance-overview">
    <div class="icon-title">
      <i class="fas fa-clipboard-check icon"></i>
      <p class="tile-label" data="admin.dashboard.todaysAttendance">Today's Attendance</p>
    </div>
    <div id="attendance-overview-content">
      <!-- Content will be injected by JS -->
    </div>
  </div>
  <!-- Recent Announcements -->
  <div class="card dashboard-tile flex-column">
    <div class="icon-title">
      <i class="fas fa-bullhorn icon"></i>
      <p class="tile-label" data="sidebar.announcements"></p>
    </div>
    <div>
      <ul class="tile-list" id="announcements-list">
        <!-- Announcements will be loaded here -->
      </ul>
    </div>
  </div>

  <!-- Password Resets -->
  <div class="card dashboard-tile flex-column">
    <div class="icon-title">
      <i class="fas fa-key icon"></i>
      <p class="tile-label" data="admin.dashboard.passwordResets">Password Resets</p>
    </div>
    <div>
      <ul class="tile-list" id="dashboard-resets-list">
        <li class="text-sm" data="common.loading">Loading...</li>
      </ul>
    </div>
  </div>

  <!-- Alerts -->
  <div class="card dashboard-tile flex-column h-2">
    <div class="icon-title">
      <i class="fas fa-triangle-exclamation icon"></i>
      <p class="tile-label" data="admin.dashboard.alerts">Alerts</p>
    </div>
    <div>
      <ul class="tile-list" id="dashboard-alerts-list">
        <li class="text-sm" data="common.loading">Loading...</li>
      </ul>
    </div>
  </div>
</div>

<!-- Alert Details Modal -->
<modal-dialog id="alert-details-modal" data-title="admin.dashboard.alertDetails" title="Alert Details">
  <div id="alert-details-container"></div>
</modal-dialog>

<script>
  async function loadSchoolOverview() {
    try {
      const res = await api.admin.dashboard.get();
      if (res.ok) {
        const data = await res.json();
        document.getElementById("total-students").textContent =
          data.students ?? "-";
        document.getElementById("total-teachers").textContent =
          data.teachers ?? "-";
        document.getElementById("total-classes").textContent =
          data.classes ?? "-";
      }
    } catch (err) {
      console.error("Error loading school overview:", err);
    }
  }

  async function loadAttendanceOverview() {
    try {
      const today = new Date().toISOString().split("T")[0];
      const res = await api.admin.attendance.getStats(today);

      if (!res.ok) return;

      const data = await res.json();
      const container = document.getElementById("attendance-overview-content");

      if (!data || data.notMarkedToday === data.totalStudents) {
        container.innerHTML = `
          <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 150px; gap: 8px;">
            <empty-state-message message="${t("admin.dashboard.attendanceNotMarked")}" icon="fas fa-exclamation-circle"></empty-state-message>
          </div>
        `;
        return;
      }

      container.innerHTML = `<canvas id="adminAttendanceChart" height="150"></canvas>`;

      setTimeout(() => {
        const rootStyles = getComputedStyle(document.documentElement);
        const primaryColor = rootStyles
          .getPropertyValue("--color-primary")
          .trim();

        const centerTextPlugin = {
          id: "centerText",
          beforeDraw(chart) {
            if (chart.config.type !== "doughnut") return;
            const { ctx, width, height } = chart;
            ctx.save();
            const fontSize = (height / 160).toFixed(2);
            ctx.font = `${fontSize}em sans-serif`;
            ctx.textBaseline = "middle";
            ctx.textAlign = "center";
            ctx.fillStyle = primaryColor;
            const markedCount = data.presentToday + data.absentToday;
            ctx.fillText(
              `${data.presentToday}/${markedCount}`,
              width / 2,
              chart.getDatasetMeta(0).data[0]?.y || height / 2,
            );
            ctx.restore();
          },
        };

        new Chart(document.getElementById("adminAttendanceChart"), {
          type: "doughnut",
          data: {
            labels: [t("admin.dashboard.present"), t("admin.dashboard.absent"), t("admin.dashboard.notMarked")],
            datasets: [
              {
                data: [
                  data.presentToday,
                  data.absentToday,
                  data.notMarkedToday,
                ],
                backgroundColor: [
                  primaryColor,
                  primaryColor + "40",
                  primaryColor + "20",
                ],
                borderRadius: 10,
              },
            ],
          },
          options: {
            responsive: true,
            cutout: "75%",
            borderColor: "transparent",
            plugins: {
              legend: { display: false },
              title: {
                display: true,
                text: `${data.averageAttendance}% ${t("admin.dashboard.present")}`,
                font: { size: 14, weight: "bold" },
                position: "bottom",
              },
            },
          },
          plugins: [centerTextPlugin],
        });
      }, 100);
    } catch (err) {
      console.error("Error loading attendance overview:", err);
    }
  }

  async function loadAdminAnnouncements() {
    try {
      const res = await api.admin.announcements.getStaff();
      if (!res.ok) return;

      const announcements = await res.json();
      const announcementsList = document.getElementById("announcements-list");

      if (!announcements || announcements.length === 0) {
        announcementsList.innerHTML =
          `<li style="display: flex; justify-content: center; align-items: center; padding: 40px 0; list-style: none;"><empty-state-message message="${t("admin.dashboard.noAnnouncements")}" icon="fas fa-bullhorn"></empty-state-message></li>`;
        return;
      }

      const recentAnnouncements = announcements.slice(0, 4);
      announcementsList.innerHTML = recentAnnouncements
        .map(
          (announcement) => `
          <li onclick="window.location.href='layout.html?role=admin&page=announcements'" style="cursor: pointer;">
            <span class="subject-name">${announcement.title}</span>
            <span class="text-sm text-muted">${t("common.by")} ${announcement.created_by_name || announcement.created_by || "Staff"}</span>
          </li>
        `,
        )
        .join("");

      if (announcements.length > 4) {
        announcementsList.innerHTML += `
          <li onclick="window.location.href='layout.html?role=admin&page=announcements'" style="cursor: pointer; border-top: 1px solid var(--color-border); margin-top: 8px; padding-top: 8px;">
            <span class="subject-name text-sm">${t("admin.dashboard.viewAllAnnouncements")}</span>
          </li>
        `;
      }
    } catch (err) {
      console.error("Error loading announcements:", err);
    }
  }

  async function loadPendingResets() {
    try {
      const res = await api.admin.passwordResets.getPending();
      if (!res.ok) return;

      const resets = await res.json();
      const resetsList = document.getElementById("dashboard-resets-list");
      if (!resetsList) return;

      resetsList.innerHTML = "";

      if (resets.length === 0) {
        resetsList.innerHTML =
          `<li style="display: flex; justify-content: center; align-items: center; padding: 40px 0; list-style: none;"><empty-state-message message="${t("admin.dashboard.noPendingRequests")}" icon="fas fa-check-circle"></empty-state-message></li>`;
        return;
      }

      resets.forEach((reset) => {
        const li = document.createElement("li");
        li.style.cssText =
          "padding: 12px; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center;";
        li.innerHTML = `
          <div>
            <p class="subject-name" style="margin: 0; font-weight: 500;">${reset.username}</p>
            <p class="text-sm" style="margin: 4px 0 0 0; color: #666;">${t("admin.dashboard.passwordResetRole")} ${reset.role}</p>
          </div>
          <div style="display: flex; gap: 8px;">
            <button onclick="approveReset(${reset.id})" class="btn btn-primary">${t("admin.dashboard.approve")}</button>
            <button onclick="rejectReset(${reset.id})" class="btn btn-secondary">${t("admin.dashboard.reject")}</button>
          </div>
        `;
        resetsList.appendChild(li);
      });
    } catch (err) {
      console.error("Error loading pending resets:", err);
    }
  }

  async function approveReset(resetId) {
    try {
      const res = await api.admin.passwordResets.approve(resetId);
      if (res.ok) {
        showToast(t("admin.dashboard.passwordApproved"), "fa-solid fa-check");
        loadPendingResets();
      } else {
        showToast(t("admin.dashboard.failedApprove"), "fa-solid fa-circle-exclamation");
      }
    } catch (err) {
      console.error("Error approving reset:", err);
      showToast(t("admin.dashboard.errorApprove"), "fa-solid fa-circle-exclamation");
    }
  }

  async function rejectReset(resetId) {
    try {
      const res = await api.admin.passwordResets.reject(resetId);
      if (res.ok) {
        showToast(t("admin.dashboard.passwordRejected"), "fa-solid fa-check");
        loadPendingResets();
      } else {
        showToast(t("admin.dashboard.failedReject"), "fa-solid fa-circle-exclamation");
      }
    } catch (err) {
      console.error("Error rejecting reset:", err);
      showToast(t("admin.dashboard.errorReject"), "fa-solid fa-circle-exclamation");
    }
  }

  function showToast(message, icon) {
    if (typeof toast === "function") {
      toast(message, icon);
    } else {
      alert(message);
    }
  }

  function getAlertMessage(alert) {
    const lang = localStorage.getItem("lang") || "en";
    return alert.message[lang] || alert.message.en || "Unknown alert";
  }

  async function loadAlerts() {
    try {
      const res = await api.admin.alerts.getAll();
      if (!res.ok) return;

      const alerts = await res.json();
      const alertsList = document.getElementById("dashboard-alerts-list");

      if (!alerts || alerts.length === 0) {
        alertsList.innerHTML =
          `<li style="display: flex; justify-content: center; align-items: center; padding: 40px 0; list-style: none;"><empty-state-message message="${t("admin.dashboard.noAlerts")}" icon="fas fa-check-circle"></empty-state-message></li>`;
        return;
      }

      alertsList.innerHTML = alerts
        .map(
          (alert) => `
        <li style="cursor: pointer; padding: 12px; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center;" onclick="showAlertDetails('${alert.key}')">
          <div style="display: flex; align-items: center; gap: 10px;">
            <i class="${alert.icon}" style="color: ${alert.type === "danger" ? "#ef4444" : alert.type === "warning" ? "#f59e0b" : "var(--color-primary)"};"></i>
            <span>${getAlertMessage(alert)} (${alert.count})</span>
          </div>
          <i class="fas fa-chevron-right text-muted"></i>
        </li>
      `,
        )
        .join("");
    } catch (err) {
      console.error("Error loading alerts:", err);
    }
  }

  async function showAlertDetails(alertKey) {
    try {
      const res = await api.admin.alerts.getDetails(alertKey);
      if (!res.ok) return;

      const details = await res.json();
      const container = document.getElementById("alert-details-container");

      if (!details || details.length === 0) {
        container.innerHTML = `<p class="text-sm">${t("admin.dashboard.noRecordsFound")}</p>`;
      } else {
        const keys = Object.keys(details[0]);
        
        const columnTranslations = {
          student_name: "admin.attendance.studentName",
          student_id: "admin.attendance.studentName",
          class_name: "admin.attendance.class",
          class_id: "admin.attendance.class",
          grade: "common.grade",
          date: "admin.behavior.date",
          subject: "admin.academic.subject",
          teacher: "common.teacher",
          type: "admin.behavior.type",
          status: "admin.attendance.status",
          marks: "admin.academic.marks",
          username: "admin.academic.indexNo",
          full_name: "profile.fullName",
          email: "profile.email",
          phone: "profile.phoneNumber",
          address: "profile.address",
          nic: "profile.nic",
          attendance_status: "admin.attendance.status",
          exam_name: "admin.academic.exam",
          exam_date: "admin.behavior.date",
        };

        const translateColumn = (key) => {
          const translationKey = columnTranslations[key];
          if (translationKey) {
            return t(translationKey);
          }
          return key.replace(/_/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
        };

        container.innerHTML = `
          <table style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr>${keys.map((k) => `<th style="padding: 8px; text-align: left; border-bottom: 1px solid var(--color-border);">${translateColumn(k)}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${details.map((row) => `<tr>${keys.map((k) => `<td style="padding: 8px; border-bottom: 1px solid var(--color-border);">${row[k] ?? "-"}</td>`).join("")}</tr>`).join("")}
            </tbody>
          </table>
        `;
      }

      document.getElementById("alert-details-modal").open();
    } catch (err) {
      console.error("Error loading alert details:", err);
    }
  }

  // Initialize admin dashboard
  async function initAdminDashboard() {
    await loadSchoolOverview();
    loadAttendanceOverview();
    loadAdminAnnouncements();
    loadPendingResets();
    loadAlerts();
  }

  initAdminDashboard();
</script>
