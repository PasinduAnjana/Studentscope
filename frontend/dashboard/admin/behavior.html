<section class="section">
  <h2 class="heading">
    <i class="fas fa-user-shield"></i>
    <span data="admin.behavior.title">Student Behavior Reports</span>
  </h2>

  <div style="display: flex; flex-direction: column; gap: 24px">
  <!-- Summary Tiles -->
  <div class="card-grid">
    <div class="card dashboard-tile summary-card">
      <div class="icon-title">
        <i class="fas fa-clipboard-list icon"></i>
        <p class="tile-label" data="admin.behavior.totalCases">Total Cases</p>
      </div>
      <p class="tile-value" id="totalStudents">120</p>
    </div>
    <div class="card dashboard-tile summary-card">
      <div class="icon-title">
        <i class="fas fa-user-check icon"></i>
        <p class="tile-label" data="admin.behavior.goodBehavior">Good Behavior</p>
      </div>
      <p class="tile-value" id="goodBehavior">98</p>
    </div>
    <div class="card dashboard-tile summary-card">
      <div class="icon-title">
        <i class="fas fa-exclamation-triangle icon"></i>
        <p class="tile-label" data="admin.behavior.disciplinaryCases">Disciplinary Cases</p>
      </div>
      <p class="tile-value" id="disciplinaryCases">17</p>
    </div>
    <div class="card dashboard-tile summary-card">
      <div class="icon-title">
        <i class="fas fa-award icon"></i>
        <p class="tile-label" data="admin.behavior.rewards">Rewards/Appreciations</p>
      </div>
      <p class="tile-value" id="rewards">5</p>
    </div>
  </div>


  <!-- Charts -->
  <div class="card-grid">
    <div class="card dashboard-tile chart-tile">
      <div class="icon-title">
        <i class="fas fa-chart-pie icon"></i>
        <p class="tile-label" data="admin.behavior.distribution">Behavior Distribution</p>
      </div>
      <canvas id="behaviorChart"></canvas>
    </div>

    <div class="card dashboard-tile chart-tile">
      <div class="icon-title">
        <i class="fas fa-chart-line icon"></i>
        <p class="tile-label" data="admin.behavior.monthlyTrend">Monthly Discipline Trend</p>
      </div>
      <canvas id="trendChart"></canvas>
    </div>
  </div>

  <!-- Behavior Records -->
  <div class="card dashboard-tile">
    <div class="icon-title">
      <i class="fas fa-clipboard-check icon"></i>
      <p class="tile-label" data="admin.behavior.records">Behavior Records</p>
    </div>

    <data-table id="behaviorTable">
      <div slot="filters" style="display: flex; gap: 16px; align-items: baseline;">
        <div class="input-group">
          <select id="classFilter" class="dropdown-select">
            <option value="all" data="common.allClasses">All Classes</option>
          </select>
        </div>
        <div class="input-group">
          <select id="typeFilter" class="dropdown-select">
            <option value="all" data="admin.behavior.allBehaviours">All Behaviours</option>
            <option value="Good" data="admin.behavior.good">Good</option>
            <option value="Disciplinary" data="admin.behavior.disciplinary">Disciplinary</option>
            <option value="Reward" data="admin.behavior.reward">Reward</option>
          </select>
        </div>
      </div>
    </data-table>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../../js/dropdown.js"></script>
<script>
  // Get primary color from CSS variables
  const rootStyles = getComputedStyle(document.documentElement);
  const primaryColor = rootStyles.getPropertyValue("--color-primary").trim();

  let allRecords = []; // Store all records for filtering
  let behaviorStats = {};
  let allClasses = [];

  function initTable() {
    const table = document.getElementById("behaviorTable");
    table.setColumns([
      { key: "class", header: t("admin.behavior.class"), searchable: true },
      { key: "student", header: t("admin.behavior.student"), searchable: true },
      { key: "date", header: t("admin.behavior.date"), searchable: false },
      { key: "type", header: t("admin.behavior.type"), searchable: true },
      { key: "severity", header: t("admin.behavior.severity"), searchable: false },
      { key: "description", header: t("admin.behavior.description"), searchable: false },
      { key: "reportedBy", header: t("admin.behavior.reportedBy"), searchable: true }
    ]);
    table.setEmptyState(t("admin.behavior.noRecords"), "fas fa-user-shield");
  }

  // Custom plugin to draw center text in doughnut chart
  const centerTextPlugin = {
    id: "centerText",
    beforeDraw(chart, args, options) {
      if (chart.config.type !== "doughnut") return;
      const { ctx, width, height } = chart;
      ctx.save();
      const fontSize = (height / 160).toFixed(2);
      ctx.font = `${fontSize}em sans-serif`;
      ctx.textBaseline = "middle";
      ctx.textAlign = "center";
      ctx.fillStyle = options.color || primaryColor;
      const text = options.text || "";
      ctx.fillText(
        text,
        width / 2,
        chart.getDatasetMeta(0).data[0]?.y || height / 2
      );
      ctx.restore();
    },
  };

  // Fetch behavior stats and populate summary tiles
  async function loadBehaviorStats() {
    try {
      const response = await api.admin.behavior.getStats();
      if (!response.ok) throw new Error("Failed to fetch behavior stats");
      behaviorStats = await response.json();

      document.getElementById("totalStudents").textContent = behaviorStats.totalRecords;
      document.getElementById("goodBehavior").textContent = behaviorStats.goodBehavior;
      document.getElementById("disciplinaryCases").textContent = behaviorStats.disciplinaryCases;
      document.getElementById("rewards").textContent = behaviorStats.rewards;

      updateBehaviorChart();
    } catch (err) {
      console.error("Error loading behavior stats:", err);
    }
  }

  // Fetch all behavior records
  async function loadBehaviorRecords() {
    try {
      const response = await api.admin.behavior.getRecords();
      if (!response.ok) throw new Error("Failed to fetch behavior records");
      allRecords = await response.json();
      const table = document.getElementById("behaviorTable");
      table.setData(allRecords);
      filterBehavior();
    } catch (err) {
      console.error("Error loading behavior records:", err);
      document.getElementById("behaviorTable").setData([]);
    }
  }

  // Fetch classes for filter dropdown
  async function loadClasses() {
    try {
      const response = await api.admin.classes.getAll();
      if (!response.ok) throw new Error("Failed to fetch classes");
      allClasses = await response.json();

      // Populate class filter options
      const classFilterSelect = document.getElementById("classFilter");
      classFilterSelect.innerHTML = `<option value="all" data="common.allClasses">${t("common.allClasses")}</option>`;
      allClasses.forEach((cls) => {
        const option = document.createElement("option");
        option.value = `${cls.grade}-${cls.class_name}`;
        option.textContent = `${t("admin.behavior.gradeX", {grade: cls.grade})}-${cls.class_name}`;
        classFilterSelect.appendChild(option);
      });
    } catch (err) {
      console.error("Error loading classes:", err);
    }
  }

  function filterBehavior() {
    const table = document.getElementById("behaviorTable");
    const classFilter = document.getElementById("classFilter").value;
    const typeFilter = document.getElementById("typeFilter").value;

    // Clear existing filters and reapply
    if (classFilter !== "all") {
      table.addFilter("class", (row) => row.class === classFilter);
    }
    if (typeFilter !== "all") {
      table.addFilter("type", (row) => row.type === typeFilter);
    }
  }

  function updateBehaviorChart() {
    const ctx = document.getElementById("behaviorChart").getContext("2d");
    new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: [t("admin.behavior.good"), t("admin.behavior.disciplinary"), t("admin.behavior.reward")],
        datasets: [
          {
            data: [
              behaviorStats.goodBehavior || 0,
              behaviorStats.disciplinaryCases || 0,
              behaviorStats.rewards || 0,
            ],
            backgroundColor: [
              primaryColor,
              primaryColor + "66",
              primaryColor + "33",
            ],
            borderRadius: 20,
            borderColor: "transparent",
          },
        ],
      },
      options: {
        responsive: true,
        cutout: "85%",
        plugins: {
          legend: { position: "bottom" },
          title: {
            display: true,
            text: t("admin.behavior.distribution"),
            font: { size: 14, weight: "bold" },
            position: "bottom",
          },
          centerText: {
            text: String(behaviorStats.totalRecords || 0),
            color: primaryColor,
          },
        },
      },
      plugins: [centerTextPlugin],
    });
  }

  function updateTrendChart() {
    // Calculate monthly trend from records
    const monthlyStats = {
      Jan: 0, Feb: 0, Mar: 0, Apr: 0, May: 0, Jun: 0,
      Jul: 0, Aug: 0, Sep: 0, Oct: 0, Nov: 0, Dec: 0,
    };
    const monthlyDisciplinary = { ...monthlyStats };

    allRecords.forEach((record) => {
      const date = new Date(record.date);
      const monthName = date.toLocaleDateString("en-US", { month: "short" });
      if (monthlyStats.hasOwnProperty(monthName)) {
        if (record.type === "Good") {
          monthlyStats[monthName]++;
        } else if (record.type === "Disciplinary") {
          monthlyDisciplinary[monthName]++;
        }
      }
    });

    const labels = Object.keys(monthlyStats);
    const goodData = Object.values(monthlyStats);
    const discData = Object.values(monthlyDisciplinary);

    const ctx = document.getElementById("trendChart").getContext("2d");
    new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: t("admin.behavior.goodBehaviorTrend"),
            data: goodData,
            borderColor: primaryColor,
            backgroundColor: primaryColor + "33",
            tension: 0.4,
            fill: true,
            borderWidth: 2,
          },
          {
            label: t("admin.behavior.disciplinaryTrend"),
            data: discData,
            borderColor: primaryColor + "80",
            backgroundColor: primaryColor + "15",
            tension: 0.4,
            fill: true,
            borderWidth: 2,
          },
        ],
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: "top" },
        },
        scales: {
          y: { beginAtZero: true },
        },
      },
    });
  }

  /* =========================
   Language handling
   ========================= */
  function refreshTranslations() {
    if (typeof applyTranslations === 'function') {
      applyTranslations();
    }
    // Reinitialize table with new language
    initTable();
    // Reload classes to update dropdown translations
    loadClasses();
    // Update charts with new language
    updateBehaviorChart();
    updateTrendChart();
  }

  window.addEventListener("storage", (e) => {
    if (e.key === "lang") {
      refreshTranslations();
    }
  });
  window.addEventListener("languageChange", (e) => {
    const newLang = e.detail?.lang;
    if (newLang) {
      refreshTranslations();
    }
  });

  let _lastLangPoll = localStorage.getItem("lang") || "en";
  setInterval(() => {
    const cur = localStorage.getItem("lang") || "en";
    if (cur !== _lastLangPoll) {
      _lastLangPoll = cur;
      refreshTranslations();
    }
  }, 400);

  // Initialize searchable dropdowns
  function initializeSearchableDropdowns() {
    const dropdowns = document.querySelectorAll(".dropdown-select");
    dropdowns.forEach((select) => {
      // Skip DataTable's built-in page size dropdown
      if (select.id && select.id.includes("dt-page-size")) return;
      if (typeof makeSearchableDropdown === "function") {
        makeSearchableDropdown(select.id, () => {
          select.dispatchEvent(new Event("change"));
        });
      }
    });
  }

  // Initialize after page loads
  async function initializePage() {
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", async () => {
        initTable();
        await loadClasses();
        await loadBehaviorStats();
        await loadBehaviorRecords();
        updateTrendChart();
        initializeSearchableDropdowns();
        setupFilterListeners();
      });
    } else {
      initTable();
      await loadClasses();
      await loadBehaviorStats();
      await loadBehaviorRecords();
      updateTrendChart();
      initializeSearchableDropdowns();
      setupFilterListeners();
    }
  }

  function setupFilterListeners() {
    document.getElementById("classFilter").addEventListener("change", filterBehavior);
    document.getElementById("typeFilter").addEventListener("change", filterBehavior);
  }

  initializePage();
</script>

<style>
  .chart-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 20px;
  }
  .chart-tile {
    max-height: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .chart-tile canvas {
    max-width: 100%;
    max-height: 300px;
  }
  .summary-tiles {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-bottom: 15px;
  }
</style>
