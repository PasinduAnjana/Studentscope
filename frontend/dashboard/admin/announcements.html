<section class="section">
  <h2 class="heading">
    <i class="fas fa-bullhorn"></i>
    <span data="sidebar.announcements"></span>
  </h2>
  <style>
    .checkbox-item {
      margin-bottom: 8px;
    }
    .checkbox-item label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: background-color 0.2s;
    }
    .checkbox-item label:hover {
      background-color: var(--color-hover);
    }
    
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      background-color: transparent;
      box-shadow: none;
    }

    .empty-state i {
      font-size: 32px;
      color: var(--color-subtext);
      margin-bottom: 20px;
    }

    .empty-text {
      font-size: 16px;
      color: var(--color-subtext);
      margin: 0;
    }
  </style>
  <div class="card-grid">
    <!-- Admin Announcements -->
    <div class="card h-2">
      <div class="flex-between mb-2">
        <div class="icon-title">
          <i class="fas fa-bullhorn icon"></i>
          <p class="tile-label">Admin Announcements</p>
        </div>
        <button id="add-announcement-btn" class="btn btn-primary">
          <i class="fas fa-plus"></i> Add Announcement
        </button>
      </div>
      <div class="announcements-container" id="announcements-container">
      </div>
    </div>

    <!-- Announcements from Staff -->
    <div class="card h-2">
      <div class="flex-between mb-2">
        <div class="icon-title">
          <i class="fas fa-comments icon"></i>
          <p class="tile-label">Announcements from Staff</p>
        </div>
      </div>
      <div class="announcements-container" id="staff-announcements-container">
      </div>
    </div>
  </div>
</section>

<modal-dialog id="announcement-modal" title="Add Announcement">
  <div class="mb-2">
    <label for="announcement-title">Title:</label>
    <input type="text" id="announcement-title" placeholder="Enter announcement title..." class="mt-1" />
  </div>
  <div class="mb-2">
    <label for="announcement-description">Description:</label>
    <textarea id="announcement-description" placeholder="Enter announcement description..." class="mt-1"></textarea>
  </div>
  <div class="mb-2">
    <label for="announcement-audience">Audience:</label>
    <select id="announcement-audience" class="mt-1">
      <option value="all">All (Teachers & Students)</option>
      <option value="teachers">Specific Teachers</option>
      <option value="clerks">Clerks</option>
      <option value="students">Specific Classes</option>
    </select>
  </div>
  <div id="teacher-selection" class="mb-2" style="display: none">
    <label>Select Teachers:</label>
    <div id="teacher-checkboxes" class="mt-1"></div>
  </div>
  <div id="clerk-selection" class="mb-2" style="display: none">
    <label>Select Clerks:</label>
    <div id="clerk-checkboxes" class="mt-1"></div>
  </div>
  <div id="class-selection" class="mb-2" style="display: none">
    <label>Select Classes:</label>
    <div id="class-checkboxes" class="mt-1"></div>
  </div>

  <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
    <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
    <button id="modal-save" class="btn btn-primary">Save</button>
  </div>
</modal-dialog>

<script>
  let announcements = [];
  let editingAnnouncement = null;
  let allTeachers = [];
  let allClasses = [];

  function renderAnnouncements() {
    const container = document.querySelector("#announcements-container");
    container.innerHTML = "";
    if (!announcements.length) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-bullhorn"></i>
          <p class="empty-text">No announcements found</p>
        </div>
      `;
      return;
    }

    announcements.forEach((announcement) => {
      const card = document.createElement("div");
      card.className = "announcement-card";

      const createdDate = new Date(announcement.created_at).toLocaleDateString();

      let audienceDisplay = "";
      switch (announcement.audience_type) {
        case "all": audienceDisplay = "All (Teachers & Students)"; break;
        case "teachers": audienceDisplay = "Teachers"; break;
        case "clerks": audienceDisplay = "Clerks"; break;
        case "students": audienceDisplay = "Students"; break;
      }

      card.innerHTML = `
        <div class="announcement-title flex-between">
          <span>${announcement.title}</span>
          <div class="announcement-actions">
            <button class="btn-icon btn-edit" onclick="editAnnouncement(${announcement.id})" title="Edit">
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn-icon btn-delete" onclick="deleteAnnouncement(${announcement.id})" title="Delete">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
        <div class="announcement-description-container">
          <div class="announcement-description collapsed" id="desc-${announcement.id}">
            ${announcement.description}
          </div>
          <button class="expand-btn" id="expand-${announcement.id}" style="display: none" onclick="toggleDescription(${announcement.id})">
            <span>Show more</span>
            <i class="fas fa-chevron-down"></i>
          </button>
        </div>
        <div class="announcement-meta flex-between">
          <span class="text-sm"><i class="fas fa-users" style="margin-right:4px;"></i>${audienceDisplay}</span>
          <span class="text-sm"><i class="fas fa-calendar" style="margin-right:4px;"></i>${createdDate}</span>
        </div>
      `;

      container.appendChild(card);

      setTimeout(() => {
        const descElement = document.getElementById(`desc-${announcement.id}`);
        const expandBtn = document.getElementById(`expand-${announcement.id}`);
        if (descElement && expandBtn && descElement.scrollHeight > descElement.clientHeight) {
          expandBtn.style.display = "inline-flex";
        }
      }, 0);
    });
  }

  function fetchAnnouncements() {
    api.admin.announcements.getAll()
      .then((res) => {
        if (!res.ok) throw new Error("Failed to fetch announcements");
        return res.json();
      })
      .then((data) => {
        announcements = data.data || data;
        renderAnnouncements();
      })
      .catch((err) => {
        console.error(err);
        const container = document.querySelector("#announcements-container");
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-circle" style="color: var(--color-error);"></i>
            <p class="empty-text">Error loading announcements</p>
          </div>
        `;
      });
  }

  function fetchStaffAnnouncements() {
    api.admin.announcements.getAll()
      .then((res) => {
        if (!res.ok) throw new Error("Failed to fetch staff announcements");
        return res.json();
      })
      .then((data) => {
        const all = data.data || data;
        const staff = all.filter(a => a.created_by_role !== "admin");
        renderStaffAnnouncements(staff);
      })
      .catch((err) => {
        console.error(err);
        const container = document.querySelector("#staff-announcements-container");
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-circle" style="color: var(--color-error);"></i>
            <p class="empty-text">Error loading announcements</p>
          </div>
        `;
      });
  }

  function renderStaffAnnouncements(staffAnnouncements) {
    const container = document.querySelector("#staff-announcements-container");
    container.innerHTML = "";

    if (!staffAnnouncements.length) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-comments"></i>
          <p class="empty-text">No announcements from staff</p>
        </div>
      `;
      return;
    }

    staffAnnouncements.forEach((announcement) => {
      const card = document.createElement("div");
      card.className = "announcement-card";

      const createdDate = new Date(announcement.created_at).toLocaleDateString();

      let audienceDisplay = "";
      switch (announcement.audience_type) {
        case "all": audienceDisplay = "All (Teachers & Students)"; break;
        case "teachers": audienceDisplay = "Teachers"; break;
        case "clerks": audienceDisplay = "Clerks"; break;
        case "students": audienceDisplay = "Students"; break;
      }

      const creatorRole = announcement.created_by_role || "Staff";
      const creatorName = announcement.created_by_name || "Unknown";

      card.innerHTML = `
        <div class="announcement-title flex-between">
          <span>${announcement.title}</span>
        </div>
        <div class="announcement-description-container">
          <div class="announcement-description collapsed" id="staff-desc-${announcement.id}">
            ${announcement.description}
          </div>
          <button class="expand-btn" id="staff-expand-${announcement.id}" style="display: none" onclick="toggleStaffDescription(${announcement.id})">
            <span>Show more</span>
            <i class="fas fa-chevron-down"></i>
          </button>
        </div>
        <div class="announcement-meta flex-between">
          <div>
            <span class="text-sm"><i class="fas fa-users" style="margin-right:4px;"></i>${audienceDisplay}</span>
            <span class="text-sm" style="margin-left: 16px;"><i class="fas fa-user" style="margin-right:4px;"></i>${creatorName} (${creatorRole})</span>
          </div>
          <span class="text-sm"><i class="fas fa-calendar" style="margin-right:4px;"></i>${createdDate}</span>
        </div>
      `;

      container.appendChild(card);

      setTimeout(() => {
        const descElement = document.getElementById(`staff-desc-${announcement.id}`);
        const expandBtn = document.getElementById(`staff-expand-${announcement.id}`);
        if (descElement && expandBtn && descElement.scrollHeight > descElement.clientHeight) {
          expandBtn.style.display = "inline-flex";
        }
      }, 0);
    });
  }

  function toggleStaffDescription(id) {
    const descElement = document.getElementById(`staff-desc-${id}`);
    const expandBtn = document.getElementById(`staff-expand-${id}`);
    const btnText = expandBtn.querySelector("span");

    if (descElement.classList.contains("collapsed")) {
      descElement.classList.remove("collapsed");
      descElement.classList.add("expanded");
      btnText.textContent = "Show less";
      expandBtn.classList.add("expanded");
    } else {
      descElement.classList.remove("expanded");
      descElement.classList.add("collapsed");
      btnText.textContent = "Show more";
      expandBtn.classList.remove("expanded");
    }
  }

  function setupAddButton() {
    const addBtn = document.getElementById("add-announcement-btn");
    const modal = document.getElementById("announcement-modal");
    const cancelBtn = document.getElementById("modal-cancel");
    const saveBtn = document.getElementById("modal-save");
    const audienceSelect = document.getElementById("announcement-audience");

    addBtn.addEventListener("click", () => {
      editingAnnouncement = null;
      if (modal) {
        modal.setTitle("Add Announcement");
        clearModal();
        modal.open();
      }
    });

    const closeModal = () => { if (modal) modal.close(); };

    cancelBtn.addEventListener("click", closeModal);
    audienceSelect.addEventListener("change", handleAudienceChange);
    saveBtn.addEventListener("click", saveAnnouncement);
  }

  function handleAudienceChange() {
    const audience = document.getElementById("announcement-audience").value;
    const teacherSelection = document.getElementById("teacher-selection");
    const clerkSelection = document.getElementById("clerk-selection");
    const classSelection = document.getElementById("class-selection");

    teacherSelection.style.display = "none";
    clerkSelection.style.display = "none";
    classSelection.style.display = "none";

    if (audience === "teachers") {
      teacherSelection.style.display = "block";
      if (!document.querySelector("#teacher-checkboxes .checkbox-item")) loadTeachers();
    } else if (audience === "clerks") {
      clerkSelection.style.display = "block";
      if (!document.querySelector("#clerk-checkboxes .checkbox-item")) loadClerks();
    } else if (audience === "students") {
      classSelection.style.display = "block";
      if (!document.querySelector("#class-checkboxes .checkbox-item")) loadClasses();
    }
  }

  async function loadTeachers() {
    try {
      const res = await api.admin.teachers.getAll();
      if (!res.ok) throw new Error("Failed to fetch teachers");
      allTeachers = await res.json();
      renderTeacherCheckboxes();
    } catch (err) { console.error("Error loading teachers:", err); }
  }

  async function loadClerks() {
    try {
      const res = await api.admin.clerks.getAll();
      if (!res.ok) throw new Error("Failed to fetch clerks");
      const clerks = await res.json();
      renderClerkCheckboxes(clerks);
    } catch (err) { console.error("Error loading clerks:", err); }
  }

  async function loadClasses() {
    try {
      const res = await api.admin.classes.getAll();
      if (!res.ok) throw new Error("Failed to fetch classes");
      allClasses = await res.json();
      renderClassCheckboxes();
    } catch (err) { console.error("Error loading classes:", err); }
  }

  function renderTeacherCheckboxes() {
    const container = document.getElementById("teacher-checkboxes");
    container.innerHTML = "";
    if (!allTeachers.length) { container.innerHTML = "<p class='text-sm'>No teachers found</p>"; return; }
    allTeachers.forEach((teacher) => {
      const checkboxDiv = document.createElement("div");
      checkboxDiv.className = "checkbox-item";
      checkboxDiv.innerHTML = `
        <label>
          <input type="checkbox" value="${teacher.teacher_id}" style="margin: 0;">
          <span>${teacher.full_name || teacher.username}</span>
        </label>`;
      container.appendChild(checkboxDiv);
    });
  }

  function renderClerkCheckboxes(clerks) {
    const container = document.getElementById("clerk-checkboxes");
    container.innerHTML = "";
    if (!clerks.length) { container.innerHTML = "<p class='text-sm'>No clerks found</p>"; return; }
    clerks.forEach((clerk) => {
      const checkboxDiv = document.createElement("div");
      checkboxDiv.className = "checkbox-item";
      checkboxDiv.innerHTML = `
        <label>
          <input type="checkbox" value="${clerk.clerk_id || clerk.id}" style="margin: 0;">
          <span>${clerk.full_name || clerk.username}</span>
        </label>`;
      container.appendChild(checkboxDiv);
    });
  }

  function renderClassCheckboxes() {
    const container = document.getElementById("class-checkboxes");
    container.innerHTML = "";
    if (!allClasses.length) { container.innerHTML = "<p class='text-sm'>No classes found</p>"; return; }
    allClasses.forEach((cls) => {
      const checkboxDiv = document.createElement("div");
      checkboxDiv.className = "checkbox-item";
      checkboxDiv.innerHTML = `
        <label>
          <input type="checkbox" value="${cls.id}" style="margin: 0;">
          <span>Grade ${cls.grade} - ${cls.class_name || cls.name}</span>
        </label>`;
      container.appendChild(checkboxDiv);
    });
  }

  function saveAnnouncement() {
    const title = document.getElementById("announcement-title").value.trim();
    const description = document.getElementById("announcement-description").value.trim();
    const audience = document.getElementById("announcement-audience").value;

    if (!title || !description) {
      toast("Please fill in all fields.", "fa-solid fa-circle-exclamation");
      return;
    }

    let teacherIds = [];
    let clerkIds = [];
    let classIds = [];

    if (audience === "teachers") {
      teacherIds = Array.from(document.querySelectorAll("#teacher-checkboxes input:checked")).map((cb) => parseInt(cb.value));
      if (teacherIds.length === 0) { toast("Please select at least one teacher.", "fa-solid fa-circle-exclamation"); return; }
    } else if (audience === "clerks") {
      clerkIds = Array.from(document.querySelectorAll("#clerk-checkboxes input:checked")).map((cb) => parseInt(cb.value));
      if (clerkIds.length === 0) { toast("Please select at least one clerk.", "fa-solid fa-circle-exclamation"); return; }
    } else if (audience === "students") {
      classIds = Array.from(document.querySelectorAll("#class-checkboxes input:checked")).map((cb) => parseInt(cb.value));
      if (classIds.length === 0) { toast("Please select at least one class.", "fa-solid fa-circle-exclamation"); return; }
    }

    const url = editingAnnouncement ? `/api/admin/announcements/${editingAnnouncement.id}` : "/api/admin/announcements";
    const method = editingAnnouncement ? "PUT" : "POST";
    const body = { title, description, audience_type: audience, teacher_ids: teacherIds, clerk_ids: clerkIds, class_ids: classIds };

    (method === "POST" ? api.admin.announcements.create(body) : api.admin.announcements.update(editingAnnouncement.id, body))
      .then((res) => {
        if (!res.ok) throw new Error("Failed to save announcement");
        return res.json();
      })
      .then(() => {
        document.getElementById("announcement-modal").close();
        toast("Announcement saved successfully", "fa-solid fa-check-circle");
        fetchAnnouncements();
      })
      .catch((err) => {
        console.error(err);
        toast("Error saving announcement", "fa-solid fa-circle-exclamation");
      });
  }

  function clearModal() {
    document.getElementById("announcement-title").value = "";
    document.getElementById("announcement-description").value = "";
    document.getElementById("announcement-audience").value = "all";
    document.getElementById("teacher-selection").style.display = "none";
    document.getElementById("clerk-selection").style.display = "none";
    document.getElementById("class-selection").style.display = "none";
    document.querySelectorAll("#teacher-checkboxes input, #clerk-checkboxes input, #class-checkboxes input")
      .forEach((cb) => (cb.checked = false));
  }

  function editAnnouncement(id) {
    const announcement = announcements.find((a) => a.id == id);
    if (!announcement) {
      toast(`Announcement with ID ${id} not found.`, "fa-solid fa-circle-exclamation");
      return;
    }

    editingAnnouncement = announcement;
    const modal = document.getElementById("announcement-modal");
    if (modal) modal.setTitle("Edit Announcement");

    document.getElementById("announcement-title").value = announcement.title;
    document.getElementById("announcement-description").value = announcement.description;
    document.getElementById("announcement-audience").value = announcement.audience_type;

    handleAudienceChange();

    if (announcement.audience_type === "teachers" && announcement.teachers) {
      if (!allTeachers.length) {
        loadTeachers().then(() => {
          announcement.teachers.forEach((teacher) => {
            const checkbox = document.querySelector(`#teacher-checkboxes input[value="${teacher.teacher_id}"]`);
            if (checkbox) checkbox.checked = true;
          });
        });
      } else {
        announcement.teachers.forEach((teacher) => {
          const checkbox = document.querySelector(`#teacher-checkboxes input[value="${teacher.teacher_id}"]`);
          if (checkbox) checkbox.checked = true;
        });
      }
    } else if (announcement.audience_type === "students" && announcement.classes) {
      if (!allClasses.length) {
        loadClasses().then(() => {
          announcement.classes.forEach((cls) => {
            const checkbox = document.querySelector(`#class-checkboxes input[value="${cls.id}"]`);
            if (checkbox) checkbox.checked = true;
          });
        });
      } else {
        announcement.classes.forEach((cls) => {
          const checkbox = document.querySelector(`#class-checkboxes input[value="${cls.id}"]`);
          if (checkbox) checkbox.checked = true;
        });
      }
    }

    if (modal) modal.open();
  }

  function deleteAnnouncement(id) {
    toast("Are you sure you want to delete this announcement?", "fa-solid fa-trash", {
      confirm: true,
      confirmText: "Delete",
      cancelText: "Cancel",
      onConfirm: function () {
        api.admin.announcements.delete(id)
          .then((res) => {
            if (!res.ok) throw new Error("Failed to delete announcement");
            return res.json();
          })
          .then(() => {
            toast("Announcement deleted successfully", "fa-solid fa-check-circle");
            fetchAnnouncements();
          })
          .catch((err) => {
            console.error("Error deleting announcement:", err);
            toast("Error deleting announcement", "fa-solid fa-circle-exclamation");
          });
      },
    });
  }

  function toggleDescription(id) {
    const descElement = document.getElementById(`desc-${id}`);
    const expandBtn = document.getElementById(`expand-${id}`);
    const btnText = expandBtn.querySelector("span");

    if (descElement.classList.contains("collapsed")) {
      descElement.classList.remove("collapsed");
      descElement.classList.add("expanded");
      btnText.textContent = "Show less";
      expandBtn.classList.add("expanded");
    } else {
      descElement.classList.remove("expanded");
      descElement.classList.add("collapsed");
      btnText.textContent = "Show more";
      expandBtn.classList.remove("expanded");
    }
  }

  fetchAnnouncements();
  fetchStaffAnnouncements();
  setupAddButton();
  loadTeachers();
  loadClerks();
  loadClasses();
</script>
