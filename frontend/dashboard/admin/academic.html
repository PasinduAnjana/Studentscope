<h2 class="heading">
  <i class="fas fa-chart-bar"></i>
  <span
    data-en="Academic Reports"
    data-si="අධ්‍යාපනික වාර්තා"
    data-ta="கல்வி அறிக்கைகள்"
    >Academic Reports</span
  >
</h2>

<div id="summaryTilesContainer" style="display: none; margin-bottom: 24px;">
  <!-- Summary Tiles -->
  <div class="card-grid">
    <div class="card w-1 h-1 dashboard-tile">
      <div class="icon-title">
        <i class="fas fa-users icon"></i>
        <p class="tile-label" data-en="Students" data-si="ශිෂ්‍යයන්" data-ta="மாணவர்கள்">Students</p>
      </div>
      <p class="tile-value" id="statStudents">--</p>
    </div>

    <div class="card w-1 h-1 dashboard-tile">
      <div class="icon-title">
        <i class="fas fa-signal icon"></i>
        <p class="tile-label" data-en="Avg Marks" data-si="සාමාන්‍ය ලකුණු" data-ta="சராசரி மதிப்பெண்">Avg Marks</p>
      </div>
      <p class="tile-value" id="statAvg">--</p>
    </div>

    <div class="card w-1 h-1 dashboard-tile">
      <div class="icon-title">
        <i class="fas fa-poll icon"></i>
        <p class="tile-label" data-en="Pass Rate" data-si="සමත් අනුපාතය" data-ta="தேர்ச்சி விகிதம்">Pass Rate</p>
      </div>
      <p class="tile-value" id="statPassRate">--</p>
    </div>

    <div class="card w-1 h-1 dashboard-tile">
      <div class="icon-title">
        <i class="fas fa-award icon"></i>
        <p class="tile-label" data-en="Top Subject" data-si="ප්‍රථම විෂය" data-ta="சிறந்த பாடம்">Top Subject</p>
      </div>
      <p class="tile-value" id="statTopSubject" style="font-size: 16px">--</p>
    </div>
  </div>
</div>

<!-- Results Table & Filters -->
<div class="card dashboard-tile" style="margin-top: 0">
  <div class="icon-title">
    <i class="fas fa-table icon"></i>
    <p class="tile-label" data-en="Results" data-si="ප්‍රතිඵಲ" data-ta="முடிவுகள்">Results</p>
  </div>

  <style>
    /* Hide ALL default data-table filter controls so we can place our custom ones perfectly aligned */
    #results-table .filter-controls {
      display: none !important;
    }
  </style>

  <div class="filter-group">
    <div>
      <select id="examFilter" class="dropdown-select">
        <option value="" data-en="Select Exam">Select Exam</option>
      </select>
    </div>
    <div>
      <select id="classFilter" class="dropdown-select">
        <option value="" data-en="All Classes">All Classes</option>
      </select>
    </div>
    <div class="search-group" style="max-width: 260px">
      <input type="text" id="customSearch" class="search-input" placeholder="Search student..." />
      <span class="search-icon"><i class="fas fa-search"></i></span>
    </div>

    <!-- Align Export and Page Size to the right of the row -->
    <div style="margin-left: auto; display: flex; gap: 8px; align-items: center;">
      <div style="margin-bottom: 0;">
        <select id="customPageSize" class="dropdown-select">
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>
      <button id="customExportBtn" class="btn btn-secondary" style="padding: 8px 12px; height: 100%;">
        <i class="fas fa-download"></i> Export
      </button>
    </div>
  </div>

  <div id="emptyState" style="margin: 40px 0;">
    <empty-state-message message="Select an exam to view reports" icon="fas fa-file-alt"></empty-state-message>
  </div>

  <div class="table-container" id="tableContent" style="display: none; margin-top: 16px;">
    <data-table id="results-table"></data-table>
  </div>
</div>

<div id="chartsContainer" style="display: none; margin-top: 24px;">
  <!-- Charts -->
  <div class="card-grid">
    <div class="card w-1 h-1 dashboard-tile chart-tile">
      <div class="icon-title">
        <i class="fas fa-chart-bar icon"></i>
        <p class="tile-label" data-en="Subject Performance" data-si="විෂය කාර්යසාධන" data-ta="பாட செயல்திறன்">Subject Performance</p>
      </div>
      <div class="chart-wrapper"><canvas id="chartSubjects"></canvas></div>
    </div>

    <div class="card w-1 h-1 dashboard-tile chart-tile">
      <div class="icon-title">
        <i class="fas fa-chart-pie icon"></i>
        <p class="tile-label" data-en="Mark Distribution" data-si="ලකුණු ව්‍යාප්තිය" data-ta="மதிப்பெண் விநியோகம்">Mark Distribution</p>
      </div>
      <div class="chart-wrapper"><canvas id="chartDistribution"></canvas></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../../js/dropdown.js"></script>
<script>
  /* =========================
   State
   ========================= */
  let allRecords = [];
  let filtersData = {};
  let chartA, chartB;
  let resultsTable = null;

  const filterInfo = document.getElementById("filterInfo");
  const examEl = document.getElementById("examFilter");
  const classEl = document.getElementById("classFilter");

  /* =========================
   Primary color
   ========================= */
  function getPrimaryColor() {
    return getComputedStyle(document.documentElement)
      .getPropertyValue("--color-primary")
      .trim();
  }

  /* =========================
   Init Data Table component
   ========================= */
  function initTable() {
    resultsTable = document.getElementById("results-table");
    resultsTable.setEmptyState("No matching records found for these filters.", "fas fa-search");
  }

  /* =========================
   Update table headers text based on lang
   ========================= */
  function updateTableHeaders(lang) {
    if (!resultsTable) return;
    const translate = (en, si, ta) => lang === "si" ? si : lang === "ta" ? ta : en;
    resultsTable.setColumns([
      { key: "student_name", header: translate("Student", "ශිෂ්‍යයා", "மாணவர்"), searchable: true },
      { key: "index_number", header: translate("Index No", "සුචක අංකය", "குறியீட்டு எண்"), searchable: true },
      { key: "class", header: translate("Class", "පන්තිය", "வகுப்பு"), searchable: true },
      { key: "subject", header: translate("Subject", "විෂය", "பாடம்"), searchable: true },
      { 
        key: "marks", 
        header: translate("Marks", "ලකුණු", "மதிப்பெண்"),
        render: (row) => {
          const m = parseInt(row.marks);
          const color = isNaN(m) ? "var(--color-text)" : (m >= 50 ? "var(--color-success)" : "var(--color-error)");
          return `<span style="font-weight:600; color: ${color}">${row.marks}</span>`;
        }
      },
      { key: "exam", header: translate("Exam", "විභාගය", "தேர்வு"), searchable: true }
    ]);
   }
   
    /* =========================
     Update table headers with dynamic subject columns
     ========================= */
    function updateTableHeadersWithSubjects(subjects) {
      if (!resultsTable) return;
      if (!subjects || subjects.length === 0) return;
      
      const lang = localStorage.getItem("lang") || "en";
      const translate = (en, si, ta) => lang === "si" ? si : lang === "ta" ? ta : en;
     
     const columns = [
       { key: "student_name", header: translate("Student", "ශිෂ්‍යයා", "மாணவர்"), searchable: true },
       { key: "index_number", header: translate("Index No", "සුචක අංකය", "குறியீட்டு எண்"), searchable: true },
       { key: "class_display", header: translate("Class", "පන්තිය", "வகுப்பு"), searchable: true },
     ];
     
     // Add subject columns with color-coded marks
     subjects.forEach(subject => {
       columns.push({
         key: subject,
         header: subject,
         render: (row) => {
           const marks = row[subject];
           const m = parseInt(marks);
           if (!marks) return "-";
           const color = isNaN(m) ? "var(--color-text)" : (m >= 50 ? "var(--color-success)" : "var(--color-error)");
           return `<span style="font-weight:600; color: ${color}">${marks}</span>`;
         }
       });
     });
     
     resultsTable.setColumns(columns);
   }

  /* =========================
   Populate dropdown with options (preserving "All" option)
   ========================= */
  function populateDropdown(dropdownEl, options, textFn, defaultLabel) {
    // Keep the first option (the "All" option)
    const firstOption = dropdownEl.options[0];
    dropdownEl.length = 0;
    dropdownEl.appendChild(firstOption);
    
    // Add new options
    options.forEach(opt => {
      const el = document.createElement("option");
      el.value = opt.id;
      el.textContent = textFn(opt);
      dropdownEl.appendChild(el);
    });
  }

  /* =========================
   Load filters from backend
   ========================= */
  async function loadFilters(examId = null, classId = null) {
    try {
      const res = await api.admin.academic.getReportsFilters(examId, classId);
      if (!res.ok) throw new Error("Failed to load filters");
      const data = await res.json();

      if (examId && !classId) {
        // Exam selected - update classes
        populateDropdown(classEl, data.classes, c => `Grade ${c.grade} - ${c.name}`, "All Classes");
        initSearchableDropdown("classFilter", () => onClassChange());
      } else {
        // No exam selected - reset (initial load or cleared)
        populateDropdown(examEl, data.exams, e => e.name, "Select Exam");
        populateDropdown(classEl, data.classes, c => `Grade ${c.grade} - ${c.name}`, "All Classes");
        initSearchableDropdown("examFilter", () => onExamChange());
        initSearchableDropdown("classFilter", () => onClassChange());
      }
    } catch (err) {
      console.error("Error loading filters:", err);
    }
  }

  /* =========================
   Initialize a single searchable dropdown
   ========================= */
  let searchableDropdowns = {};
  function initSearchableDropdown(selectId, onSelect) {
    if (typeof makeSearchableDropdown === "function") {
      // Destroy existing if any
      if (searchableDropdowns[selectId]) {
        searchableDropdowns[selectId].destroy();
      }
      // Create new
      searchableDropdowns[selectId] = makeSearchableDropdown(selectId, onSelect);
    }
  }

  /* =========================
   Handle cascade filter changes
   ========================= */
  async function onExamChange() {
    const examId = examEl.value;
    
    if (!examId) {
      // Reset class to all
      await loadFilters(null, null);
    } else {
      // Load classes for this exam
      await loadFilters(examId, null);
    }
    
    // Reload data
    await loadData();
  }

  async function onClassChange() {
    // Just reload data when class changes
    await loadData();
  }

  /* =========================
   Load data from backend
   ========================= */
  async function loadData() {
    const summaryTiles = document.getElementById("summaryTilesContainer");
    const tableContent = document.getElementById("tableContent");
    const chartsContainer = document.getElementById("chartsContainer");
    const emptyState = document.getElementById("emptyState");

    if (!examEl.value) {
      summaryTiles.style.display = "none";
      tableContent.style.display = "none";
      chartsContainer.style.display = "none";
      emptyState.style.display = "block";
      return;
    }

    summaryTiles.style.display = "block";
    tableContent.style.display = "block";
    chartsContainer.style.display = "block";
    emptyState.style.display = "none";

    try {
      const [dataRes, summaryRes] = await Promise.all([
        api.admin.academic.getReportsDataPivot({ 
          exam_id: examEl.value, 
          class_id: classEl.value 
        }),
        api.admin.academic.getReportsPivotSummary({ 
          exam_id: examEl.value, 
          class_id: classEl.value 
        }),
      ]);

      if (!dataRes.ok || !summaryRes.ok) throw new Error("Failed to load data");

      const pivotResult = await dataRes.json();
      const summary = await summaryRes.json();

      allRecords = pivotResult.data || [];
      const subjects = pivotResult.subjects || [];

      // Update summary tiles
      document.getElementById("statStudents").textContent = summary.totalStudents || 0;
      document.getElementById("statAvg").textContent = (summary.avgMarks || 0) + "%";
      document.getElementById("statPassRate").textContent = (summary.passRate || 0) + "%";
      document.getElementById("statTopSubject").textContent = summary.topSubject || "--";

      // Render table with dynamic subject columns
      if (resultsTable && subjects.length > 0) {
        updateTableHeadersWithSubjects(subjects);
        resultsTable.setData(allRecords);
      } else if (resultsTable) {
        resultsTable.setEmptyState("No marks data for this exam.", "fas fa-file-alt");
        resultsTable.setData([]);
      }

      // Render charts
      renderCharts();
    } catch (err) {
      console.error("Error loading data:", err);
      if (resultsTable) resultsTable.setEmptyState("Error loading reports data.", "fas fa-exclamation-triangle");
    }
  }

  /* =========================
   Charts
   ========================= */
  function renderCharts() {
    if (chartA) chartA.destroy();
    if (chartB) chartB.destroy();

    // Don't render charts if no data
    if (!allRecords || allRecords.length === 0) return;

    const primaryColor = getPrimaryColor();
    const ctxA = document.getElementById("chartSubjects").getContext("2d");
    const ctxB = document.getElementById("chartDistribution").getContext("2d");

    // Subject performance chart - pivoted data has subjects as columns
    const subjectMap = {};
    const subjectCols = []; // Track which columns are subjects
    
    if (allRecords.length > 0) {
      // Identify subject columns (exclude metadata columns)
      const firstRow = allRecords[0];
      const metaKeys = ['student_name', 'index_number', 'grade', 'class_name', 'class_display', 'exam_name', 'exam_id'];
      for (const key of Object.keys(firstRow)) {
        if (!metaKeys.includes(key)) {
          subjectCols.push(key);
        }
      }
    }
    
    // Aggregate marks per subject
    subjectCols.forEach(subject => {
      const marksArr = [];
      allRecords.forEach(r => {
        const marks = parseInt(r[subject]);
        if (!isNaN(marks)) marksArr.push(marks);
      });
      if (marksArr.length > 0) {
        subjectMap[subject] = marksArr;
      }
    });

    const subjects = Object.keys(subjectMap);
    const avgs = subjects.map(
      (s) => +(subjectMap[s].reduce((a, b) => a + b, 0) / subjectMap[s].length).toFixed(1)
    );

    chartA = new Chart(ctxA, {
      type: "bar",
      data: {
        labels: subjects.length > 10 ? subjects.slice(0, 10) : subjects,
        datasets: [
          {
            label: "Average Marks",
            data: subjects.length > 10 ? avgs.slice(0, 10) : avgs,
            backgroundColor: primaryColor + "33",
            borderColor: primaryColor,
            borderWidth: 2,
            borderRadius: 6,
          },
        ],
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, max: 100 } },
      },
    });

    // Mark distribution chart - pivoted data
    const buckets = [0, 35, 50, 65, 75, 100];
    const labels = ["0-34", "35-49", "50-64", "65-74", "75-100"];
    const counts = new Array(buckets.length - 1).fill(0);

    // Use the same subjectCols identified above

    allRecords.forEach(r => {
      subjectCols.forEach(subject => {
        const marks = parseInt(r[subject]);
        if (isNaN(marks)) return;
        for (let i = 0; i < buckets.length - 1; i++) {
          if (marks >= buckets[i] && marks < buckets[i + 1]) {
            counts[i]++;
            break;
          }
        }
        if (marks === 100) counts[counts.length - 1]++;
      });
    });

    chartB = new Chart(ctxB, {
      type: "doughnut",
      data: {
        labels,
        datasets: [
          {
            data: counts,
            backgroundColor: [
              primaryColor + "22",
              primaryColor + "44",
              primaryColor + "66",
              primaryColor + "99",
              primaryColor,
            ],
            borderColor: "transparent",
            borderRadius: 6,
          },
        ],
      },
      options: {
        responsive: true,
        cutout: "60%",
        plugins: { legend: { position: "bottom" } },
      },
    });
  }

  /* =========================
   Event listeners
   ========================= */
  examEl.addEventListener("change", onExamChange);
  classEl.addEventListener("change", onClassChange);

  const customSearch = document.getElementById("customSearch");
  if(customSearch) {
    customSearch.addEventListener("input", (e) => {
      if (resultsTable) {
        resultsTable.searchQuery = e.target.value.toLowerCase().trim();
        resultsTable.currentPage = 1;
        resultsTable.filterData();
      }
    });
  }

  const customExportBtn = document.getElementById("customExportBtn");
  if(customExportBtn) {
    customExportBtn.addEventListener("click", () => {
      if (resultsTable && typeof resultsTable.openExportModal === "function") {
        resultsTable.openExportModal();
      }
    });
  }

  /* =========================
   Language handling
   ========================= */
  function updateText(lang) {
    if (!["en", "si", "ta"].includes(lang)) lang = "en";
    document.querySelectorAll("[data-en]").forEach((el) => {
      const next = el.getAttribute(`data-${lang}`);
      if (next != null) el.textContent = next;
    });
    
    // Update data-table headers translation
    updateTableHeaders(lang);
  }

  window.addEventListener("storage", (e) => {
    if (e.key === "lang") updateText(e.newValue || "en");
  });
  window.addEventListener("languageChange", (e) => {
    const newLang = e.detail?.lang;
    if (newLang && ["en", "si", "ta"].includes(newLang)) updateText(newLang);
  });

  let _lastLangPoll = localStorage.getItem("lang") || "en";
  setInterval(() => {
    const cur = localStorage.getItem("lang") || "en";
    if (cur !== _lastLangPoll) {
      _lastLangPoll = cur;
      updateText(cur);
    }
  }, 400);

  /* =========================
   Searchable dropdowns
   ========================= */
  function initializeSearchableDropdowns() {
    initSearchableDropdown("examFilter", () => onExamChange());
    initSearchableDropdown("classFilter", () => onClassChange());
    initSearchableDropdown("customPageSize", (val) => {
      if (resultsTable) {
        resultsTable.pageSize = parseInt(val);
        resultsTable.currentPage = 1;
        resultsTable.filterData();
      }
    });
  }

  /* =========================
   Init
   ========================= */
  async function initializePage() {
    initTable();
    updateText(localStorage.getItem("lang") || "en");
    await loadFilters();
    initializeSearchableDropdowns();
    await loadData();
  }

  initializePage();
</script>

<style>
  .chart-tile {
    max-height: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .chart-tile canvas {
    max-width: 100%;
    max-height: 320px;
  }
  .filter-group {
    display: flex !important;
    flex-direction: row !important;
    gap: 16px;
    margin: 16px 0;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .filter-group > div {
    flex: 0 0 auto;
    min-width: 160px;
  }
  .filter-group .export-buttons {
    margin-left: auto;
    min-width: auto;
    display: flex;
    flex-direction: row;
    gap: 8px;
  }
  .filter-group .export-buttons button {
    margin: 0;
  }
</style>
