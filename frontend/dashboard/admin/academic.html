<h2 class="heading">
  <i class="fas fa-chart-bar"></i>
  <span
    data-en="Academic Reports"
    data-si="අධ්‍යාපනික වාර්තා"
    data-ta="கல்வி அறிக்கைகள்"
    >Academic Reports</span
  >
</h2>

<div id="summaryTilesContainer" style="display: none; margin-bottom: 24px;">
  <!-- Summary Tiles -->
  <div class="card-grid">
    <div class="card w-1 h-1 dashboard-tile">
      <div class="icon-title">
        <i class="fas fa-users icon"></i>
        <p class="tile-label" data-en="Students" data-si="ශිෂ්‍යයන්" data-ta="மாணவர்கள்">Students</p>
      </div>
      <p class="tile-value" id="statStudents">--</p>
    </div>

    <div class="card w-1 h-1 dashboard-tile">
      <div class="icon-title">
        <i class="fas fa-signal icon"></i>
        <p class="tile-label" data-en="Avg Marks" data-si="සාමාන්‍ය ලකුණු" data-ta="சராசரி மதிப்பெண்">Avg Marks</p>
      </div>
      <p class="tile-value" id="statAvg">--</p>
    </div>

    <div class="card w-1 h-1 dashboard-tile">
      <div class="icon-title">
        <i class="fas fa-poll icon"></i>
        <p class="tile-label" data-en="Pass Rate" data-si="සමත් අනුපාතය" data-ta="தேர்ச்சி விகிதம்">Pass Rate</p>
      </div>
      <p class="tile-value" id="statPassRate">--</p>
    </div>

    <div class="card w-1 h-1 dashboard-tile">
      <div class="icon-title">
        <i class="fas fa-award icon"></i>
        <p class="tile-label" data-en="Top Subject" data-si="ප්‍රථම විෂය" data-ta="சிறந்த பாடம்">Top Subject</p>
      </div>
      <p class="tile-value" id="statTopSubject" style="font-size: 16px">--</p>
    </div>
  </div>
</div>

<!-- Results Table & Filters -->
<div class="card dashboard-tile" style="margin-top: 0">
  <div class="icon-title">
    <i class="fas fa-table icon"></i>
    <p class="tile-label" data-en="Results" data-si="ප්‍රතිඵල" data-ta="முடிவுகள்">Results</p>
  </div>

  <div class="filter-group">
    <div>
      <select id="examFilter" class="dropdown-select">
        <option value="" data-en="Select Exam">Select Exam</option>
      </select>
    </div>
    <div>
      <select id="classFilter" class="dropdown-select">
        <option value="" data-en="All Classes">All Classes</option>
      </select>
    </div>
    <div>
      <select id="subjectFilter" class="dropdown-select">
        <option value="" data-en="All Subjects">All Subjects</option>
      </select>
    </div>
    <div class="search-group" style="max-width: 260px">
      <input type="text" id="searchInput" class="search-input" placeholder="Search student..." />
      <span class="search-icon"><i class="fas fa-search"></i></span>
    </div>
    <div class="export-buttons">
      <button class="btn btn-primary" onclick="exportPDF()">
        <i class="fas fa-file-pdf"></i> PDF
      </button>
      <button class="btn btn-primary" onclick="exportCSV()">
        <i class="fas fa-download"></i> CSV
      </button>
    </div>
  </div>

  <div id="emptyState" style="margin: 40px 0;">
    <empty-state-message message="Select an exam to view reports" icon="fas fa-file-alt"></empty-state-message>
  </div>

  <div class="table-container" id="tableContent" style="display: none; margin-top: 16px;">
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th data-en="Student" data-si="ශිෂ්‍යයා" data-ta="மாணவர்">Student</th>
            <th data-en="Index No" data-si="සුචක අංකය" data-ta="குறியீட்டு எண்">Index No</th>
            <th data-en="Class" data-si="පන්තිය" data-ta="வகுப்பு">Class</th>
            <th data-en="Subject" data-si="විෂය" data-ta="பாடம்">Subject</th>
            <th data-en="Marks" data-si="ලකුණු" data-ta="மதிப்பெண்">Marks</th>
            <th data-en="Exam" data-si="විභාගය" data-ta="தேர்வு">Exam</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="table-footer" style="margin-top: 12px">
      <p id="filterInfo" style="color: var(--color-subtext); font-size: 13px">Loading...</p>
    </div>
  </div>
</div>

<div id="chartsContainer" style="display: none; margin-top: 24px;">
  <!-- Charts -->
  <div class="card-grid">
    <div class="card w-1 h-1 dashboard-tile chart-tile">
      <div class="icon-title">
        <i class="fas fa-chart-bar icon"></i>
        <p class="tile-label" data-en="Subject Performance" data-si="විෂය කාර්යසාධන" data-ta="பாட செயல்திறன்">Subject Performance</p>
      </div>
      <div class="chart-wrapper"><canvas id="chartSubjects"></canvas></div>
    </div>

    <div class="card w-1 h-1 dashboard-tile chart-tile">
      <div class="icon-title">
        <i class="fas fa-chart-pie icon"></i>
        <p class="tile-label" data-en="Mark Distribution" data-si="ලකුණු ව්‍යාප්තිය" data-ta="மதிப்பெண் விநியோகம்">Mark Distribution</p>
      </div>
      <div class="chart-wrapper"><canvas id="chartDistribution"></canvas></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../../js/dropdown.js"></script>
<script>
  /* =========================
   State
   ========================= */
  let allRecords = [];
  let filtersData = {};
  let chartA, chartB;
  let searchDebounce = null;

  const tableBody = document.getElementById("tableBody");
  const filterInfo = document.getElementById("filterInfo");
  const examEl = document.getElementById("examFilter");
  const classEl = document.getElementById("classFilter");
  const subjectEl = document.getElementById("subjectFilter");
  const searchEl = document.getElementById("searchInput");

  /* =========================
   Primary color
   ========================= */
  function getPrimaryColor() {
    return getComputedStyle(document.documentElement)
      .getPropertyValue("--color-primary")
      .trim();
  }

  /* =========================
   Load filters from backend
   ========================= */
  async function loadFilters() {
    try {
      const res = await fetch("/api/admin/academic/reports/filters");
      if (!res.ok) throw new Error("Failed to load filters");
      filtersData = await res.json();

      // Populate exam dropdown
      filtersData.exams.forEach((e) => {
        const opt = document.createElement("option");
        opt.value = e.id;
        opt.textContent = e.name;
        examEl.appendChild(opt);
      });

      // Populate class dropdown
      filtersData.classes.forEach((c) => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = `Grade ${c.grade} - ${c.name}`;
        classEl.appendChild(opt);
      });

      // Populate subject dropdown
      filtersData.subjects.forEach((s) => {
        const opt = document.createElement("option");
        opt.value = s.id;
        opt.textContent = s.name;
        subjectEl.appendChild(opt);
      });
    } catch (err) {
      console.error("Error loading filters:", err);
    }
  }

  /* =========================
   Build query string from filters
   ========================= */
  function buildQuery() {
    const params = new URLSearchParams();
    if (examEl.value) params.set("exam_id", examEl.value);
    if (classEl.value) params.set("class_id", classEl.value);
    if (subjectEl.value) params.set("subject_id", subjectEl.value);
    if (searchEl.value.trim()) params.set("search", searchEl.value.trim());
    return params.toString();
  }

  /* =========================
   Load data from backend
   ========================= */
  async function loadData() {
    const summaryTiles = document.getElementById("summaryTilesContainer");
    const tableContent = document.getElementById("tableContent");
    const chartsContainer = document.getElementById("chartsContainer");
    const emptyState = document.getElementById("emptyState");

    if (!examEl.value) {
      summaryTiles.style.display = "none";
      tableContent.style.display = "none";
      chartsContainer.style.display = "none";
      emptyState.style.display = "block";
      return;
    }

    summaryTiles.style.display = "block";
    tableContent.style.display = "block";
    chartsContainer.style.display = "block";
    emptyState.style.display = "none";

    try {
      const query = buildQuery();
      const [dataRes, summaryRes] = await Promise.all([
        fetch(`/api/admin/academic/reports/data?${query}`),
        fetch(`/api/admin/academic/reports/summary?${query}`),
      ]);

      if (!dataRes.ok || !summaryRes.ok) throw new Error("Failed to load data");

      allRecords = await dataRes.json();
      const summary = await summaryRes.json();

      // Update summary tiles
      document.getElementById("statStudents").textContent = summary.totalStudents;
      document.getElementById("statAvg").textContent = summary.avgMarks + "%";
      document.getElementById("statPassRate").textContent = summary.passRate + "%";
      document.getElementById("statTopSubject").textContent = summary.topSubject;

      // Render table
      renderTable();

      // Render charts
      renderCharts();

      // Update info
      filterInfo.textContent = `${allRecords.length} record(s) found`;
    } catch (err) {
      console.error("Error loading data:", err);
      filterInfo.textContent = "Error loading data";
    }
  }

  /* =========================
   Render table
   ========================= */
  function renderTable() {
    if (!allRecords.length) {
      tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 32px; color: var(--color-subtext)">No records found. Try adjusting the filters.</td></tr>`;
      return;
    }

    tableBody.innerHTML = allRecords
      .map(
        (r) => `
        <tr>
          <td>${r.student_name}</td>
          <td>${r.index_number}</td>
          <td>${r.class}</td>
          <td>${r.subject}</td>
          <td><span style="font-weight:600; color: ${parseInt(r.marks) >= 50 ? "var(--color-success)" : "var(--color-error)"}">${r.marks}</span></td>
          <td>${r.exam}</td>
        </tr>`
      )
      .join("");
  }

  /* =========================
   Charts
   ========================= */
  function renderCharts() {
    if (chartA) chartA.destroy();
    if (chartB) chartB.destroy();

    const primaryColor = getPrimaryColor();
    const ctxA = document.getElementById("chartSubjects").getContext("2d");
    const ctxB = document.getElementById("chartDistribution").getContext("2d");

    // Subject performance chart
    const subjectMap = {};
    allRecords.forEach((r) => {
      const marks = parseInt(r.marks);
      if (isNaN(marks)) return;
      if (!subjectMap[r.subject]) subjectMap[r.subject] = [];
      subjectMap[r.subject].push(marks);
    });

    const subjects = Object.keys(subjectMap);
    const avgs = subjects.map(
      (s) => +(subjectMap[s].reduce((a, b) => a + b, 0) / subjectMap[s].length).toFixed(1)
    );

    chartA = new Chart(ctxA, {
      type: "bar",
      data: {
        labels: subjects.length > 10 ? subjects.slice(0, 10) : subjects,
        datasets: [
          {
            label: "Average Marks",
            data: subjects.length > 10 ? avgs.slice(0, 10) : avgs,
            backgroundColor: primaryColor + "33",
            borderColor: primaryColor,
            borderWidth: 2,
            borderRadius: 6,
          },
        ],
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, max: 100 } },
      },
    });

    // Mark distribution chart
    const buckets = [0, 35, 50, 65, 75, 100];
    const labels = ["0-34", "35-49", "50-64", "65-74", "75-100"];
    const counts = new Array(buckets.length - 1).fill(0);

    allRecords.forEach((r) => {
      const marks = parseInt(r.marks);
      if (isNaN(marks)) return;
      for (let i = 0; i < buckets.length - 1; i++) {
        if (marks >= buckets[i] && marks < buckets[i + 1]) {
          counts[i]++;
          break;
        }
      }
      if (marks === 100) counts[counts.length - 1]++;
    });

    chartB = new Chart(ctxB, {
      type: "doughnut",
      data: {
        labels,
        datasets: [
          {
            data: counts,
            backgroundColor: [
              primaryColor + "22",
              primaryColor + "44",
              primaryColor + "66",
              primaryColor + "99",
              primaryColor,
            ],
            borderColor: "transparent",
            borderRadius: 6,
          },
        ],
      },
      options: {
        responsive: true,
        cutout: "60%",
        plugins: { legend: { position: "bottom" } },
      },
    });
  }

  /* =========================
   Export CSV
   ========================= */
  function exportCSV() {
    const header = ["Student", "Index No", "Class", "Subject", "Marks", "Exam"];
    const rows = allRecords.map((r) => [
      r.student_name,
      r.index_number,
      r.class,
      r.subject,
      r.marks,
      r.exam,
    ]);

    const csv = [header.join(","), ...rows.map((r) => r.map((c) => `"${c}"`).join(","))].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `academic_report_${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  /* =========================
   Export PDF
   ========================= */
  function exportPDF() {
    const win = window.open("", "", "width=900,height=700");
    win.document.write(`<html><head><title>Academic Report</title></head><body>`);
    win.document.write(`<h1>Academic Report</h1>`);
    win.document.write(`<p>Generated: ${new Date().toLocaleString()}</p>`);
    win.document.write(`<table border="1" cellpadding="6" cellspacing="0" style="width:100%; border-collapse:collapse">`);
    win.document.write(`<tr><th>Student</th><th>Index No</th><th>Class</th><th>Subject</th><th>Marks</th><th>Exam</th></tr>`);

    allRecords.forEach((r) => {
      win.document.write(
        `<tr><td>${r.student_name}</td><td>${r.index_number}</td><td>${r.class}</td><td>${r.subject}</td><td>${r.marks}</td><td>${r.exam}</td></tr>`
      );
    });

    win.document.write(`</table></body></html>`);
    win.document.close();
    win.focus();
    win.print();
  }

  /* =========================
   Event listeners
   ========================= */
  [examEl, classEl, subjectEl].forEach((el) => {
    el.addEventListener("change", loadData);
  });

  searchEl.addEventListener("input", () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(loadData, 350);
  });

  /* =========================
   Language handling
   ========================= */
  function updateText(lang) {
    if (!["en", "si", "ta"].includes(lang)) lang = "en";
    document.querySelectorAll("[data-en]").forEach((el) => {
      const next = el.getAttribute(`data-${lang}`);
      if (next != null) el.textContent = next;
    });
  }

  window.addEventListener("storage", (e) => {
    if (e.key === "lang") updateText(e.newValue || "en");
  });
  window.addEventListener("languageChange", (e) => {
    const newLang = e.detail?.lang;
    if (newLang && ["en", "si", "ta"].includes(newLang)) updateText(newLang);
  });

  let _lastLangPoll = localStorage.getItem("lang") || "en";
  setInterval(() => {
    const cur = localStorage.getItem("lang") || "en";
    if (cur !== _lastLangPoll) {
      _lastLangPoll = cur;
      updateText(cur);
    }
  }, 400);

  /* =========================
   Searchable dropdowns
   ========================= */
  function initializeSearchableDropdowns() {
    if (typeof makeSearchableDropdown === "function") {
      makeSearchableDropdown("examFilter", () => loadData());
      makeSearchableDropdown("classFilter", () => loadData());
      makeSearchableDropdown("subjectFilter", () => loadData());
    }
  }

  /* =========================
   Init
   ========================= */
  async function initializePage() {
    updateText(localStorage.getItem("lang") || "en");
    await loadFilters();
    initializeSearchableDropdowns();
    await loadData();
  }

  initializePage();
</script>

<style>
  .chart-tile {
    max-height: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .chart-tile canvas {
    max-width: 100%;
    max-height: 320px;
  }
  .filter-group {
    display: flex !important;
    flex-direction: row !important;
    gap: 16px;
    margin: 16px 0;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .filter-group > div {
    flex: 0 0 auto;
    min-width: 160px;
  }
  .filter-group .export-buttons {
    margin-left: auto;
    min-width: auto;
    display: flex;
    flex-direction: row;
    gap: 8px;
  }
  .filter-group .export-buttons button {
    margin: 0;
  }
</style>
