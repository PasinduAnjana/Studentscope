<style>
  :root {
    --fc-border-color: var(--color-border);
    --fc-button-bg-color: var(--color-primary);
    --fc-button-border-color: var(--color-primary);
    --fc-button-hover-bg-color: var(--color-primary-dark);
    --fc-button-hover-border-color: var(--color-primary-dark);
    --fc-button-active-bg-color: var(--color-primary-dark);
    --fc-button-active-border-color: var(--color-primary-dark);
    --fc-event-bg-color: var(--color-primary);
    --fc-event-border-color: var(--color-primary);
    --fc-today-bg-color: rgba(67, 97, 238, 0.05);
    --fc-page-bg-color: var(--color-bg);
    --fc-neutral-bg-color: var(--color-card);
    --fc-neutral-text-color: var(--color-text);
  }

  .events-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding: 24px;
    background: var(--color-card);
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
  }

  .events-header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--color-text);
    margin: 0;
  }

  .calendar-container {
    background: var(--color-card);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    min-height: 600px;
    animation: fadeIn 0.4s ease-out;
  }

  /* FullCalendar overrides */
  .fc-theme-standard th {
    padding: 12px 0;
    font-weight: 500;
    text-transform: uppercase;
    font-size: 0.85rem;
    color: var(--color-subtext);
    border: none;
    border-bottom: 1px solid var(--color-border);
  }
  .fc-scrollgrid { border: none !important; }
  .fc-scrollgrid td { border-color: var(--color-border) !important; }
  .fc td { border-color: var(--color-border) !important; }
  .fc .fc-daygrid-day-number { padding: 8px; font-weight: 500; color: var(--color-text); }
  .fc .fc-col-header-cell-cushion { text-decoration: none !important; }
  .fc .fc-daygrid-event {
    border-radius: 6px; padding: 4px 8px; font-size: 0.8rem; font-weight: 500;
    border: none; box-shadow: 0 2px 4px rgba(67, 97, 238, 0.2);
    transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: pointer;
  }
  .fc .fc-daygrid-event:hover {
    transform: translateY(-1px); box-shadow: 0 4px 8px rgba(67, 97, 238, 0.3);
  }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--color-text); }
  .form-control {
    width: 100%; padding: 10px 14px; border: 1px solid var(--color-border);
    border-radius: 8px; background: var(--color-bg); color: var(--color-text);
    font-family: inherit; transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .form-control:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15); }
  textarea.form-control { resize: vertical; min-height: 100px; }
  
  .event-details-meta { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--color-border); }
  .event-details-meta p { margin: 4px 0; color: var(--color-subtext); font-size: 0.9rem; }
  .event-details-desc { color: var(--color-text); line-height: 1.6; margin-bottom: 24px; }
  .event-badge {
    display: inline-block; padding: 4px 10px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
    background: var(--color-primary-light); color: var(--color-primary);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<div class="events-header">
  <div>
    <h1 data-en="Events Calendar" data-si="සිදුවීම් දින දර්ශනය" data-ta="நிகழ்வுகள் நாட்காட்டி">Events Calendar</h1>
    <p class="text-sm" style="color: var(--color-subtext); margin-top: 4px;" data-en="Your class events and school events" data-si="ඔබේ පන්තියේ සිදුවීම් සහ පාසල් සිදුවීම්" data-ta="உங்கள் வகுப்பு நிகழ்வுகள் மற்றும் பள்ளி நிகழ்வுகள்">Your class events and school events</p>
  </div>
  <button class="btn btn-primary" onclick="openCreateEventModal()">
    <i class="fas fa-plus"></i> <span data-en="Create Class Event">Create Class Event</span>
  </button>
</div>

<div class="calendar-container">
  <div id="calendar"></div>
</div>

<modal-dialog id="create-event-modal" title="Create Class Event">
  <form id="create-event-form" onsubmit="handleCreateEvent(event)">
    <div class="form-group">
      <label data-en="Event Title">Event Title</label>
      <input type="text" class="form-control" id="event-title" required />
    </div>
    <div class="form-group">
      <label data-en="Description">Description</label>
      <textarea class="form-control" id="event-desc" required></textarea>
    </div>
    <div class="form-group">
      <label data-en="Date">Date</label>
      <input type="date" class="form-control" id="event-date" required />
    </div>
    <!-- Notice how Audience is omitted for teacher as it's hardcoded to their class backend -->
    
    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
      <button type="button" class="btn btn-secondary" onclick="document.getElementById('create-event-modal').close()" data-en="Cancel">Cancel</button>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save"></i> <span data-en="Save Event">Save Event</span>
      </button>
    </div>
  </form>
</modal-dialog>

<modal-dialog id="event-details-modal" title="Event Details">
  <div id="event-details-content">
    <div class="event-details-meta">
      <h2 id="detail-title" style="margin: 0 0 12px 0; font-size: 1.4rem; color: var(--color-text);">Title</h2>
      <p><i class="fas fa-calendar-day" style="width: 20px;"></i> <span id="detail-date">Date</span></p>
      <p><i class="fas fa-user-circle" style="width: 20px;"></i> <span id="detail-creator">Creator</span> (<span id="detail-role">Role</span>)</p>
      <p><i class="fas fa-users" style="width: 20px;"></i> <span class="event-badge" id="detail-audience">Audience</span></p>
    </div>
    <div class="event-details-desc" id="detail-desc"></div>
    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
      <button class="btn btn-danger" id="detail-delete-btn" style="display: none;" onclick="deleteCurrentEvent()">
        <i class="fas fa-trash"></i> <span data-en="Delete">Delete</span>
      </button>
      <button class="btn btn-secondary" onclick="document.getElementById('event-details-modal').close()" data-en="Close">Close</button>
    </div>
  </div>
</modal-dialog>

<script>
  let calendar;
  let allEvents = [];
  let currentEventId = null;
  let currentUserId = null; // We need to know who is reading to show delete

  async function fetchEvents() {
    try {
      // Decode user info from auth
      const meInfo = await fetch('/api/auth/me').then(res => res.json());
      currentUserId = meInfo.userId;

      const res = await fetch('/api/teacher/events');
      if (res.ok) {
        allEvents = await res.json();
        renderCalendar();
      }
    } catch (e) {
      console.error(e);
      toast("Error loading events", "fa-solid fa-circle-exclamation");
    }
  }

  function renderCalendar() {
    const calendarEl = document.getElementById('calendar');
    const calendarEvents = allEvents.map(ev => ({
      id: ev.id,
      title: ev.title,
      start: ev.event_date.split('T')[0],
      extendedProps: {
        description: ev.description,
        creator: ev.creator_full_name || ev.creator_name,
        creator_id: ev.created_by,
        role: ev.creator_role,
        audience: ev.target_audience
      }
    }));

    if (calendar) calendar.destroy();

    calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
      events: calendarEvents,
      eventClick: function(info) { showEventDetails(info.event); },
      dateClick: function(info) { openCreateEventModal(info.dateStr); },
      height: 'auto',
      eventColor: 'var(--color-primary)',
      displayEventTime: false
    });
    calendar.render();
  }

  function openCreateEventModal(dateStr = '') {
    document.getElementById('create-event-form').reset();
    document.getElementById('event-date').value = dateStr || new Date().toISOString().split('T')[0];
    document.getElementById('create-event-modal').open();
  }

  async function handleCreateEvent(e) {
    e.preventDefault();
    const title = document.getElementById('event-title').value;
    const description = document.getElementById('event-desc').value;
    const date = document.getElementById('event-date').value;

    try {
      const res = await fetch('/api/teacher/events', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description, event_date: date })
      });
      if (res.ok) {
        toast("Class event created successfully", "fa-solid fa-check");
        document.getElementById('create-event-modal').close();
        fetchEvents();
      } else toast("Failed to create event", "fa-solid fa-circle-exclamation");
    } catch (err) {
      console.error(err);
      toast("Error creating event", "fa-solid fa-circle-exclamation");
    }
  }

  function showEventDetails(event) {
    currentEventId = event.id;
    const props = event.extendedProps;
    document.getElementById('detail-title').textContent = event.title;
    document.getElementById('detail-date').textContent = new Date(event.start).toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('detail-creator').textContent = props.creator;
    document.getElementById('detail-role').textContent = props.role;
    
    const audienceLabels = { 'both': 'Everyone', 'teachers': 'Teachers', 'my_students': 'My Class', 'students': 'Students' };
    document.getElementById('detail-audience').textContent = audienceLabels[props.audience] || props.audience;
    document.getElementById('detail-desc').textContent = props.description;
    
    // Only show delete button if teacher created it
    const delBtn = document.getElementById('detail-delete-btn');
    if (props.creator_id == currentUserId) {
      delBtn.style.display = 'inline-flex';
    } else {
      delBtn.style.display = 'none';
    }
    
    document.getElementById('event-details-modal').open();
  }

  async function deleteCurrentEvent() {
    if (!currentEventId) return;
    if (!confirm("Are you sure you want to delete this event?")) return;

    try {
      const res = await fetch(`/api/teacher/events/${currentEventId}`, { method: 'DELETE' });
      if (res.ok) {
        toast("Event deleted successfully", "fa-solid fa-check");
        document.getElementById('event-details-modal').close();
        fetchEvents();
      } else toast("Failed to delete event", "fa-solid fa-circle-exclamation");
    } catch (err) {
      console.error(err);
      toast("Error deleting event", "fa-solid fa-circle-exclamation");
    }
  }

  function initCalendar() {
    if (typeof FullCalendar === 'undefined') {
      setTimeout(initCalendar, 100);
      return;
    }
    fetchEvents();
  }
  initCalendar();
</script>
