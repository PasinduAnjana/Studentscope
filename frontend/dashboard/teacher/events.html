<link rel="stylesheet" href="/css/events.css" />

<!-- FullCalendar Library -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>
  let calendar;
  let allEvents = [];
  let currentEventId = null;
  let currentUserId = null; // We need to know who is reading to show delete

  async function fetchEvents() {
    try {
      // Decode user info from auth
      const meInfo = await api.auth.me().then(res => res.json());
      currentUserId = meInfo.userId;

      const res = await api.teacher.events.getAll();
      if (res.ok) {
        allEvents = await res.json();
        renderCalendar();
      }
    } catch (e) {
      console.error(e);
      toast("Error loading events", "fa-solid fa-circle-exclamation");
    }
  }

  function renderCalendar() {
    const calendarEl = document.getElementById('calendar');
    const calendarEvents = allEvents.map(ev => ({
      id: ev.id,
      title: ev.title,
      start: ev.event_date.split('T')[0],
      extendedProps: {
        description: ev.description,
        creator: ev.creator_full_name || ev.creator_name,
        creator_id: ev.created_by,
        role: ev.creator_role,
        audience: ev.target_audience
      }
    }));

    if (calendar) calendar.destroy();

    calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
      events: calendarEvents,
      eventClick: function(info) { showEventDetails(info.event); },
      dateClick: function(info) { openCreateEventModal(info.dateStr); },
      height: 'auto',
      eventColor: 'var(--color-primary)',
      displayEventTime: false
    });
    calendar.render();
  }

  function openCreateEventModal(dateStr = '') {
    document.getElementById('create-event-form').reset();
    document.getElementById('event-date').value = dateStr || new Date().toISOString().split('T')[0];
    document.getElementById('create-event-modal').open();
  }

  async function handleCreateEvent(e) {
    e.preventDefault();
    const title = document.getElementById('event-title').value;
    const description = document.getElementById('event-desc').value;
    const dateInput = document.getElementById('event-date').value;
    
    // Fix timezone offset by adding one day
    const dateObj = new Date(dateInput);
    dateObj.setDate(dateObj.getDate() + 1);
    const event_date = dateObj.toISOString().split('T')[0];

    try {
      const res = await api.teacher.events.create({ title, description, event_date });
      if (res.ok) {
        toast("Class event created successfully", "fa-solid fa-check");
        document.getElementById('create-event-modal').close();
        fetchEvents();
      } else toast("Failed to create event", "fa-solid fa-circle-exclamation");
    } catch (err) {
      console.error(err);
      toast("Error creating event", "fa-solid fa-circle-exclamation");
    }
  }

  function showEventDetails(event) {
    currentEventId = event.id;
    const props = event.extendedProps;
    document.getElementById('detail-title').textContent = event.title;
    document.getElementById('detail-date').textContent = new Date(event.start).toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('detail-creator').textContent = props.creator;
    document.getElementById('detail-role').textContent = props.role;
    
    const audienceLabels = { 'both': 'Everyone', 'teachers': 'Teachers', 'my_students': 'My Class', 'students': 'Students' };
    document.getElementById('detail-audience').textContent = audienceLabels[props.audience] || props.audience;
    document.getElementById('detail-desc').textContent = props.description;
    
    // Only show delete button if teacher created it
    const delBtn = document.getElementById('detail-delete-btn');
    if (props.creator_id == currentUserId) {
      delBtn.style.display = 'inline-flex';
    } else {
      delBtn.style.display = 'none';
    }
    
    document.getElementById('event-details-modal').open();
  }

  async function deleteCurrentEvent() {
    if (!currentEventId) return;
    if (!confirm("Are you sure you want to delete this event?")) return;

    try {
      const res = await api.teacher.events.delete(currentEventId);
      if (res.ok) {
        toast("Event deleted successfully", "fa-solid fa-check");
        document.getElementById('event-details-modal').close();
        fetchEvents();
      } else toast("Failed to delete event", "fa-solid fa-circle-exclamation");
    } catch (err) {
      console.error(err);
      toast("Error deleting event", "fa-solid fa-circle-exclamation");
    }
  }

  function initCalendar() {
    if (typeof FullCalendar === 'undefined') {
      setTimeout(initCalendar, 100);
      return;
    }
    fetchEvents();
  }
  initCalendar();
</script>

<div class="events-header">
  <div>
    <h1 data-en="My Class Events" data-si="මගේ පන්ති සිදුවීම්" data-ta="என் வகுப்பு நிகழ்வுகள்">My Class Events</h1>
    <p class="text-sm" style="color: var(--color-subtext); margin-top: 4px;" data-en="Events for your class" data-si="ඔබේ පන්තියේ සිදුවීම්" data-ta="உங்கள் வகுப்பிற்கான நிகழ்வுகள்">Events for your class</p>
  </div>
  <button class="btn btn-primary" onclick="openCreateEventModal()">
    <i class="fas fa-plus"></i>
    <span data-en="Create Event" data-si="සිදුවීමක් සාදන්න" data-ta="நிகழ்வை உருவாக்குங்கள்">Create Event</span>
  </button>
</div>

<div class="calendar-container">
  <div id="calendar"></div>
</div>

<!-- Create Event Modal -->
<modal-dialog id="create-event-modal" title="Create New Event">
  <form id="create-event-form" onsubmit="handleCreateEvent(event)">
    <div class="form-group">
      <label data-en="Event Title" data-si="සිදුවීමේ ශීර්ෂය" data-ta="நிகழ்வின் தலைப்பு">Event Title</label>
      <input type="text" class="form-control" id="event-title" required />
    </div>
    
    <div class="form-group">
      <label data-en="Description" data-si="විස්තරය" data-ta="விளக்கம்">Description</label>
      <textarea class="form-control" id="event-desc" required></textarea>
    </div>

    <div class="form-group">
      <label data-en="Date" data-si="දිනය" data-ta="தேதி">Date</label>
      <input type="date" class="form-control" id="event-date" required />
    </div>

    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
      <button type="button" class="btn btn-secondary" onclick="document.getElementById('create-event-modal').close()" data-en="Cancel">Cancel</button>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save"></i> <span data-en="Save Event">Save Event</span>
      </button>
    </div>
  </form>
</modal-dialog>

<modal-dialog id="event-details-modal" title="Event Details">
  <div id="event-details-content">
    <div class="event-details-meta">
      <h2 id="detail-title" style="margin: 0 0 12px 0; font-size: 1.4rem; color: var(--color-text);">Title</h2>
      <p><i class="fas fa-calendar-day" style="width: 20px;"></i> <span id="detail-date">Date</span></p>
      <p><i class="fas fa-user-circle" style="width: 20px;"></i> <span id="detail-creator">Creator</span> (<span id="detail-role">Role</span>)</p>
      <p><i class="fas fa-users" style="width: 20px;"></i> <span class="event-badge" id="detail-audience">Audience</span></p>
    </div>
    <div class="event-details-desc" id="detail-desc"></div>
    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
      <button class="btn btn-danger" id="detail-delete-btn" style="display: none;" onclick="deleteCurrentEvent()">
        <i class="fas fa-trash"></i> <span data-en="Delete">Delete</span>
      </button>
      <button class="btn btn-secondary" onclick="document.getElementById('event-details-modal').close()" data-en="Close">Close</button>
    </div>
  </div>
</modal-dialog>
