<link rel="stylesheet" href="/css/events.css" />

<!-- FullCalendar Library -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>
  let calendar;
  let allEvents = [];
  let currentEventId = null;
  let currentUserId = null;
  let currentEventData = null;

  function fetchEvents() {
    api.auth.me().then(res => res.json()).then(meInfo => {
      currentUserId = meInfo.userId;
      return api.teacher.events.getAll();
    }).then(res => res.json()).then(data => {
      allEvents = data;
      renderCalendar();
    }).catch(e => {
      console.error(e);
      toast("Error loading events", "fa-solid fa-circle-exclamation");
    });
  }

  function renderCalendar() {
    const calendarEl = document.getElementById('calendar');
    const calendarEvents = allEvents.map(ev => ({
      id: ev.id,
      title: ev.title,
      start: ev.event_date.split('T')[0],
      extendedProps: {
        description: ev.description,
        creator: ev.creator_full_name || ev.creator_name,
        creator_id: ev.created_by,
        role: ev.creator_role,
        audience: ev.target_audience
      }
    }));

    if (calendar) calendar.destroy();

    calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
      events: calendarEvents,
      eventClick: function(info) { showEventDetails(info.event); },
      dateClick: function(info) { openCreateEventModal(info.dateStr); },
      height: 'auto',
      eventColor: 'var(--color-primary)',
      displayEventTime: false
    });
    calendar.render();
  }

  function openCreateEventModal(dateStr) {
    var form = document.getElementById('create-event-form');
    var modal = document.getElementById('create-event-modal');
    var dateEl = document.getElementById('event-date');
    
    if (form) {
      form.reset();
      form.dataset.editMode = 'false';
      var h2el = modal.querySelector('h2');
      if (h2el) h2el.textContent = 'Create New Event';
    }
    if (dateEl) dateEl.value = dateStr || new Date().toISOString().split('T')[0];
    if (modal) modal.open();
  }

  function openEditEventModal() {
    if (!currentEventData || !currentEventData.extendedProps) return;
    var props = currentEventData.extendedProps;
    
    var form = document.getElementById('create-event-form');
    var modal = document.getElementById('create-event-modal');
    var h2el = modal ? modal.querySelector('h2') : null;
    
    var titleEl = document.getElementById('event-title');
    var descEl = document.getElementById('event-desc');
    var dateEl = document.getElementById('event-date');
    
    if (titleEl) titleEl.value = currentEventData.title || '';
    if (descEl) descEl.value = props.description || '';
    if (dateEl) dateEl.value = currentEventData.startStr || '';
    if (form) form.dataset.editMode = 'true';
    if (h2el) h2el.textContent = 'Edit Event';
    if (modal) modal.open();
  }

  function handleCreateEvent(e) {
    e.preventDefault();
    var form = document.getElementById('create-event-form');
    if (!form) return;
    
    var isEditMode = form.dataset.editMode === 'true';
    
    var title = document.getElementById('event-title').value;
    var description = document.getElementById('event-desc').value;
    var dateInput = document.getElementById('event-date').value;
    
    var dateObj = new Date(dateInput);
    dateObj.setDate(dateObj.getDate() + 1);
    var event_date = dateObj.toISOString().split('T')[0];

    var action = isEditMode 
      ? api.teacher.events.update(currentEventId, { title: title, description: description, event_date: event_date })
      : api.teacher.events.create({ title: title, description: description, event_date: event_date });

    var modal = document.getElementById('create-event-modal');
    var detailsModal = document.getElementById('event-details-modal');
    var h2el = modal ? modal.querySelector('h2') : null;

    action.then(res => {
      if (res.ok) {
        toast(isEditMode ? "Event updated successfully" : "Class event created successfully", "fa-solid fa-check");
        if (modal) modal.close();
        form.reset();
        form.dataset.editMode = 'false';
        if (h2el) h2el.textContent = 'Create New Event';
        fetchEvents();
        if (detailsModal) detailsModal.close();
      } else {
        toast(isEditMode ? "Failed to update event" : "Failed to create event", "fa-solid fa-circle-exclamation");
      }
    }).catch(err => {
      console.error(err);
      toast("Error creating event", "fa-solid fa-circle-exclamation");
    });
  }

  function showEventDetails(event) {
    currentEventId = event.id;
    currentEventData = event;
    var props = event.extendedProps || {};
    
    var detailTitle = document.getElementById('detail-title');
    var detailDate = document.getElementById('detail-date');
    var detailCreator = document.getElementById('detail-creator');
    var detailRole = document.getElementById('detail-role');
    var detailAudience = document.getElementById('detail-audience');
    var detailDesc = document.getElementById('detail-desc');
    var modal = document.getElementById('event-details-modal');
    
    if (detailTitle) detailTitle.textContent = event.title || '';
    if (detailDate) detailDate.textContent = event.start ? new Date(event.start).toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) : '';
    if (detailCreator) detailCreator.textContent = props.creator || '';
    if (detailRole) detailRole.textContent = props.role || '';
    
    var audienceLabels = { 'both': 'Everyone', 'teachers': 'Teachers', 'my_students': 'My Class', 'students': 'Students' };
    if (detailAudience) detailAudience.textContent = audienceLabels[props.audience] || props.audience || '';
    if (detailDesc) detailDesc.textContent = props.description || '';
    
    var delBtn = document.getElementById('detail-delete-btn');
    var editBtn = document.getElementById('detail-edit-btn');
    if (props.creator_id == currentUserId) {
      if (delBtn) delBtn.style.display = 'inline-flex';
      if (editBtn) editBtn.style.display = 'inline-flex';
    } else {
      if (delBtn) delBtn.style.display = 'none';
      if (editBtn) editBtn.style.display = 'none';
    }
    
    if (modal) modal.open();
  }

  function deleteCurrentEvent() {
    if (!currentEventId) return;
    if (!confirm("Are you sure you want to delete this event?")) return;

    api.teacher.events.delete(currentEventId).then(res => {
      if (res.ok) {
        toast("Event deleted successfully", "fa-solid fa-check");
        document.getElementById('event-details-modal').close();
        fetchEvents();
      } else {
        toast("Failed to delete event", "fa-solid fa-circle-exclamation");
      }
    }).catch(err => {
      console.error(err);
      toast("Error deleting event", "fa-solid fa-circle-exclamation");
    });
  }

  function initCalendar() {
    if (typeof FullCalendar === 'undefined') {
      setTimeout(initCalendar, 100);
      return;
    }
    fetchEvents();
  }
  initCalendar();
</script>

<h2 class="heading">
  <i class="fas fa-calendar-alt"></i>
  <span data="sidebar.events"></span>
</h2>

<div class="events-header">
  <div class="icon-title">
    <i class="fas fa-calendar-alt icon"></i>
    <p class="tile-label" data-en="My Class Events" data-si="මගේ පන්ති සිදුවීම්" data-ta="என் வகுப்பு நிகழ்வுகள்">My Class Events</p>
  </div>
  <button class="btn btn-primary" onclick="openCreateEventModal()">
    <i class="fas fa-plus"></i>
    <span data-en="Create Event" data-si="සිදුවීමක් සාදන්න" data-ta="நிகழ்வை உருவாக்குங்கள்">Create Event</span>
  </button>
</div>

<div class="calendar-container">
  <div id="calendar"></div>
</div>

<!-- Create Event Modal -->
<modal-dialog id="create-event-modal" title="Create New Event">
  <form id="create-event-form" onsubmit="handleCreateEvent(event)">
    <div class="form-group">
      <label data-en="Event Title" data-si="සිදුවීමේ ශීර්ෂය" data-ta="நிகழ்வின் தலைப்பு">Event Title</label>
      <input type="text" class="form-control" id="event-title" required />
    </div>
    
    <div class="form-group">
      <label data-en="Description" data-si="විස්තරය" data-ta="விளக்கம்">Description</label>
      <textarea class="form-control" id="event-desc" required></textarea>
    </div>

    <div class="form-group">
      <label data-en="Date" data-si="දිනය" data-ta="தேதி">Date</label>
      <input type="date" class="form-control" id="event-date" required />
    </div>

    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
      <button type="button" class="btn btn-secondary" onclick="document.getElementById('create-event-modal').close()" data-en="Cancel">Cancel</button>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save"></i> <span data-en="Save Event">Save Event</span>
      </button>
    </div>
  </form>
</modal-dialog>

<modal-dialog id="event-details-modal" title="Event Details">
  <div id="event-details-content">
    <div class="event-details-meta">
      <h2 id="detail-title" style="margin: 0 0 12px 0; font-size: 1.4rem; color: var(--color-text);">Title</h2>
      <p><i class="fas fa-calendar-day" style="width: 20px;"></i> <span id="detail-date">Date</span></p>
      <p><i class="fas fa-user-circle" style="width: 20px;"></i> <span id="detail-creator">Creator</span> (<span id="detail-role">Role</span>)</p>
      <p><i class="fas fa-users" style="width: 20px;"></i> <span class="event-badge" id="detail-audience">Audience</span></p>
    </div>
    <div class="event-details-desc" id="detail-desc"></div>
    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
      <button class="btn btn-danger" id="detail-delete-btn" style="display: none;" onclick="deleteCurrentEvent()">
        <i class="fas fa-trash"></i> <span data-en="Delete">Delete</span>
      </button>
      <button class="btn btn-primary" id="detail-edit-btn" style="display: none;" onclick="openEditEventModal()">
        <i class="fas fa-edit"></i> <span data-en="Edit">Edit</span>
      </button>
      <button class="btn btn-secondary" onclick="document.getElementById('event-details-modal').close()" data-en="Close">Close</button>
    </div>
  </div>
</modal-dialog>
