  <span
    data-en="Student Behavior Reports"
    data-si="ශිෂ්‍ය හැසිරීම් වාර්තා"
    data-ta="மாணவர் நடத்தை அறிக்கைகள்"
  >
    Student Behavior Reports
  </span>
</h2>

<div style="display: flex; flex-direction: column; gap: 24px">
  <!-- 📋 Add Behavior Record Form -->


  <!-- 📋 My Behavior Records -->
  <div class="card behavior-list">
    <div class="header-actions" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div class="icon-title">
            <i class="fas fa-list icon"></i>
            <p class="tile-label" data-en="My Behavior Records" data-si="මගේ හැසිරීම් වාර්තා" data-ta="எனது நடத்தை பதிவுகள்">My Behavior Records</p>
        </div>
        <button id="add-record-btn" class="btn btn-primary">
            <i class="fas fa-plus"></i>
            <span data-en="Add New" data-si="අලුත් එකක් එකතු කරන්න" data-ta="புதியதைச் சேர்">Add New</span>
        </button>
    </div>

    <data-table id="behavior-table">
        <div slot="filters" style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
            <div class="input-group" style="margin-bottom: 0;">
                <select id="filter-type">
                <option value="" data-en="All Types" data-si="සියලු වර්ග" data-ta="அனைத்து வகைகளும்">All Types</option>
                <option value="Good" data-en="Good" data-si="හොඳ" data-ta="நல்ல">Good</option>
                <option value="Disciplinary" data-en="Disciplinary" data-si="අධ්‍යාපනික" data-ta="கட்டுப்பாட்டு">Disciplinary</option>
                <option value="Reward" data-en="Reward" data-si="ත්‍යාගය" data-ta="வெகுமதி">Reward</option>
                </select>
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <select id="filter-severity">
                <option value="" data-en="All Severities" data-si="සියලු බරපතලකම්" data-ta="அனைத்து தீவிரத்தன்மையும்">All Severities</option>
                <option value="Minor" data-en="Minor" data-si="සුළු" data-ta="சிறிய">Minor</option>
                <option value="Serious" data-en="Serious" data-si="බැරෑරුම්" data-ta="தீவிரமான">Serious</option>
                </select>
            </div>
        </div>
    </data-table>
  </div>
</div>

<!-- Add Behavior Record Modal -->
<modal-dialog id="add-behavior-modal" data-title="teacher.behavior.addRecord">
    <div style="padding: 20px;">
        <div class="filter-group" style="flex-direction: column !important; align-items: stretch;">
          <div style="width: 100%;">
            <label
              data-en="Select Student"
              data-si="ශිෂ්‍ය තෝරා ගන්න"
              data-ta="மாணவரைத் தேர்ந்தெடுக்கவும்"
            >
              Select Student
            </label>
            <select id="student-select" class="dropdown-select" style="width: 100%;">
              <option value="" data-en="Choose a student">Choose a student</option>
            </select>
          </div>
          <div style="width: 100%;">
            <label
              data-en="Behavior Type"
              data-si="හැසිරීමේ වර්ගය"
              data-ta="நடத்தை வகை"
            >
              Behavior Type
            </label>
            <select id="behavior-type" class="dropdown-select" style="width: 100%;">
              <option
                value=""
                data-en="Select Type"
                data-si="වර්ගය තෝරන්න"
                data-ta="வகையைத் தேர்ந்தெடு"
              >
                Select Type
              </option>
              <option value="Good" data-en="Good" data-si="හොඳ" data-ta="நல்ல">
                Good
              </option>
              <option
                value="Disciplinary"
                data-en="Disciplinary"
                data-si="අධ්‍යාපනික"
                data-ta="කட்டுපාටු"
              >
                Disciplinary
              </option>
              <option
                value="Reward"
                data-en="Reward"
                data-si="ත්‍යාගය"
                data-ta="வெகுமதி"
              >
                Reward
              </option>
            </select>
          </div>
          <div style="width: 100%;">
            <label data-en="Severity" data-si="බරපතුතාව" data-ta="கடுமை">
              Severity
            </label>
            <select id="behavior-severity" class="dropdown-select" style="width: 100%;">
              <option
                value=""
                data-en="N/A"
                data-si="නොපැනවීම"
                data-ta="பொருந்தாது"
              >
                N/A
              </option>
              <option value="Minor" data-en="Minor" data-si="සුළු" data-ta="சிறிய">
                Minor
              </option>
              <option
                value="Serious"
                data-en="Serious"
                data-si="බැරෑරුම්"
                data-ta="தீவிரமான"
              >
                Serious
              </option>
            </select>
          </div>
        </div>
        <div style="margin-bottom: 20px">
          <label data-en="Description" data-si="විස්තරණ" data-ta="விளக்கம்">
            Description
          </label>
          <textarea
            id="behavior-description"
            class="form-input"
            rows="4"
            placeholder="Enter behavior description..."
            data-en="Enter behavior description..."
            data-si="හැසිරීම් විස්තරය ඇතුල් කරන්න..."
            data-ta="நடத்தை விளக்கத்தை உள்ளீடு செய்யவும்..."
           
          ></textarea>
        </div>
    </div>
    <div style="display: flex; justify-content: flex-end; gap: 10px; padding: 20px; border-top: 1px solid var(--color-border);">
      <button
        id="add-behavior-cancel"
        class="btn btn-secondary"
        data-en="Cancel"
        data-si="අවලංගු කරන්න"
        data-ta="ரத்து செய்ய"
      >
        Cancel
      </button>
      <button
        id="add-behavior-confirm"
        class="btn btn-primary"
        data-en="Submit Record"
        data-si="වාර්තා ඉදිරිපත් කරන්න"
        data-ta="பதிவை சமர்ப்பிக்கவும்"
      >
        Submit Record
      </button>
    </div>
</modal-dialog>


<script>
  let classStudents = [];
  let myBehaviorRecords = [];
  let teacherUserId = null;
  let editingRecordId = null;

  // Language variable
  let currentLanguage = localStorage.getItem("lang") || "en";

  // Update language when changed
  window.addEventListener("storage", (e) => {
    if (e.key === "lang") {
      currentLanguage = e.newValue || "en";
    }
  });
  window.addEventListener("languageChanged", (e) => {
    currentLanguage = e.detail?.lang || localStorage.getItem("lang") || "en";
  });

  // Column header translations
  const columnHeaders = {
    en: { date: "Date", student: "Student", type: "Type", severity: "Severity", description: "Description", actions: "Actions" },
    si: { date: "දිනය", student: "ශිෂ්‍යයා", type: "වර්ගය", severity: "බරපතලකම්", description: "විස්තරය", actions: "ක්‍රියාම" },
    ta: { date: "தேதி", student: "மாணவர்", type: "வகை", severity: "தீவிரம்", description: "விளக்கம்", actions: "செயல்கள்" }
  };

  // Get teacher ID from localStorage (set during login)
  function getTeacherId() {
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    return user.id;
  }

  // Load students from teacher's class
  async function loadClassStudents() {
    try {
      const response = await api.teacher.students.getAll();
      if (!response.ok) throw new Error("Failed to fetch students");
      const allStudents = await response.json();

      // Group students by class and sort
      const studentsByClass = {};
      allStudents.forEach((student) => {
        const classKey = `${student.grade} ${student.class_name}`;
        if (!studentsByClass[classKey]) {
          studentsByClass[classKey] = [];
        }
        studentsByClass[classKey].push(student);
      });

      // Populate student dropdown with class grouping
      const studentSelect = document.getElementById("student-select");
      studentSelect.innerHTML = '<option value="">Choose a student</option>';

      // Sort classes
      const sortedClasses = Object.keys(studentsByClass).sort();

      sortedClasses.forEach((classKey) => {
        const optgroup = document.createElement("optgroup");
        optgroup.label = classKey;

        studentsByClass[classKey]
          .sort((a, b) => a.full_name.localeCompare(b.full_name))
          .forEach((student) => {
            const option = document.createElement("option");
            option.value = student.id;
            option.textContent = student.full_name;
            option.dataset.classId = student.class_id;
            optgroup.appendChild(option);
          });

        studentSelect.appendChild(optgroup);
      });

      // Store for later use
      classStudents = allStudents;
    } catch (err) {
      console.error("Error loading students:", err);
      showToast("Error loading students", "fa-solid fa-circle-exclamation");
    }
  }

  // Load teacher's behavior records
  async function loadMyRecords() {
    const table = document.getElementById("behavior-table");
    try {
      const res = await api.teacher.behavior.getRecords();
      if (!res.ok) throw new Error("Failed to load records");
      myBehaviorRecords = await res.json();
      table.setData(myBehaviorRecords);
    } catch (err) {
      console.error(err);
      table.setEmptyState("Error loading records", "fas fa-exclamation-triangle");
      showToast("Error loading records", "fa-solid fa-circle-exclamation");
    }
  }

  // Submit new behavior record
  async function submitBehaviorRecord() {
    const studentId = document.getElementById("student-select").value;
    const type = document.getElementById("behavior-type").value;
    const severity = document.getElementById("behavior-severity").value;
    const description = document
      .getElementById("behavior-description")
      .value.trim();

    // Validation
    if (!studentId) {
      showToast("Please select a student", "fa-solid fa-circle-exclamation");
      return;
    }
    if (!type) {
      showToast(
        "Please select behavior type",
        "fa-solid fa-circle-exclamation"
      );
      return;
    }
    if (!description || description.length < 5) {
      const messages = {
        en: "Description must be at least 5 characters",
        si: "විස්තරය අවම වශයෙන් අකුරු 5 ක් විය යුතුය",
        ta: "விளக்கம் குறைந்தது 5 எழுத்துகளாக இருக்க வேண்டும்",
      };
      showToast(
        messages[currentLanguage] || messages.en,
        "fa-solid fa-circle-exclamation"
      );
      return;
    }

    try {
      const student = classStudents.find((s) => s.id == studentId);
      if (!student) {
        const messages = {
          en: "Invalid student selected",
          si: "වලංගු නොවන ශිෂ්‍ය තෝරා ඇත",
          ta: "தவறான மாணவர் தேர்ந்தெடுக்கப்பட்டுள்ளார்",
        };
        showToast(
          messages[currentLanguage] || messages.en,
          "fa-solid fa-circle-exclamation"
        );
        return;
      }

      const payload = {
        student_id: parseInt(studentId),
        class_id: student.class_id,
        type: type,
        severity: severity || null,
        description: description,
        reported_by_id: getTeacherId(),
      };

      let response;
      if (editingRecordId) {
        response = await api.teacher.behavior.updateRecord(editingRecordId, payload);
      } else {
        response = await api.teacher.behavior.addRecord(payload);
      }

      if (!response.ok) throw new Error("Failed to submit record");

      const messages = {
        en: editingRecordId ? "Behavior record updated successfully" : "Behavior record submitted successfully",
        si: editingRecordId ? "හැසිරීම් වාර්තා සාර්ථකව යාවත්කාලීන කරන ලදී" : "හැසිරීම් වාර්තා සාර්ථකව ඉදිරිපත් කරන ලදී",
        ta: editingRecordId ? "நடத்தை பதிவு வெற்றிகரமாக புதுப்பிக்கப்பட்டது" : "நடத்தை பதிவு வெற்றிகரமாக சமர்ப்பிக்கப்பட்டது",
      };
      showToast(
        messages[currentLanguage] || messages.en,
        "fa-solid fa-check-circle"
      );
      resetBehaviorForm();
      loadMyRecords();
      // Close modal
      const modal = document.getElementById("add-behavior-modal");
      if (modal) modal.close();
    } catch (err) {
      console.error("Error submitting record:", err);
      const messages = {
        en: "Error submitting record",
        si: "වාර්තා ඉදිරිපත් කිරීමේ දෝෂයක්",
        ta: "பதிவை சமர்ப்பிப்பதில் பிழை",
      };
      showToast(
        messages[currentLanguage] || messages.en,
        "fa-solid fa-circle-exclamation"
      );
    }
  }

  let tableInitialized = false;

function initTable() {
    const table = document.getElementById("behavior-table");
    const headers = columnHeaders[currentLanguage] || columnHeaders.en;
    table.setColumns([
        {
            key: "date",
            header: headers.date,
            render: (row) => new Date(row.date).toLocaleDateString()
        },
        { key: "student", header: headers.student, searchable: true },
        {
            key: "type",
            header: headers.type,
            render: (row) => {
                const color = row.type === 'Good' || row.type === 'Reward' ? 'green' : 'red';
                return `<span class="badge badge-${color}">${row.type}</span>`;
            }
        },
        { key: "severity", header: headers.severity, render: (row) => row.severity || '-' },
        { key: "description", header: headers.description, searchable: true },
        {
            key: "actions",
            header: headers.actions,
            render: (row) => {
                 // Inline onclick needs to pass ID carefully
                 return `
                    <button class="btn-icon btn-edit" onclick="editRecord('${row.id}')" title="Edit">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn-icon btn-delete" onclick="deleteRecord('${row.id}')" title="Delete">
                        <i class="fas fa-trash"></i>
                    </button>
                 `;
            }
        }
    ]);
    table.setEmptyState("No behavior records found", "fas fa-clipboard-list");

    // Only setup filters once
    if (tableInitialized) {
        // Just update columns, don't re-add filters
        const table = document.getElementById("behavior-table");
        const headers = columnHeaders[currentLanguage] || columnHeaders.en;
        table.setColumns([
            { key: "date", header: headers.date, render: (row) => new Date(row.date).toLocaleDateString() },
            { key: "student", header: headers.student, searchable: true },
            { key: "type", header: headers.type, render: (row) => `<span class="badge badge-${row.type === 'Good' || row.type === 'Reward' ? 'green' : 'red'}">${row.type}</span>` },
            { key: "severity", header: headers.severity, render: (row) => row.severity || '-' },
            { key: "description", header: headers.description, searchable: true },
            { key: "actions", header: headers.actions, render: (row) => `<button class="btn-icon btn-edit" onclick="editRecord('${row.id}')" title="Edit"><i class="fas fa-edit"></i></button><button class="btn-icon btn-delete" onclick="deleteRecord('${row.id}')" title="Delete"><i class="fas fa-trash"></i></button>` }
        ]);
        return;
    }
    tableInitialized = true;

    const filterType = document.getElementById("filter-type");
    const filterSeverity = document.getElementById("filter-severity");

    if (filterType) {
        if (typeof makeSearchableDropdown === "function") {
            makeSearchableDropdown("filter-type", (val) => {
                table.addFilter("type", (row) => val === "" || row.type === val);
            });
        } else {
            filterType.addEventListener("change", () => {
                const val = filterType.value;
                table.addFilter("type", (row) => val === "" || row.type === val);
            });
        }
    }

    if (filterSeverity) {
        if (typeof makeSearchableDropdown === "function") {
            makeSearchableDropdown("filter-severity", (val) => {
                table.addFilter("severity", (row) => val === "" || row.severity === val);
            });
        } else {
            filterSeverity.addEventListener("change", () => {
                const val = filterSeverity.value;
                table.addFilter("severity", (row) => val === "" || row.severity === val);
            });
        }
    }
  }

  // Delete behavior record
  function deleteRecord(recordId) {
    const messages = {
      en: "Are you sure you want to delete this record?",
      si: "ඔබට මෙම වාර්තා මකා දැමීමට අවශ්‍ය බව විශ්වාසද?",
      ta: "இந்த பதிவை நீக்க விரும்புகிறீர்களா?",
    };
    
    const confirmText = {
      en: "Delete",
      si: "මකන්න",
      ta: "நீக்கு"
    };

    const cancelText = {
      en: "Cancel",
      si: "අවලංගු කරන්න",
      ta: "ரத்து"
    };

    showToast(
      messages[currentLanguage] || messages.en,
      "fa-solid fa-trash",
      {
        confirm: true,
        confirmText: confirmText[currentLanguage] || "Delete",
        cancelText: cancelText[currentLanguage] || "Cancel",
        onConfirm: () => deleteRecordConfirmed(recordId)
      }
    );
  }

  async function deleteRecordConfirmed(recordId) {
    try {
      const response = await api.teacher.behavior.deleteRecord(recordId);

      if (!response.ok) throw new Error("Failed to delete record");

      const messages = {
        en: "Record deleted successfully",
        si: "වාර්තා සාර්ථකව මකා දමන ලදී",
        ta: "பதிவு வெற்றிகரமாக நீக்கப்பட்டது",
      };
      showToast(
        messages[currentLanguage] || messages.en,
        "fa-solid fa-check-circle"
      );
      loadMyRecords();
    } catch (err) {
      console.error("Error deleting record:", err);
      const messages = {
        en: "Error deleting record",
        si: "වාර්තා මකා දැමීමේ දෝෂයක්",
        ta: "பதிவை நீக்குவதில் பிழை",
      };
      showToast(
        messages[currentLanguage] || messages.en,
        "fa-solid fa-circle-exclamation"
      );
    }
  }

  // Reset form
  function resetBehaviorForm() {
    editingRecordId = null;
    document.getElementById("student-select").value = "";
    document.getElementById("behavior-type").value = "";
    document.getElementById("behavior-severity").value = "";
    document.getElementById("behavior-description").value = "";
    // Clear searchable dropdown inputs if they exist
    // This part depends on how dropdown.js implementation stores the search text
    // Assuming standard implementation:
    const dropdowns = document.querySelectorAll(".dropdown-select");
     dropdowns.forEach((select) => {
        // Reset displayed text for custom dropdowns
        const container = select.closest('.custom-select-container');
        if(container) {
             const selectedDiv = container.querySelector('.select-selected');
             if(selectedDiv) {
                 // Use the text from the first option (Choose a student/Select Type)
                 selectedDiv.textContent = select.options[0].textContent; 
             }
        }
    });

  }

  // Edit behavior record
  window.editRecord = function editRecord(recordId) {
    const record = myBehaviorRecords.find(r => r.id == recordId);
    if (!record) {
      console.error(`Record with ID ${recordId} not found in myBehaviorRecords.`);
      return;
    }

    editingRecordId = recordId;

    document.getElementById("student-select").value = record.student_id;
    document.getElementById("behavior-type").value = record.type;
    document.getElementById("behavior-severity").value = record.severity || "";
    document.getElementById("behavior-description").value = record.description;

    const dropdowns = document.querySelectorAll(".dropdown-select");
    dropdowns.forEach((select) => {
        const container = select.closest('.custom-select-container');
        if(container) {
             const selectedDiv = container.querySelector('.select-selected');
             if(selectedDiv) {
                 const selectedOption = Array.from(select.options).find(opt => opt.value == select.value);
                 if (selectedOption) {
                     selectedDiv.textContent = selectedOption.textContent;
                 }
             }
        }
    });

    const modal = document.getElementById("add-behavior-modal");
    if (modal.titleElement) {
        modal.titleElement.setAttribute("data-en", "Edit Behavior Record");
        modal.titleElement.setAttribute("data-si", "හැසිරීම් වාර්තා සංස්කරණය");
        modal.titleElement.setAttribute("data-ta", "நடத்தை பதிவை திருத்து");
    }
    
    document.getElementById("add-behavior-confirm").setAttribute("data-en", "Update Record");
    document.getElementById("add-behavior-confirm").setAttribute("data-si", "වාර්තාව යාවත්කාලීන කරන්න");
    document.getElementById("add-behavior-confirm").setAttribute("data-ta", "பதிவை புதுப்பிக்கவும்");
    document.getElementById("add-behavior-confirm").textContent = currentLanguage === "si" ? "වාර්තාව යාවත්කාලීන කරන්න" : currentLanguage === "ta" ? "பதிவை புதுப்பிக்கவும்" : "Update Record";

    if (typeof applyDirectLanguageAttributes === "function") {
        applyDirectLanguageAttributes(currentLanguage);
    }
    
    modal.open();
  }

  // Show toast notification
  function showToast(message, icon, options = {}) {
    if (typeof toast === "function") {
      toast(message, icon, options);
    } else {
      alert(message);
    }
  }

  // Initialize on page load
  async function initializePage() {
      await loadClassStudents();
      initTable();
      await loadMyRecords();
      setupAddBehaviorModal();
      // Initialize dropdowns locally if needed, or let global script handle generic ones
      // initializeSearchableDropdowns(); // Redundant if makeSearchableDropdown used inside initTable
  }

  // Re-render table on language change
  window.addEventListener("languageChanged", () => {
      initTable();
      loadMyRecords();
  });

  function setupAddBehaviorModal() {
      const addBtn = document.getElementById("add-record-btn");
      const modal = document.getElementById("add-behavior-modal");
      const cancelBtn = document.getElementById("add-behavior-cancel");
      const confirmBtn = document.getElementById("add-behavior-confirm");

      if (addBtn) {
          addBtn.addEventListener("click", () => {
              resetBehaviorForm();
              // Translations for title
              if (modal.titleElement) {
                  modal.titleElement.setAttribute("data-en", "Add Behavior Record");
                  modal.titleElement.setAttribute("data-si", "හැසිරීම් වාර්තා එක් කරන්න");
                  modal.titleElement.setAttribute("data-ta", "நடத்தை பதிவைச் சேர்க்கவும்");
              }
              const confirmBtn = document.getElementById("add-behavior-confirm");
              confirmBtn.setAttribute("data-en", "Submit Record");
              confirmBtn.setAttribute("data-si", "වාර්තා ඉදිරිපත් කරන්න");
              confirmBtn.setAttribute("data-ta", "பதிவை சமர்ப்பிக்கவும்");
              confirmBtn.textContent = currentLanguage === "si" ? "වාර්තා ඉදිරිපත් කරන්න" : currentLanguage === "ta" ? "பதிவை சமர்ப்பிக்கவும்" : "Submit Record";

               // Apply language if function exists
              if (typeof applyDirectLanguageAttributes === "function") {
                  applyDirectLanguageAttributes(localStorage.getItem("lang") || "en");
              }
              modal.open();
          });
      }

      if (cancelBtn) {
          cancelBtn.addEventListener("click", () => {
              modal.close();
          });
      }

      if (confirmBtn) {
          confirmBtn.addEventListener("click", submitBehaviorRecord);
      }
  }

  initializePage();

</script>
